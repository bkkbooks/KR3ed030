body:
  text: 卷之十一小兒門辨小兒虛實面紅如桃花色大糞黃稠小便清澈手足和暖乃表裡俱實其子易養也不宜服藥搌唇口亦不可服鎮心涼藥恐傷動脾胃嘔奶糞青而生驚掣面紅色乃為童顏外實也大糞黃稠膩內實也不宜服藥也不宜服涼藥有七足脛冷腹虛脹糞青色面㿠白嘔奶乳眼珠青脈微沉不宜服熱藥有七足脛熱兩腮紅大便秘小便黃渴不止上氣急脈緊急小兒驚風二證方書中未嘗分析詳細蓋驚自驚風自風當分別而治療之世傳通言熱極生風殊不知寒暑燥濕之極亦能生風見兒作搐不察形氣虛實便用牛黃硃砂腦麝之劑以致不救者多矣蓋真氣者元陽也其藥性溫則固養元陽冷則敗傷真氣故宜用溫中下氣藥治之以上並宿州陳氏方論形色歌曰火色紅傷寒青驚白色疳黑時因中惡黃即困脾端驚辰砂丸治咳嗽安驚化痰辰砂研一半為衣一半入藥白礬枯白附子炮各半兩南星一兩去皮臍切作片再用雪水煮焙乾大半夏一兩半湯七次生薑自然汁作餅炙上細末糯米粉煮糊為丸如小綠豆大每服二十丸臘茶薄荷湯下余長雛感患三年服之而愈蜈蚣丸治驚風白附子天南星赤腳蜈蚣防風半夏上銼碎諸藥掘地一小竅用炭火煅約半日一日尤好地脈透熱入黃子醋在竅八分滿隨傾諸藥入醋煮之用瓷碗一隻快捷蓋住以泥封四圍至次日相對方取出焙乾碾為末用豶豬心血研爛同蜜煉熟為丸不拘丸子大小用薄荷湯下仍量小兒大小投藥餘年七歲感患得此方而愈神效巨言龍齒散治小兒驚悸夜啼龍齒茯苓白附子炮蟬蛻甘草上等分細末每一小錢薄荷湯下臨臥服尤佳防風導赤散治小兒初驚生乾地黃川木通防風甘草各等分上生用㕮咀每服三錢水一盞竹葉少許同煎寧神膏後用此藥茯神硃砂各一兩麥門冬去心半兩麝香一分上碾細煉蜜為小餅子每服一餅臨睡同薄荷湯化服一夜一服二方何統制智大云昨在江州日兒子偶有驚作遂訪一老醫求藥劑服三服隨即痊愈遂師問之渠云三代小兒科家傳只有四五藥加減愈人無數且如驚搐多是熱證若首先便用驚風藥白附子全蠍殭蠶川烏之類便成壞證家中驚藥只用導赤散加北防風進一二服導去心經邪熱其搐隨手便止次服寧神膏是家傳此本自後常以二藥救人取效甚多羌活膏祛小兒驚風定驚羌活防風川芎茯神去木各二錢茯苓白朮白附子炮殭蠶薑汁炒各一錢全蠍半錢上為末煉蜜為丸每服紫豆大麥門冬薄荷湯化下羌活丸治風熱化痰安驚羌活荊芥穗甘草桔梗各半兩白朮白附子炮川芎防風茯苓各二錢硃砂二錢一半入藥一半為衣上為細末煉蜜為丸如皂子大每服一丸至兩丸薄荷湯化如涎盛加臘茶湯下此方最穩防風天麻散治驚風頭疼防風天麻川芎白芷甘草川烏一個炮麻黃去節上等分細末蔥蜜湯下薄荷湯亦可如驚搐加全蠍一個烏蛇肉尾白附子麝香各少許羌活煎湯下無不效者傷風加零陵香羌活疳六神丸治小兒諸疳極妙木香濕紙裹炮黃連去須神麯炒川楝子肉蕪荑麥糵炒上等分為細末豶豬膽蒸熟為丸如麻豆大每服三四十丸看兒大小加減不飢不飽服蘆薈丸治疳氣羸瘦面色萎黃腹脅脹滿頭髮作穗揉鼻咬甲好吃泥土寒熱往來目澀口臭齒斷爛黑常服長肌肉退黃殺蟲進乳食新增干蛤蟆去腸肚大皂角各一兩二件燒灰存性為末青黛二錢半蘆薈麝香硃砂各一分上合研勻用湯浸蒸餅為丸如麻子大每三歲兒三十丸溫米飲湯下不拘時以兒大小加減治疳勞四肢小腹大者毛髮落面黃小便似泔大便爛思飲食者是新增雄豬肉五斤重使好石灰摻一日洗去石灰置在新磚上使物蓋一夜用糟燠吃效後服利水飲治五疳黃瘦不生肌肉肚脹多筋頭髮焦黃不思乳食糞中有蟲米穀不化小便如油睡中盜汗新增蘆薈二錢使君子七個木通炮一錢檳榔炮一錢黃連去須炒二錢蕪荑炒去膜雷丸銼炒一錢青皮炒一錢龍腦草炒一錢上件為末雄豬膽汁蒸過為丸粟米大每三十丸飯飲送下六妙丸治疳積保童丸蘆薈丸化蟲丸肥兒丸六神丸蚵蚾丸上各一貼合和為丸隨兒大小加減服湘中翁仁壽方酢湯丸新增南星乳香滑石白丁香青黛一錢輕粉二錢金銀箔五片巴豆十六粒去油心錫末先將水銀安紙上溶入手挪碎上為末糊丸如粟米大每三十丸薄荷湯下疳積酢湯下脹滿茴香湯下赤白痢甘草湯下瘧疾桃柳枝湯下三聖丸治疳新增黃連三錢使君子二錢木香半錢上為末糊丸米飲空心下龍膽丸治小兒瘡病發熱新增龍膽草去蘆黃連去須炒青皮去白使君子去皮炒上等分為末豬膽汁和為丸如小豆大每服二十丸以意加減臨臥服熟水下肉棗丸治小兒因疳而瘡侵口鼻肉棗兩枚去核入青礬如核大在內以火煅存性為末麝少許油調塗親用有效黃連散治小兒頭上疳瘡羯羊膽一枚用盞子掰開傾膽汁在盞內看汁多少入好麻油如膽汁許以干竹煎令香熟入鷹爪黃連細末調令得所傅瘡上曾用有效積丁香丸治積熱傷寒烏梅一個切片用土瓦焙乾丁香三個縮砂仁四個去殼巴豆二個去殼用簳子葉包打碎去巴豆油入缽內研爛上除巴外為細末入巴豆研勻卻用研細百草霜和勻麵糊為丸如小綠豆大一歲一丸米飲下積塊不妨常服有功六味三稜丸曠明仲云五六個月小孩兒未吃穀食有癖積者保安丸太重只服此六味為佳莪朮煨銼三稜煨神麯炒麥糵炒青皮陳皮上等分為細末水煮清糊為丸熟水下丁皮散治小兒脾積疼痛有效丁皮白朮茯苓青皮陳皮良薑縮砂神麯麥糵甘草真桂心上各等分為末燒鹽湯點服褐丸子治傷食膨脹新增蘿蔔子炒莪朮炮各一兩胡椒半兩上末糊丸綠豆大每十五丸不拘時煎蘿蔔子湯下五積丸治疳勞諸積新增南星去風積川鬱金去熱積巴豆去油食積肉桂去皮冷積殭蠶去驚積等分使君子為末上面丸粟米大蘿蔔子煎湯空心下熱解肌湯麻黃去節半兩人參川芎北芍藥獨活各半兩前胡一分上㕮咀每一錢水半盞姜一片薄荷一葉煎三分去滓三歲以下二歲以上一服作二服人參羌活散川獨活羌活柴胡川芎白茯苓人參甘草各一兩前胡地骨皮桔梗天麻酒浸炒各半斤枳殼一兩去穰麵炒上㕮咀每服一錢水半盞姜一片薄荷一葉棗半枚煎三分瘡疹未發之先亦可服二方極穩羌活散散風邪止驚搐退熱解肌羌活粉草天麻生茯苓川芎各二錢荊芥穗白殭蠶炒白朮白附子炮各一錢桔梗二錢半防風一錢半全蠍半錢去刺炒硃砂半錢天南星一字熟炮上為細末薄荷湯下如傷風鼻塞流清涕蔥白煎湯下或嗽氣促桑白皮煎湯下常服白湯亦可和解散治小兒四時感冒寒邪壯熱煩躁鼻塞多涕驚悸自汗肢節疼痛及痘瘡已發未發皆可服羌活防風川芎人參乾葛升麻甘草上㕮咀每服三歲小兒一錢水三分盞生薑半片棗子半個同煎二分去滓服不拘時候小麥煎湯治小兒夾食夾驚傷寒正受傷寒咳嗽夜熱晝涼傷風瘡疹之疾大效劉道夫方麻黃半兩去節湯泡白朮炮乾葛三錢半白茯苓甘草各二錢半上㕮咀入麥子二十一粒同煎一方用蔥白二寸煎服天麻散治小兒傷風鼻清涕鼻塞咳嗽身熱並皆治之天麻防風甘草川芎羌活白芷麻黃去節上等分為細末蔥湯食後服木香散能和表裡通行津液木香大腹皮官桂前胡陳皮丁香訶子人參半夏赤茯苓甘草縮砂各三錢上為粗散每服三錢水一大盞生薑二片煎至六分稍熱空肚服量兒大小以意增減甘露散治驚風潮熱不退新增寒水石石膏防風荊芥薄荷甘草上為末每服半錢用井花水下或薄荷湯調下桃花散治驚風潮熱煩悶新增天竺黃白茯苓硃砂腦麝上為末每一字薄荷湯下一日二服脾胃觀音散進食神效白扁豆微炒石蓮肉炒去心人參焙各一分茯苓一錢半神麯二錢炒甘草炙白芷木香炒黃耆捶碎蜜水拌炙各一錢上為末每服嬰孩一字二三歲半錢四五歲一錢用水一藥注或半銀盞棗子半個煎十數沸服六君子湯治脾虛胃弱生風多困人參白朮茯苓甘草半夏曲沒石子上等分為末水七分盞入冬瓜子少許同煎長生丸寬上實下補脾治痰以下並出宿州陳氏方論木香檳榔枳實炒各一兩丁香半夏縮砂肉豆蔻各三錢全蠍二十個上除肉豆蔻外七味為細末次入肉豆蔻研為細末飯糊為丸黍米大一周兒服五十丸隨乳汁下粥湯亦可肚空服訖候半個時得吃乳食日進兩服量兒大小以意增減丸數吐乳食者胃中有冷也乳食不消化者脾虛也大便酸臭氣者飽傷也此三項並宜多服長生丸妙醒脾散治慢驚吐瀉不止新增肉豆蔻檳榔各一個胡椒二十四粒茯苓一錢木香藿香各一錢上為末每一錢用水一盞煎溫服吐瀉附痢疾丁香散治小兒吐乳傷食丁香石蓮肉枇杷葉生薑自然汁炙熟上等分細末米飲湯調下白朮散治小兒嘔吐兼治冷痢常服此藥調理三焦大進飲食白朮丁香肉豆蔻麵裹煨陳皮甘草上等分細末白湯調下慢驚沉困冬瓜子煎湯下若見水即吐進藥不得吐止用棗子點藥干吃調中散治小兒調氣主脾及治吐瀉人參白朮茯苓甘草訶子煨陳皮木瓜白扁豆炒黃耆蜜炙木香罌粟子炒乾紫蘇葉上等分為細末白湯點服藿香散治小兒臟腑不調作瀉青黃黑白乳食不消糞中有凍如雞子清兼暴瀉如水其證肚痛微熱面唇黃白此藥治之慢驚或偏墜紅腫內吊紫蘇湯調下三五服痛止宜用此藥陳皮藿香葉厚朴薑製枳殼去油甘草上等分為細末陳米飲調紫蘇湯下糞中有黃白凍子木瓜並白梅去鹽煎湯下如痢止用棗子煎湯下大能和胃進乳食此是小兒常服藥塌氣丸治小兒脾虛腹脹或疳瀉黃瘦木香二錢半青皮去穰一兩蓽撥胡椒各半兩全蠍五個去毒尖上為極細末調醋糊和丸如黃米大一周兒服五十丸用乳汁下粥湯亦可肚空服服訖候半個時得吃乳食日進二服量兒大小以意增減宿州陳氏方地榆散治諸般瀉痢血痢尤佳地榆訶子甘草上等分細末鹽米湯調服大理中湯治小兒吐乳下痢不止大理中湯入雪糕作細丸米飲下湘中陳伯尹用之有效方豆蔻散止瀉新增肉豆蔻一個麵裹煨青皮陳皮木香白朮甘草一錢草果一個上為末米飲下疹痘疹痘勸戒文小兒疹痘蓋因在胎時食母血穢生下口有餘血生婆取去不盡啼發聲則入腹遇天氣溫熱搏動而發所以大小皆須一出若遇久晴暄暖間有病此其未病者可預服三豆湯能令不發此乃熱病熱極生風或發驚搐但當通心散熱切不可投冷驚藥及著艾蓋灸則火助熱熾投冷驚藥則毒氣內伏反為大害人多用升麻飲然當明其已發未發之說方其身熱昏睡皮膚無跡疑二之間謂之未發及其結痂有諸般熱證謂之已發此二證可服亦不可多若才有形跡及瘡未乾謂之正發則不可服蓋升麻性冷比犀角服多必致陷伏動臟腑況未必有穿者最忌諸般臭穢煎炒油煙父母行房等犯觸未發而觸則毒氣入心悶亂而死已發而觸則瘡痛如割以至黑爛切宜禁戒仍燒帶諸香及打醋炭以防之不可以田舍兒不忌為常法醫書有飲酒法為天寒氣怯者設若天熱氣旺則不宜飲飲多則發瘡斑爛大渴泄瀉本草云酒乃醞釀而成有大熱毒此是熱毒病豈可又飲熱毒物病此者多不服藥豈知未敢已發則合解散正發則合活氣血若依此非惟出疏亦易干斂仍免後慮若不依此則邪盛瘡密收亦費力餘毒為患致便生血癰疽疥癆赤眼咽喉口瘡之類病若經日請醫至當先說病源然後診視庶無差失東坡言之詳矣醫家亦當遵活人書未診先問之說況此病腥臭其肯詳視者幾何人哉克雋家世講習療病垂三十年熟視此弊今撮方書要法以為勸使無夭枉之失幸矣盧陵範克雋伯英施邵倅劉開國大任奉施小兒痘瘡保主方並論多有人不會醫小兒痘瘡今具捷法印施如信用之者但保十全大凡小兒未見出瘡先覺發熱而大便閉小便赤未審委為痘證者但與升麻葛根湯及十神湯以解輕其腸胃中之熱毒若痘瘡既分曉卻有三證一曰好證二曰常證三曰危證今逐項具之瘡不透而肚實者可泡紫草湯量大小與之能解毒透肌若肚滑者不用服好證若乳食與大便如常或一日一次或兩日一次通者此為好證不須服藥亦自愈如要服藥只平和不冷不熱自保十全常證出痘瘡而大便閉小便赤者此是常證可多服升麻葛根湯若大便閉至三日不通者於葛根湯加陳皮一錢紫蘇葉數片煎與服之數次又過日不通者宜以四順清涼飲子熟大黃赤芍藥大甘草真當歸上四味等分煎與之服一歲兒且服一錢重若未通漸加半錢若五歲兒已上每服二錢重若未通更略加之但要大便通毒氣出即安危證出痘瘡而腹瀉不已及小便清者此為危證生料四味理中湯加藿香葉數片及米三十粒濃煎與之頻服待瀉止若多服而瀉不止者即於理中湯內加好附子少許與之或又不止則附子更略加多或又不止只得更向上用藥救之乃得生也人家小兒出瘡為父母者切忌色欲不得熬油不得出廁仍須忌食一切毒物活血散治大人小兒痘瘡已出未出煩躁北芍藥不以多少上一味為細末白湯調下此藥大能活血止痘瘡脹痛屢用屢效湘中黃子發方紫草飲治痘瘡欲發未發或未透者紫草北芍藥去蘆麻黃去節當歸甘草上為㕮咀白水煎服無時發痘出後一向作熱服升麻散新增山梔子柴胡黃芩赤芍藥甘草升麻乾葛上㕮咀薄荷湯同煎人參散治疹痘新增麻黃二錢芍藥荊芥白茯苓人參甘草一錢上為末每半錢薄荷湯下瓜蔞散治欲出痘疹新增瓜蔞貝母荊芥上為末用紫草同煎連三服雜病吊疝茴香散治小兒吊疝大人膀胱疝氣病荊三梭炮茴香炒甘草沒藥上等分為末煎吊藤湯調下蔥湯亦可湘中黃子發方桃仁湯治吊疝幼雛服之取效木饅頭切碎用蔥炒桃仁鹽炒上二味等分細末每服二錢溫酒下治偏墜吊疝方正氣散一貼入吊藤煎服即愈單方治小兒外腎腫痛生地龍放土瓦上研如泥塗患處妙又方生地黃甘草各等分為末煎服立效又方五苓散煎蘿蔔子煎湯調下即愈吉州彭履仲方治小兒腎縮方思村王氏之子生七日兩腎縮一醫云以硫黃茱萸研大蒜塗其腹仍以菵草蛇床子熏之遂愈蓋初生受其寒氣而然立蘇散治小腸氣新增蜴蜥九個去毒馬蘭花二錢水浸一宿木香一錢沒藥半錢胡椒為末上麝香酒下香附丸治膀胱疝氣外腎腫痛新增牽牛炒香附子炒石燕煅紅酒浸研巴豆七粒同牽牛炒去巴豆上末為丸用蓖麻湯下治吊氣方新增鉤藤乾薑甘草上為末湯點下治百二十日內陰囊腫如柿大者新增大黃黃芩黃連黃柏上等分燒留性為末以雄豬膽汁調抹服則消毒散血口舌傅涎膏治鵝口木舌新增黃丹膩粉上為末用蜜調蒸兩次睡時以鵝毛傅舌上透冰散治胸膈熱口內生瘡新增朴硝龍粉甘草一錢上末乾摻入口內治口瘡方新增雞子黃梧桐子二味燒灰刷入口中金花散治口瘡潮熱呷疾新增雄黃牙硝鬱金甘草瓜蔞乾葛上為末一字新汲水薄荷水調下生下滿月以前麻口新增粉草為末國丹煅少許攪勻蜜糖調刷舌上重舌新增真蒲黃為末乾摻腮頰磨風膏治赤腫胎毒在腮頰上新增蓖麻去殼雄黃一錢上先將雄黃碎研卻將蓖麻同勻研水調搽腫處搜風散治腮下腫新增大戟甘遂大黃檳榔牽牛炒一錢青皮半錢上為末每一錢用蜜湯下臍病治小兒臍血出方小兒初生未滿月多啼叫致臍中出血白石脂末貼之即愈未愈微微炒過放冷再貼仍不得剝揭治小兒臍久不幹方當歸為末著臍中頻用自差有一小兒病臍濕出膿及清水者一傅干後因尿入瘡復病又得傅愈五靈丸治臍風新增南星五靈脂一錢草烏為末上用羊膽汁調貼之耳竹屑散治聤耳出膿汁新增蛀竹屑坯子麝香白礬煅一錢上為末吹入耳內未用藥時先將綿子繳了膿汁方用丹瘡治小兒諸般丹毒方出大衍方十便良方赤小豆不拘多少上一味細末以新汲水調鵝毛拂上大妙防風散治小兒身瘡防風大粉草各一錢半川芎荊芥牛蒡子連翹各一錢上為細末每服二錢水一盞煎五分空心服風丹加薄荷下又方以連翹煎下四君子湯單方治小兒頭瘡白膠香為細末入輕粉少許乾摻如濕用油調
