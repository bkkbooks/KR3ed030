body:
  text: 卷之六積聚門附祕結瀉痢腸風痔漏治方黑丸子治長幼積滯湘中黃伯材方烏梅三個去核焙乾生半夏大者五個杏仁五粒去皮尖麵炒巴豆二十粒去油存性上為細末薑汁煮糊為丸緑豆大薑湯下二十丸遇仙丹去一切積滯陳必勝方陳皮去白良薑吳茱萸洗石菖蒲半夏湯泡七次白姜五靈脂胡椒各半兩斑蝥二十一個去翅足同糯米同巴豆炒巴豆二十一粒去殼同斑蝥炒上為細末醋糊為丸如緑豆大每服十丸熟水下或薑湯下馬家五積丸治諸般積聚縮砂仁紅豆黑牽牛蘿蔔子赤小豆丁香已上各一兩同炒令香熱不可焦青皮陳皮香附子乾漆荊三稜大戟桔梗枳殼已上各一兩銼大塊慢火炒令變紫黑色上件共為細末如碾時余得藥頭再炒令黑色再碾為末以好醋煮麵糊為丸如緑豆大淡薑湯下無時候三稜丸化積聚去米麵五穀等積陳倉米一兩巴豆新者五粒去殼同倉米慢火炒巴豆焦色去巴豆不用陳皮去穰一兩半夏半兩縮砂仁麥糵各二錢南木香一錢上為末補麵糊為丸緑豆大每服十丸加至二十丸食後薑湯下食藥三稜丸化飲食積聚陳倉米四兩揀淨以新好巴豆二十一粒剝去殼慢火同炒侯米香熟黃色巴豆黑色去巴豆橘紅四兩去白烏梅肉半兩炒乾縮砂仁一兩神麯三兩作末煮糊上四味為細末用神麯糊為丸如緑豆大每服二十丸薑湯下祕結南木香丸治大便祕結南木香不見火檳榔麻仁枳殼上等分先將枳殼去穰每個切作四片用不蛀皂角三寸生薑五片巴豆三粒略捶碎不去殼用水一盞將枳殼同煮和滾濾去生薑巴豆皂角並不用只將枳殼細銼焙乾碾為末入前木香檳榔麻仁同為末煉蜜為丸蜜湯下不拘時候驅風丸治大便不通或年高風祕皂角七定炮挼水兩碗巴豆四十九粒去殼心膜枳殼一兩上以皂角挼水煮乾為度去巴豆不用炒枳殼為細末入木香半兩蜜丸如梧桐子大每服三十丸空心白湯下蔥白散治老人大便不通蔥白一條阿膠一片上將蔥以水煎候蔥熟不用入阿膠溶開溫服琥珀散老人小便不通琥珀研如粉不拘多少上蜜為丸梧桐子大每服十丸煎赤茯苓湯下甚者加丸數立通如小便純血只以末二錢煎燈心湯下治老人小便不通茴香白頸地龍上杵汁傾臍腹中即愈利氣散治老人小便祕澀不通綿黃耆陳皮甘草上等分為末水煎服自然通治小便不通壅上心滿五苓散一貼生薑自然汁半盞調一方用燈心山茵陳煎湯調服調氣散治老人大小便不通生薑半兩蔥一莖根葉並泥鹽一捻豆豉三十粒上四味搗爛安臍中良久即通輕粉散治大小便祕用大棗十枚卻用真輕粉一匣每一個入粉少許合住用盞子盛紙覆之者湯甑上蒸熟細咀白湯下虛者不宜用潤腸丸治大腸風結氣澀肥皂角十五片五片醋炙焦去皮及子五片生用去皮子二味共為末五片水一升揉取濃汁濾過慢火炒銀石器中熬成膏子入後藥南木香一分青橘皮一分去穰檳榔一分生用陳橘皮一分去白稱上四味為末和前皂角末令勻卻以皂角膏搜和成劑看得所後如硬入少蜜丸如梧桐子大每服三十丸空心溫熟水下治閉結並腳氣方新增大螺以鹽匕和殼生搗碎置病者臍下一寸三分用寬帛系之即通饒醫熊彥誠年五十五歲病前後便溲不通五日腹脹如鼓同輩環視皆不能措力與西湖妙果僧慧月相善遣信邀致訣別月驚馳而往過釣橋逢二異客風姿瀟灑出塵揖之曰方外高土何孑孑走趨如此月曰一善友久患閉結勢不可療急欲往問客曰此易事也待奉施一藥即脫鞋入水探一大螺而出曰事濟矣持抵其家以鹽匕和殼生搗碎置病者臍下一寸三分用寬帛緊繫之仍辨觸器以須其通月未深以為然姑巽謝之熊昏不知人事妻子聚泣諸醫知無他策謾以試之曾未安席砉然暴下醫愧嘆而散月歸訪異人無所見熊後十六年終白石董守約以腳氣攻注為苦或教之捶數螺敷兩股上便覺冷氣移下至足既而亦安瀉痢至聖保命丹治赤白痢晝夜無度真麻油三兩巴豆四十九個黃丹二兩黃蠟四兩上件先將麻油同巴豆用銀鍋慢火熬成色如垺炭黑色去巴豆不用次黃丹煎數沸再入黃蠟熬令色黑滴入水中成膏為度每服一挺重半錢旋丸如緑豆大空心赤痢甘草湯下白痢乾薑湯下赤白痢乾薑甘草煎湯下蘇感丸治積痢不進飲神效蘇合香丸感應丸上二味和合丸如緑豆大每服二三十丸薑湯吞下一聖散治下痢赤白或小便不利淋澀痛罌粟殼去穰蓋洗炒黃色車前子炒上等分為細末每服二錢米飲下乳香散治一切赤白痢或雜色等痢及水瀉乳香二錢甘草四錢草果子兩個炮罌粟殼三十個去穰蓋筋膜令淨蜜炙上為中細末將乳香入乳鉢內勻三味每服二錢水一盞入飯四五十粒煎至六分無時服立有神效御米丸治一切瀉痢肉豆蔻訶子白茯苓白朮各一兩石蓮肉當歸各半兩罌粟殼兩半蜜炙乳香三錢上為末水糊為丸每服三五十丸米飲下如血痢減豆蔻白朮加當歸罌粟殼又方治老人下痢赤白雜色服胃風湯取效金粟湯治痢車前子炒陳皮罌粟殼蜜炙去穰各四兩乾薑一兩甘草半兩炙上㕮咀每服三大錢水一盞生薑三片棗一枚煎七分空心服百靈散治赤白痢罌粟殼去穰蒂用好醋炒陳皮去穰木通烏梅車前子甘草黃連上等分㕮咀每服三大錢水一盞八分生薑三片棗一枚煎八分不拘時服如腹痛加芍藥忌酒面雞魚一切毒物治痢諸方赤熱白寒因暑而得先進五苓散一服澤蘭散澤蘭葉微炒川中謂之筍苗米囊皮薑汁或蜜炙去膜蒿豉以五月五日造青蒿真艾葉等分同豆豉搗亂餅之日乾甘草炮上一服水盞半煎再煉赤加黃連白加乾薑黃連丸治伏熱瀉痢不止田監簿方酒蒸黃連丸用香薷湯下即愈瓜蔞散治五色痢疾久不愈者瓜蔞一個黃色者以炭火煅存性用碗蓋定地下一宿出去火毒上研為細末作一服用溫酒調服胡大卿有一僕患痢半年至杭州遇一道人傳此方而愈煨鯽魚方治噤口痢鯽魚嘴下捻去膽與腸肚入白礬一大豆許同煨熟入鹽醋吃不過兩枚與痢俱效戊己丸治赤白痢真吳茱萸川中者湯洗三兩次黃連去須好酒浸上等分米糊為丸空心下三十丸赤痢當歸黃連甘草湯下白痢茱萸生薑湯肉果散治赤白痢米囊皮炙肉果木香陳皮甘草各三錢上細末分八服白者米湯赤者白湯木香散南木香用黃連水煮至干去黃連取木香薄切焙上為末作三服一炙甘草湯下二陳皮湯下三米飲下黃連散治血痢以上數方順慶朱承事家施人無不效者黃連一味銼碎用無灰酒煎至七分溫服薑茶丸止休息痢大效乾薑炮建茶各一兩上以烏梅取肉丸如梧桐子大每服三十丸食前米飲下地榆散治諸般痢地榆專治血痢地榆訶子甘草上細末鹽米飲調下治諸色瀉痢方蜀醫本夏月臟氣不和而渴宜以香薷湯調胃苓散若有裡急後重宜進胃風湯加枳殼仍以麵炒去穰若有積滯宜進蘇感丸若水瀉宜進酒蒸黃連丸車前散治水瀉車前子炒上每服二錢熱米飲下空心固腸丸治泄瀉三山曾太醫本附子炮去皮切一兩白茯苓一兩乾薑炮半兩大黃連去須打碎木香切片各半兩上水二碗煮乾曬為末麵糊丸每服百粒米飲下棗肉丸治泄瀉兼治腎泄腎泄五更溏泄是也破故紙四兩木香一兩肉豆蔻二兩煨上細末燈心煮淮棗去皮核和丸如梧桐子大每服三五十丸人參薑湯下食稍空或午前鹽酒鹽湯吞下二宜丸治泄瀉五苓散與理中丸同煎服或以五苓散下理中丸亦好二方並載梁氏總要方香茸丸治日久冷瀉乳香三錢鹿茸半兩酒浸炙肉豆蔻一兩每個作兩片安乳香在內麵煨上為細末陳米飲丸每服五十丸空心米飲下豆附散專治脾弱泄瀉不止大肉豆蔻三個麵裹煨附子八錢重者三個炮去皮上件㕮咀分作三分水一盞半姜五片煎八分去滓溫空心服治大便虛滑不禁方平胃散水煎不著薑棗入大理中丸同煎化服便住肚蒜丸治水泄丁必卿雲渠每遇五更必水泄一次百藥無效服此遂安豶獵肚一枚淨洗去脂膜入大蒜在內以肚子滿為度煮之自晨至晚以肚蒜糜爛為度杵成膏子入平胃散同杵丸如梧桐子大每服三五十丸鹽湯或米飲空心下豬肚丸治臟寒泄瀉先用厚朴附子二味薑棗煎早晨服此豬肚丸川烏炮附子炮各四兩乾薑炮白朮厚朴各一兩半良薑炒肉豆蔻煨禹餘糧火煅醋淬縮砂仁丁香桂心各一兩上為細末用豶豬肚一隻淨洗以川椒一兩去目茴香一兩大麴二兩入豬肚內用線縫定酒醋煮爛取出川椒茴香大麴焙乾為末均和前藥以豬肚子杵和得所為丸如梧桐子大每服五六十丸空心米飲下腸風枳殼湯治遠年近日腸風下血枳殼不拘多少燒成黑灰存性羊脛灰為末上枳殼末五錢羊脛灰末三錢和勻用濃米飲一中盞調下空心服五更初一服如人行五里再服見效又方枳殼半斤麵炒去穰綿黃耆半斤洗上為末無時常湯調二錢若難服以麵糊為丸湯吞下之三五十丸即愈芍藥丸治酒毒下血芍藥炒白雞冠花炒陳槐花上等分取青蒿根汁煮丸米飲下黃連丸治腸風下血黃連吳茱萸上各等分同炒令紫色不得過黑去茱萸只以黃連一味軟飯丸如梧桐子大空心米飲下三五十丸日二服更以胃風湯煎如法吞下如聖散治腸風下血等疾萆薢細銼貫衆去土上等分為細末每服二錢空心溫酒調下單方治腸風下血或酒痢亦治大烏梅十個不去仁用火炒令焦上為末五更煮糯米清粥以藥末鋪粥面吃一層粥又用藥末吃粥盡為度橡斗散治便血橡斗子一合內以生硫黃合之紙裹以鹽泥固濟火煅存性候冷上細研空心酒調下二服立效洗心散治血痢趙侍郎方洗心散有一試官入院偶感血痢間有赤白極危一醫人用此藥數服而愈黃連飲治血痢胡黃連烏梅肉灶下土上等分為末臘茶清調下空心溫服聚珍丸治血痢酒痢尤妙川百藥煎半兩薄荷煎兩貼陳槐花半兩炒感應丸一貼麝香少許上件拌勻添蜜為丸男子龍牙草煎湯下女人生地黃煎湯下又方黃連一兩白附子半兩生用刺猖皮一個煅厚朴三錢白礬煅五倍子枳殼各半兩上件為細末艾醋湯為丸男子敗棕灰調酒下女人綿子灰調酒下柏葉飲治便血側柏葉多用入白礬水煮焙乾川百藥煎炒蔓荊子炒上各等分入乳香末濃米飲下兩服見效當歸丸治酒毒下血當歸芍藥炒白雞冠花炒陳槐花炒上等分為細末青蒿根煮汁為丸米飲送下四神丸治一切大便下血香白芷枳殼燒存性川百藥煎燒烏梅並燒存性上等分為末糊為丸每服五十丸空心米飲下熟水亦得痔漏荊芥散洗熏痔疾荊芥熟艾木鱉子去殼各半兩寒水石煅三錢上㕮咀每服用半兩入橘葉四十九皮同煎令香熟卻以有蓋桶子於蓋子上開口傾藥汁在內乘熱熏稍溫則以手澆水略略洗之仍留汁更可用一次有效又方荊芥水洗用明礬為末以米醋調時復自手指調塗然不可大多後用橘葉炒乾去水氣煎湯熏洗便好二方吉州儒醫範柏英傳熊膽膏治久年痔疾熊膽一味塗之瘡上神效又方治痔疾有頭如雞冠者黃連末敷之即效更加赤小豆尤佳石膏熟艾散熏痔疾荊芥木鱉子去殼熟艾各等分軟石膏煅錢半上㕮咀每半兩水三升橘葉五七十片同入瓦罐中渾令香熟卻用小口酒壺盛藥坐其口上熏之如藥稍溫略略洗之無時候其藥汁可作兩日用木鱉散治痔不以內外洗藥木鱉子去殼地骨皮紫金皮當歸枳殼半兩上用黑豆三合先以豆煮軟水五升煎至四升去滓乘熱熏洗一方加樟木皮葉一方有橘葉皆有效厚朴丸治痔厚朴銼生薑各五兩切片水兩碗同煮乾焙之白朮麥糵炒神麯炒各一兩上細末麵糊為丸空心米飲下三五十丸陳詠方二妙散治痔四君子湯黃耆建中湯上各一帖加白扁豆縮砂仁同煎何殿機企顏妙方血竭散治痔瘻痛不可忍者血竭細末用自津唾調塗黃耆四君湯治五痔下血四君湯加黃耆白扁豆薑棗煎服細末尤佳又方橄欖核細末陳米飲調二錢平腸丸治脫肛痔石灰炒熟入熱湯內熏痔候湯溫洗數次卻服沉香流氣飲吞吊腸丸廬陵姚伯源用之有效單方治諸般痔並脫肛白礬飛過用童子小便調以雞毛拂上一日愈三日除根終身不再作亦不忌口劉寄奴湯治痔疾劉寄奴五倍子上等分研為細末空心酒下仍用其末敷乳上遂愈墨雪膏治痔頭熱腫痛不可忍睡臥不安趙尚書方蜒蚰蟲一個腦子一撮上件放在硯上用京墨同磨成水塗上隨手無事又方丁香三粒腦子一錢黃柏皮不拘多少上為末津液調塗上倍香膏治痔疾五倍子燒存性乳香少許降真香少許上為末用津液調少許搽痔上其疼立止治血痔方端午日採躑躅者良用新沙鑊約盛得一升水先以花內入水約八分許將皮紙蜜糊慢火久煎臨疾作時和瓶置之桶內以手指點破紙竅坐桶上熏凡用三次庶蝸牛膏治痔新增蝸牛一枚麝香上用小砂盒子盛蝸牛以麝香摻之次早取汁塗妙
