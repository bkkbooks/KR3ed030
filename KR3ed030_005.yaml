body:
  text: 卷之五痰飲門附咳嗽喘痰餃評人之一身無非血氣周流痰亦隨之夫痰者津液之異名流行於上者為痰飲散周於下者為精液其所以使之流行於上下者亦氣使之然耳大抵氣滯則痰滯氣行則痰行故三生飲佐之以木香無有不效人之氣道貴乎順順則津液流通決無痰飲之患一失其宜則氣道閉塞停飲聚於膈上結而成痰其為喘為嗽為壅為嘔為眩暈為風癎為狂迷為忪悸或吞酸或短氣或痞隔或腫脹或寒熱或疼痛其證不一假如頭風證眉稜耳角俱痛治以風則不效治以痰則收功又如飲酒之人有時臂痛時或麻痹治以二陳湯白丸子消飲丸無不作效療痰之法調氣為上和胃次之故治痰多用半夏蓋半夏性利以其能利痰飲醫者當以意療詳加審問焉治方玉壺丸治一切痰飲大半夏二十五兩雪白南星一十五兩上二件用野外地上清潔水滿滿浸逐日換水浸十日將半夏切作兩片南星大者切作六片中者作四片再逐日換水浸五日足每五兩研細末生白礬一兩添半夏南星則亦添礬卻用井水浸須令水滿只以此水浸一月日取些半夏或南星嘗看以不麻為度如尚麻更浸候不麻漉起曬乾和腳下水浸礬碾細收之每末七兩入全蠍七個炒白附子二錢半炒為末甘草二錢炒和勻用炊餅乾末三兩半用生薑半斤研取自然汁煮炊餅末和為丸如梧桐子大或干添些白湯為丸每服二三十丸隨意咽下亦可此藥不問是何證候痰涎作壅或有異證風證小兒驚癎之類應手而愈多服之勿妨勿拘二三十丸之說以薑湯白湯或藥咽下皆可無病人咽服二三十丸亦佳永無痰證永嘉陳資政防親傳妙甚半夏湯治痰飲南星半夏各四兩生薑半斤皂角二定上以白水淹過得藥一寸許同煮乾仍用溫水浴過銼片日乾為末入丁香縮砂各半兩甘草一兩半再入熟粟米粉半升空心沸湯點服贛上羅監稅方煮浮丸治痰壅眩暈南星生半夏生防風天麻面生上等分滴水為丸如梧桐子大先煮湯令沸滾方下藥四五十丸煮一二滾藥浮即漉出用薑湯吞下不拘時玉浮丸治痰吐頭痛極妙天南星削去皮半夏各一錢半陳皮去白白朮茯苓附子去皮臍各一錢上件各生為末用生面隨多少拌勻生薑自然汁丸如梧桐子大用滾湯煮熟次用煮藥現成湯加生薑自然汁下二十丸不拘時候趙魯公方玉液湯治痰疾趙魯公方半夏用揀好者不拘多少湯洗白淨切作片如紙薄用上每服半兩水二大盞姜三十片慢火煎至七分濃磨沉香水一茶腳傾入藥內再煎兩沸食後臨臥時服白朮丸治痰飲以久服多服而後效白朮八兩半夏湯泡七次赤茯苓去皮乾薑肉桂去皮枳殼麩炒各二兩上為細末生薑自然汁煮麵糊為丸如梧桐子大服多至二百丸日三服參苓散治停痰宿飲自吐出痰後心胸間氣虛氣滿不食茯苓人參白朮各三兩枳實炒二兩橘皮一兩半上㕮咀薑棗煎空心溫服新增靈砂白丸子治元氣虛弱痰氣上攻風痰潮塞嘔吐不止靈砂研細青州白丸子各一兩為末二味和勻以生薑汁煮秫米糊為丸如梧子大上每服二十丸空心用人參湯或棗湯下新增咳嗽加減三拗湯治傷風咳嗽麻黃半錢不去節沸湯洗焙乾去毛杏仁不去皮苦梗各二錢甘草生旋覆花去蒂各半錢上㕮咀每服一大錢水一盞生薑一片五味子數粒竹葉一片不可多糯米數粒煎至半盞分作兩服食後溫服梁國佐傳二妙丹治男子婦人因思慮之極喘滿痰涎作聲生薑汁調蘇合香丸仍用二陳湯加枳殼木香煎調蘇合香丸下養正丹五十粒梁國佐取效方杏仁湯治積年嗽阿膠蚌粉炒罌粟殼蜜炙白礬飛過杏仁去皮尖上等分四味粗末三大錢水一盞姜三片棗一枚蔥白三寸煎六分臨臥時臥少頃喚醒始服此藥半夏湯治嗽半夏二十一個每個切作四塊煨姜一塊煨甘草一寸煨皂角一寸煨無蟲蛀者去皮上為粗末水兩碗煎一碗服一服散治暴嗽阿膠二片生薑十片大烏梅二個甘草一錢紫蘇十葉杏仁七個去皮尖大半夏三個泡罌粟殼三個炙上用水一碗煎至六分去滓服臨臥治肺熱久嗽方枇杷葉木通款冬花紫菀杏仁桑白皮各等分大黃減半上如常製為末蜜丸櫻桃大食後夜臥含化有婦人患肺熱久嗽身如灸肌將成肺勞服之未終劑而愈本草衍義參芎湯治男子婦人一切虛證冷嗽人參川芎甘草炙白朮白茯苓北芍藥白豆蔻仁炒當歸酒浸焙黃耆蜜炙肉桂去皮各半兩罌粟殼蜜炙五味子各一兩上㕮咀每服三錢生薑三片棗二枚水一盞半煎至八分空心服湘中黃應明三世用之有效杏仁煎治咳嗽失音不出杏仁去皮尖研三兩生薑汁蜜砂糖各一兩半桑白皮木通貝母各一兩一分紫菀五味子各一兩上將木通貝母紫菀五味子為銼散用水三升煎至半升入杏仁砂糖蜜薑汁再煎成稀膏每服挑一匙頭含化更加款冬花知母各一兩尤好石夏丸治痰嗽鄂諸孟少師府方半夏一兩泡滑石一兩火煅去火毒上生薑糊為丸如梧桐子大不拘多少白湯調下南星末治痰疾咳嗽許六五郎方曾用醫李夫人見效速大南星一兩銼成片用生薑半斤取汁文火炙乾卻入蜜半匙直炒黃色取出為末上入貝母末半兩每用放掌心以舌尖點咽下阿膠散治痰嗽氣滿甚有神效阿膠麵炒甘草炙桔梗紫蘇子杏仁各一兩南木香二錢半白膠香半夏制五味子各半兩罌粟殼四兩蜜炙晉礬飛過半兩上㕮咀內杏仁每服煨七粒去皮尖嚼爛煎藥咽下臨臥服鍾乳散治寒嗽不止鍾乳粉人參阿膠炒上三味等分為末糯米飲下五味子湯治寒嗽益肺五味子胡桃肉各一兩半生薑五兩去皮甘草杏仁各一兩上將五味子四味於鉢中爛研如泥同甘草末再研令得所入磁閣中取沸湯調服加人參尤妙葶藶湯治肺壅氣喘急不得臥葶藶子三兩炒上一味大棗三十枚水三升煮棗取二升又煎取一升去滓並二服神效出本草出聲散治肺損失音訶子四個炮二個生用二個甘草二寸炮二寸生桔梗一兩上㕮咀每服二錢用童子小便一盞和藥煎五七沸溫服甚者不過五服出十全方金露飲平順肺氣人參白朮五味子各三錢甘草一錢上為細末每服二錢白湯調下出雞峰方胡桃散治嗽生薑二錢人參三寸作四段胡桃二個去殼上以夜則含在口中立效名醫何元弼傳出夷堅志海藻散治咳嗽胸中不利痞滿短氣心中時悸手足煩不飲食時惡寒海藻赤茯苓五味子各半兩半夏北細辛杏仁各三錢半上㕮咀生薑煎食後服甚妙治熱嗽方熱嗽痰濃鼻熱腥氣飲冷水而暫止者宜以小柴胡湯治之治冷嗽方寒嗽痰薄呷熱湯暫止者宜理中湯加五味子赤茯苓湯治停飲於胃怔仲不已蜀醫蒲氏方赤茯苓去皮半夏泡茯神去木陳皮麥子各一兩沉香甘草檳榔各半兩上㕮咀每服三錢水一盞姜五片煎七分空心服取效三聖飲治痰嗽苦梗用百合子根煮一伏時甘草貝母薑汁炒上等分細末熱酒調服如作㕮咀則用姜煎亦可蕭行之方人參飲子治寒壅痰嗽人參苦梗半夏曲五味子白朮赤茯苓各一兩枳殼炒甘草各半兩上㕮咀每服三錢水盞半姜五片煎七分空心服寒暑之交氣盛人衣厚作壅忽痰盛微發熱此藥最宜若作感冒發汗攻邪必成大病此方佳處乃在赤茯苓導心熱枳殼疏肺壅故易作效載治未病方神效散治一切喘嗽皂角一條作兩邊去子每孔入巴豆肉一粒線系定童子小便浸一宿火上炙令焦黃去巴豆不用或入一二粒亦不妨卻以杏仁半夏各一合入麻油內煎令坼裂為度同為細末每服一字乾柿點藥細嚼或用白糖點吃亦可臨臥時服服了不可吃湯水一應物妙不可言紫菀湯治痰嗽喘急出傳信方紫菀一兩百部半兩款冬花一兩上為末每服二錢姜三片烏梅一個煎一二沸食後服洗心散治心熱胸膈滿咽乾咳嗽方見後喘喘有冷熟方論人有喘疾不可一概治之須分陰陽病發於冬寒冷病也病發於暑月熱病也冷病服豉霜丸清中湯煮肺散熱病服青杏蛤蚧丸之類孫大資梓朴湯不拘冷熱皆可服水喘方論有人先因咳嗽發喘胸膈注悶難於倒頭氣上湊者宜早利水道化痰下氣若不早治必成水喘宜服紫金丹病人水在膜外切不可針針透膜初時稍愈再來即不可治坎離湯專定喘湘鄉何元弼方蓽澄茄石菖蒲各半錢白朮茯苓木香各一錢甘草半夏泡七次紫蘇子各二錢水一盞半煎不用姜疏鑿飲子下氣定喘道泉消腫人參木通半夏附子炮草果仁木瓜秦艽檳榔杏仁赤茯苓連皮橘紅各一兩厚朴一兩半木香甘草各半兩上㕮咀每服半兩水一盞半生薑七片煎至八分去滓不拘時候南康嚴子禮方銼散五味子治肺寒理喘下氣陳皮三錢乾薑半兩甘草半兩官桂茯苓五味子各一兩上㕮咀每服半兩水一盞煎六分去滓服八寶丹治痰實發喘朱佐方雄黃雌黃硃砂信砒並生用白礬飛過緑豆粉生黑豆生巴豆去油皂角炙去黑皮各一錢上為細末煮糊丸如緑豆大磨刀水下一丸至三丸加減滲濕湯先用靈砂合來復丹服若只單服靈砂則祕合服則通次用後藥嫩蒼朮三錢炒白朮三錢赤茯苓四錢丁香縮砂仁木瓜神麯綿姜陳皮草果厚朴制炒各三錢甘草二錢半上前藥㕮咀薑棗煎厲端明得喘疾醫下痰疏導之藥引客邪入腎經而兩足並外腎發腫有僧云此脾腎虛用此則大小便自流利定喘湯治發喘人常有此證非感外邪而得緣小年吃冷物太過用分心氣飲下黑錫丹極有神效養氣丹治男子婦人氣喘滿上煎蘇子降氣湯下養氣丹鯽魚丸治齁喘鯽魚重一斤者不去鱗腸只於肚下近頭處開一孔入信石一塊重一錢令深入在內卻以魚入竹筒內外以青蒿搗泥固濟候乾火煅竹筒通紅候冷出泥取魚去燒不過者研細入蚌粉三錢研得所研如緑豆大硃砂為衣每服四丸或五六丸砂糖冷水下臨臥服之服後忌熱物棗杏丸治喘大棗五十個去核葶藶黃者二兩微炒杏仁二兩去皮尖上搗細取棗肉研成膏為丸如梧桐子大每服三十丸桑白皮湯下當令人大便鴨溏不妨黃牛散治肺熱脈滑大氣急喘滿大黃一兩白牽牛二兩上為末蜜水調二錢立止又用皂角膏為丸亦可麥花散治肺氣脹實喘急胸滿大麥面蕪花醋浸一宿煮乾炒上等分為末每服一錢柳枝煎湯調服食後
