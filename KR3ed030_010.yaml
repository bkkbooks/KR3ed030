body:
  text: 卷之十婦人門調經紅花散治婦人女子經脈不通如血膈者二十服效好紅花細擘蘇枋木捶碎當歸上等分㕮咀每用一兩以水一升半先煎花木然後入酒一盞並當歸再煎服半升分兩服空心食前溫服千金失笑散治室女經脈不通當歸尾沒藥上等分每一大錢炒紅花酒面北呷之防風散治女人經脈不勻氣血壅滯肺有風熱遂令遍身癮疹紅紫成片肌肉頑痹皮膚粗澀或時瘙癢北防風川當歸赤芍藥牛蒡子各一兩炒荊芥穗一兩二錢蟬蛻七錢半去土生地黃香白芷甘草白附子白殭蠶去絲何首烏烏蛇肉酒浸去皮骨焙乾稱以上各半兩紫參七錢半上件為細末每服三大錢加至四五錢溫酒調下如不飲以蜜湯調服終不若酒之有功神授散調婦人經藥專治室女月經不調變生百病誰家女子深閨里榮衛不調阻經水神仙有藥救世人兔使成勞滯魂鬼當歸芍藥蓬莪朮神麯麥糵並青橘三稜一味最深功能破血瘕與血積七味細羅溫酒下壯者二錢少者一一方留神麯作糊丸如梧桐子大大聖散治小産下崩不止忽大渴飲水則吐藥食不進命在須臾一醫用後藥一服吐住荊芥末半錢合大聖散用白湯點服聚珍丸治婦人小産後虛羸百節疼痛不進飲食百藥不效者艾煎丸卷柏丸茴香丸烏雞煎丸巴戟丸上五藥合作一藥鹽湯溫酒任下兼服沉香荊芥散加味四物湯治婦人經候不通口乾頭暈嚴醫云此肝血熱證四物湯加菊花煎服立效歸芎丸治婦人月候不通陳皮當歸各三兩延胡索一兩上細末糊為丸每服五十丸米飲下胎前鐵罩散安胎孕縮砂一斤和殼炒六七分焦去殼用仁香附子二兩炒上為細末食後白湯點服如胎動出血用阿膠艾葉湯調服阿肢散安胎孕治腹痛或下血水張氏究原方桑寄生七錢半阿膠十兩炒艾葉二錢半上㕮咀每服四錢水一盞半煎熱服不拘時又方芍歸湯加桑寄生半水半酒煎服安胎散治妊娠從高墜下或為重物所壓觸動胎氣腹痛下血縮砂不拘多少於尉斗內炒令熱透卻去皮取仁研上為細末每服二錢熱酒調下艾鹽湯米飲亦可不拘時信庵趙太師親授此三方用之果有奇效六物湯安胎和氣腰腹疼重惡露頻下大衍方阿膠炒糯米炒黃耆川芎當歸熟地黃酒洗焙各等分上粗末生薑三片蔥白一個水一盞半煎七分空心服瘦胎飲子自九月十月服此永無驚恐香附子炒四兩縮砂炒三兩甘草炙一兩上細末米飲調二錢三山曾太丞方良薑湯治妊娠卒中惡腹痛悶絶良薑莪朮各等分上細末溫酒調下育胎飲子治妊娠胎動不安或腰腹疼痛覆盆子阿膠蛤粉炒各三錢桑寄生艾葉炒白芍藥當歸人參各二錢上㕮咀每服四錢水一盞半糯米百粒煎至八分去滓食前服芎藭散治婦人胎動下血不可忍桑寄生半兩芎藭當歸各一兩上為末每服二錢酒水各半煎服克效散治漏胎五倍子一味為末酒調下又方用蓮子房消化以麵糊丸湯酒任下加味佛手散治婦人妊孕三月忽然心腹脹痛下血兩小塊醫者意其已下血訖必無胎了腹復脹痛如前服奪命丹琥珀散其脹痛尤甚遂服佛手散加枳殼見效粱國佐方罌粟湯治婦人妊娠痢疾裡急後重百藥不效罌粟殼甘草烏梅上等分㕮咀白水煎服立效枳殼散治孕婦不省人事謂之子癎滑胎枳殼散生藕汁調下無藕則用蘿蔔汁生薑汁亦可治産內小便不利心腹脹滿蔥白五寸燈心麥門冬各少許荊芥七穗姜五片水二盞煎一盞不拘時非時發熱變成風氣攻手足抽動用金銀耳環並薑棗煎溫服傷寒鼻塞用蔥白五寸煎神應散治妊娠臨産腹痛成陳眼中見火新增香白芷百草霜等分上細末研勻每服三大錢以童子小便米醋各少許指研成膏熱湯調服連進二服即下護胎法治妊娠時氣熱病新增干浮萍朴硝大黃炒蛤粉炒蘭根上為末水調三錢貼臍上安胎解燥熱極妙催生催生論竊謂妊娠之要可慮而難治者三其不必慮而不必治者一惑先人之言泥卜巫之說或因夢想而有疑或因見聞而致危疑之念食息不忘則心氣失所主矣夫心主血血不調則神傷神傷則臨産之時豈復寧謐此其可慮難治者一也婦人女子性最執戀又多暗損不知事體或畏産育之多私求毒藥欲為逐去之舉不思此等自有定數設逐而墜去則固幸也逐而不動未免憂懼日增或至泣涕蹙額朝暮以死自危夫和氣致祥乖氣致異臨産之時豈復有美證者或去血而胞干或心虛而神亂此可慮而難治者二也臨在産時務在使人不覺切戒揮霍以生異變活血藥當進於腰腹疼痛未甚重之先催生丸散當進於腰腹趁痛不可忍之後勿久坐以傷胞勿驚思以動血粥食頻進使飢飽適中扶護行立使筋力不疲勤用醋炭庶使産母鼻不絶醋氣勿進酒藥産母乘虛而易昏房戶周密無諸穢惡則産理安全無復他患偶然自惡經延三五日亦未見其為害也惟不經事之人及有人家久無産育一時不能諳歷臨事之時又無老成人多成揮霍未痛甚而藥已交進稍痛增而喧鬨倉皇致信看待人妄用手法驚觸元氣或奔心而不下或破膜而傷枕遂致子母俱斃繄誰之咎若此類者良醫束手藥石無功此其可慮而難治者三也凡産育之後兒身一下即服小黑神散或用童子小便調七寶散又其次如琥珀散其衣即下今人多於産後不暇吃藥只以本發令其咀嚼心惡嘔噦衣亦即下此亦良法衣或未來停寧稍久恐疲産母之力宜急切斷臍帶以小物系墜其子氣脈既不潮胞當自萎縮而下縱雖淹延數日自壞産母心懷安泰亦不害人此其不必慮而不必治者一也今之人每每視三可慮而難治者則蹈之以不覺以産後衣不即下不必慮而不必治者往往倉皇無措看生者至於繆庸無知妄用手取法則非惟衣斷不下而母亡者有之矣豈不甚可痛也夫産經云母生子訖血流入衣中為血所脹治之稍緩脹滿腹中上衝心胸疼痛喘急必致危困蓋為不斷帶而言也斷帶遲則有此證只宜進奪命丹活血丹及黑神散亦自然縮下必不殺人産後母已虛乏宮戶傾損正恐藥食少入而陰冷下乘亦自足以致血沖血暈之疾看生不知又欲用手探取以損其腹家人設用虛言則未害也愚庸者得於傳聞真謂手可探取令産母心內驚縮百無一活可不為之哀痛者請復以余所親見者驗之慶元丙辰春本邑城上周氏生女經一時而衣不下其姑為斷帶洗兒周氏貧且愚不暇他問即汲水自洗越七日績間忽墮下一拳大如破衣狀而血裹之前後見效如此不一而足壬戌之夏先子捐館適後妣張氏有遺腹數月哀摧大變已自耗傷氣血及期産訖而衣偶未下豫適在二百里外一日夜奔走抵本家輕信里嫗妄用手取法已不可救痛憤徹骨思不孝之咎無以自贖因遍閲産科猶未載衣下不可以斷帶而無必死之證願罄所見校勘諸方以告來者然猶未敢自以為是遂於是年十二月二日默請於天地神祇如豫有一慮之得則乞明示夢響以決所疑是夕夢及亡妣居一室如官府直舍據床臥病侍者環側余經營藥餌以進亡妣便覺蘇醒旁有一人云可謂孝子耳間聞直舍外有數道士步虛聲而寤是用殫心竭慮敷陳肺肝上以寓無窮之哀下以救無窮之失凡事之屢效敬縷數之使睹者之易信言之不文使觀之易悟有識之士幸無誚焉此論不知何人所作但見其說甚通梁國佐傳硃砂丸催生救危急硃砂半兩研乳香一兩研上為末須用端午日取豬心血丸之如梧桐子大每服一丸乳香湯下立産催生湯妊婦欲産痛陳尚疏難産經二三日不生胎死腹中或産母氣乏委頓産道乾澀才覺痛密破水便可服異功五積散上細末每服一大錢溫酒下若覺熱悶以新水調白蜜服或㕮咀入醋一合煎能飲者加酒半盞近代名醫以五積散易名催生湯用之多驗黎景仁以為若寒月用之甚為的當隆暑之時恐難輕服不若以五苓散用葵子燈心煎湯調下卻暑清魂滑胎易産所施輒驗如胞漿先破則胎干難産用白蜜生麻油等分浸以熱酒令得所頓服胎氣既潤即分娩矣出黎氏簡易方麝香散治産難橫逆生麝香一錢鹽豉一兩用青布裹火燒令紅以乳鉢研上為細末取稱錘燒紅淬酒調下二仙膏救婦人産難橫生倒産一切危險不能産及死胎不下者親試有效真麻油好白蜜上二味各半盞煎沸急取起候溫作一服即時下又方催生蛇蛻皮一條燒灰存性榆白皮煎湯調下催生神驗散胡氏經效方産婦坐草時取路旁舊草馬一隻用鼻絡小耳繩燒灰溫酒調服如得左足者男右足者女覆者兒死側者有驚自然理也此藥似非切要催生極驗下死胎方治胎死腹中用芎藭為末熟水調下又方下死胎用朴硝為末以二錢溫童子小便調下又方單桂飲下死胎肉桂為末上每用麝香當門子一粒同研溫酒調服須臾如手推下産後黑龍丹治婦人産後一切惡患諸疾垂急者妙不可言當歸五靈脂川芎良薑生乾地黃各二兩上各淨洗銼入砂合內以赤石脂泥縫再用紙箸鹽泥固濟以炭十斤煅通紅候取看如黑糟色乃藥成也細研再入百草霜五兩硫黃紅老色者滴乳香各一錢花乳石琥珀丸燒通赤以生薑自然汁無灰酒各一合童子小便半盞攪調投藥於中研化頓服産後垂死開口灌之難産者服之立生血氣攻衝灌者即下此方張提舉得之戴教授屢有效驗血竭散治産後敗血衝心胸滿氣喘命在須臾宜服此真血竭研上細末三錢溫酒調服病勢危篤者盡二兩可活一人凡産後敗血衝心皆因惡露不下始則胸中微滿動加喘急者為難治産寶所載諸方皆無如此藥神速宜久蓄之以備急用醋墨法治産後破血才産用好真松墨半鋌火燒赤投醋中如此三遍地上出火毒研羅細每服半錢淡醋湯調服百草霜散治産後下血不止細面微炒百草霜上二錢用無灰好酒調服極妙團參散治産後惡血未盡渾身憎寒發熱小腹攪刺疼痛心氣膨脹不納飲食面目虛腫腳手浮腫耳聾眼暈腰痛乾薑七錢炒蒼朮炒天仙藤甘草川烏北白芍藥北細辛各一兩麻黃去節上㕮咀每服三錢姜五片棗一枚荊芥七穗水煎七分通口服病者只吃白粥及豬肝此藥臨産斷手卻服三日趕惡血盡畢亦可以暖藥補之即用後青棗散養新血此方乃黃常卿家本柑皮湯治産後發渴經脈過多發渴者亦治柑子皮焙乾上為末白湯調三錢許服其效莫述千金方云産後發渴速覓柑皮甲子歲趙冀公傳於金陵榴附飲治産後瀉酸石榴皮米醋炒香附子上二味為末每服二錢米飲下單方治産後虛汗防風不以多少麩炒赤色為末煎豬皮湯下雙俱散治産後腰痛石菖蒲一兩當歸半兩上為末每服三錢熱酒調下空心烏藥散治産後腹痛天台烏藥杜當歸上為末豆淋酒調下白及膏治産後鼻衄白及上為末冷水調敷在紙上貼鼻心而效後用燈盞數只熱湯煮過數時更替覆頂心劉司傳云有奇效殊不可曉枳朮湯治産後心腹堅大如盤水飲所作名曰氣分枳實一兩半白朮三兩上㕮咀每服四錢用水一盞半煎至七分去滓服治産後咳逆方石蓮子十個炒熟丁香十粒上細末用水三合煎十數沸溫服孤鳳散治産後閉目不語白礬末熟水調服沒藥散治産後百疾沒藥血竭各等分上細末每服二錢用童子小便合酒半盞煎一沸溫調下才産一服上床良久再服其惡血自循下行更不衝上免生百疾梁氏總要方血氣附諸痛十味養榮湯治婦人氣血不足臍腹疼痛月水不調熟地黃酒洗黃耆蜜炙各二兩半牡丹皮炒五味子肉桂去皮白芍藥炒白茯苓各一兩當歸酒浸川芎各一兩半甘草七錢炙上㕮咀煎服沒藥散治婦人血氣疼痛沒藥紅花延胡索當歸上等分細末酒並童子小便下四神散治男子婦人一切氣痛不可忍者白芍藥良薑煨甘草炙各一兩香附子一兩半炒上為末每二錢酒調服煎亦好水瀉紫蘇生薑煎赤白痢米飲下活血飲子治婦人血氣衝心當歸菖蒲上二味等分為細末酒調下一錢香桂散治婦人血刺心腹疼痛當歸肉桂各等分上為末每服二錢水一盞入醋少許煎七分空心熱服通膈散治婦人心腹刺痛寒熱往來蓬莪朮延胡索北芍藥當歸川芎甘草牡丹皮上等分細末每服二錢姜酒調服分經散治婦人血氣心痛及遍身手足疼痛及經血不通並皆治之紅花蘇木乳香沒藥敗姜薑黃當歸芍藥川芎木通甘草蓬莪朮煨生地黃延胡索牡丹皮凌霄花上為細末每服二大錢空心溫酒調下一日三服加血竭玳瑁尤佳湘中黃應明三世業醫用之有效大烏金丸治婦人心腹刺痛身體疼痛産前噁心産後惡露不下疼痛不已如經盛行則去白芷延胡索當歸熟地黃白芍藥川芎附子肉桂沉香各一兩延胡索粉草香附子乳香縮砂仁敗姜白芷蒲黃薑黃檳榔各半兩白茯苓丁香白朮各二兩沒藥人參各二錢上細末酒糊為丸如彈子大百草霜為衣每服一粒當歸酒下或嚼姜嚼下或作梧桐子大則加丸數真有奇效延胡索散治婦人血氣攻心痛不可忍並走注蓬莪朮半兩麻油煎乘熱切片子延胡索二錢半上細末淡醋湯調下空心加味建中湯治女人虛敗腹痛用黃耆建中湯加當歸琥珀木香煎見效神保丸治婦人小腹痛服諸藥不愈遂服神保丸利數行而愈又有婦人小腹痛服經進金露丸而愈此不可不知神功八味丸治中年婦人氣衝心小腹痛飲食不納脈沉緊左尺虛遍藥不效梁國佐方蘇子降氣湯下八味丸此藥自合方好加味四物湯治經候不調腹中疼痛或腳氣衝心四物湯加琥珀煎見效並醋一合煎立效單方治婦人遇月經來則小腹痛腳膝疼遍服藥不效香附子半酒半醋浸焙又浸炒上為末或為丸任空心下病猶未除後用艾膠湯加少許附子並此藥服梁國佐已效方香附子飲治婦人真心痛大範張醫方良薑麻油炒蒼朮鹽炒香附子石灰炒各等分上為末用燈心煎湯空心調下加味四物湯治婦人欲念不遂心膈迷悶刺痛四物湯一貼加橘紅香附子延胡索各半兩血崩二妙散治婦人血崩平胃散四君子湯各二貼先合煎數服然後吃後藥三灰散敗棕棕皮桂木葉上化灰存性每服二錢酒煎至七分空心服要為丸酒煮糊丸黃丹為衣四神散胡椒四粒血柏樹根嫩者一兩甘草半兩細葉禾甌根一兩上㕮咀每服二錢酒煎三沸通口服大忌雞鴨子及一切毒物三方得之周道人親見其醫數人不可以草藥輕之五倍散治血崩奇絶五倍子半生半熟等分為末冷水調二錢空心服荊芥散治血崩年深只一服即效荊芥根瓦上焙乾焦存性茴香各等分上為末每服三錢溫酒調下豐泉梁國佐方獨勝散治血崩纍收效防風去蘆不以多少炙焦黃色上為末酒糊丸空心日二服單方治婦人月崩諸藥不效五靈脂十兩用酒淘去砂石熬成膏上入神麯二兩為丸每服三五十丸空心溫酒下兼服四君子湯加肉豆蔻並和氣藥平胃散治血崩遍醫不效一道人用後藥服者有效平胃散但其中厚朴一味焦炒如煤其餘制度並依本方單方治血崩不止定器碗碟不拘多少極細為末上以糯米糊為丸每服二三十丸米飲下加味平胃散治婦人脾血不固崩漏平胃散五貼用酒煎馬蘭草空心點服玉芝散治血崩桂制屬經驗方香附子半生半熟代赭石上為末用酒調下大瘕崩者煎服又方感應丸約二寸長用豬連貼二寸長剖開安感應丸在內濕紙裹煨待熟細嚼無灰酒下甚妙加味佛手散治血崩佛手散加蒲黃服之取效如勝散治血崩棕櫚燒烏梅乾薑各一兩並燒灰存性上細末二錢烏梅湯調下空心服久患三服愈沒藥散治婦人月信退出皆為禽獸之狀似來傷人先將綿塞陰戶只頓服沒藥一兩餘作丸散皆可服即時愈出張氏雞峰方頃有莊婦病此危甚其夫來告急録此以與旋即痊帶下小陰丹治婦人赤白帶下月候不調諸虛不足當歸白芍藥各四兩白朮茯苓藁本白芷延胡索各一兩熟地黃酒蒸牡蠣草鞋包煅各半兩人參沒藥各二錢甘草炙南木香各一兩赤石脂煅七錢大附子一兩炮去皮臍蠶退紙燒以多為貴上細末煉蜜為丸如彈子大每服一丸空心酒服石脂散治白冷精帶下陰挺脫出或青黑黃白彈下攻痛腹悶頭旋眼暈耳聾啾啾痰上壅赤芍藥四兩炒乾薑香附子二兩上細末每服三錢空心酒下如帶赤冷即用陳米飲下煎阿膠艾湯尤妙若要順氣加茴香白芷散治婦人帶下腸有敗膿淋露不已腥穢殊甚遂至臍腹更增冷痛此蓋為敗膿血所致卒無已期須以此藥排膿載本草衍義白芷一兩單葉紅蜀葵根二兩即單答古梅根無則以蘇木節代之白芍藥白礬燒枯別研各半兩上細末同以蠟丸如梧桐子大空肚米飲下十丸或十五丸候膿盡仍以他藥補之黑附散治血海虛損淋瀝不斷心腹疼痛或産內用力過度或産內使性氣或食生冷乾薑烏梅各一兩棕櫚二兩燒存性上細末每服三錢陳米飲調下煎烏梅湯下亦得如血過多阿膠艾一塊水一盞煎至七分空心服衆疾增損四物湯治婦人諸疾當歸白芍藥川芎熟地黃各五兩上為銼散每服三錢水一盞半煎八分去滓無時通口服孕婦下血腹痛加艾葉阿膠一分煎産後虛弱血臟不調口乾渴飲水加瓜蔞麥門冬各三錢用腹痛惡露不下加當歸芍藥各一錢或加沒藥血崩不已加地黃蒲黃各一錢因熱生風加川芎一錢柴胡半兩身熱脈大項強加柴胡黃芩各二錢或加茯苓煎大便祕澀加大黃二錢桃仁一分炒泄痢加桂附子各一錢寒熱加乾薑牡丹芍藥各一兩嘔吐加白朮人參半兩腹脹滿加厚朴枳殼實各一錢虛煩不得睡加竹葉人參各一錢渴加知母石膏各半兩水停心下微吐逆加豬苓茯苓防己各一錢虛煩狀似傷寒加人參柴胡防風各二錢以上並用水煎服此法大治産前産後衆疾如神加防風熟乾地黃各一兩治男子婦人諸般風氣毒瘡加地骨皮二兩白茯苓一兩治男子婦人骨蒸勞氣此方乃善養守元氣得之巢先生大有神效高道貴云患風疾及渾身燥癢以四物湯青汁調消風散甚妙産前漏胎加艾阿膠糯米煎性熱加荊芥煎服即愈治婦人欲念不遂心膈迷悶刺痛每服一帖加橘紅香附子延胡索各半兩煎治經候不通腹中疼痛或腳氣衝心加琥珀煎見效並醋一合煎立效治婦人血旺腳痛加五加皮煎服治婦人血熱生瘡加地骨皮香附子煎服治婦人經候不通口乾頭暈是肝血熱加菊花煎服立效治婦人百病吳興周端仁云加吳茱萸若陽臟少使陰臟多使有驗治婦人臂疼又如癱瘓是血證加紅花煎服效繹皮丸治婦人百病大有效驗當歸四兩淨洗好酒浸一宿漉出焙乾再浸酒盡為度赤芍藥人參白芍藥肉桂去皮白朮益智仁白薇五靈脂附子陳皮青皮各二兩牡蠣煅赤石脂香附子去尾尖延胡索牡丹皮去木蒼朮敗姜荊三稜蓬莪朮劉寄奴艾葉澤蘭生地黃干熟乾地黃各四兩蒲黃三兩隔紙炒雄黑豆十兩丸小者上件將蒼朮敗薑陳皮青皮荊三稜莪朮劉寄奴艾葉澤蘭小雄豆等十味用好醋煮藥候黑豆爛熟為度醋少又添煮為佳焙乾和衆藥為細末以醋煮麵糊為丸如梧子大每服四五十丸空心姜酒或艾醋湯下有孕不可服薤白湯治婦人血虛勞倦鹿角膠當歸黃耆肉桂乾地黃石斛木香白朮白茯苓鱉甲醋炙秦艽川巴戟柑子皮各一兩牡丹皮天仙藤甘草各半兩人參二錢枳殼三錢上㕮咀每服三錢水一盞半生薑九片薤白三寸煎七分去滓空心服歸艾丸治婦人平生無子服之屢驗蔡相藥方生地黃一斤淨洗生薑一斤淨洗各用砂盆研爛如交加散法淹一宿銀器各炒乾入後藥白芍藥白茯苓延胡索當歸去蘆浸各二兩熟艾三兩醋調面成餅甑上蒸熟焙乾上除艾葉外各焙乾為末入前件地黃生薑作一處煉蜜丸如梧桐子大每服五十丸空心酒下一日三服小黑神散又名勝金散治産前産後皆可服大能活血定痛消逐利積亦治橫逆香白芷炮半兩百草霜細研二錢半上二味和勻每服二錢醋湯熱服如橫逆用童子小便好醋各一茶腳百沸湯四五分服一方等分白芷生用腰脅痛虎骨散治婦人腰上實肉處痛不可忍虎骨散用麝香酒調服遂安芍藥湯治婦人脅痛凡藥不進香附子四兩黃子醋兩碗鹽一兩煮乾為度肉桂延胡索炒白芍藥上細末每服二錢沸湯調無時服常一婦人年八十餘忽兩脅痛甚服此而愈頭痛靈砂丹有婦人頭痛惡風發熱六脈沉取無根浮取卻有醫者謂之虛證靈砂丹以人參一二兩銀銚煎湯空心下十粒五更又下十粒天明則愈矣加味補虛湯治婦人頭痛發熱多汗六脈虛細尺脈或絶作血虛治之服後藥見效朮附湯加川芎先服十全湯加附子次服又服鹿茸丸內補丸芎藭湯神朮散芎歸湯治婦人頭暈痛諸脈平和惟肝脈獨弱預見崩疾來此血虛頭暈芎藭當歸上㕮咀煎服嘔吐開胃丸治婦人嘔吐不止出聖惠方半夏三兩湯泡七次以生薑三兩去皮同杵令爛焙乾白豆蔻去皮白朮炒陳皮去白各一兩人參一兩半上為細末生薑汁煮棗肉丸每服三十丸米飲下厚朴丸治婦人胃冷嘔吐不下食厚朴三兩去皮附子三兩去皮銼如豆上以生薑汁一升水五合煮令汁盡焙乾杵細為末以酒煮神麯為丸每服三十丸無時溫酒下發搐鹿茸丸治婦人虛弱服剛劑太過發搐劉立之云肝血不足為剛劑所燥故令搐溺今服鹿茸丸數服而愈烏金散治婦人諸般發搐三山曾醫方真川墨乃松煙也磨酸醋緩緩啜兩呷即效有婦人産後頭搖目不開服之便住次用豆淋酒一味封過一宿次日兩服好紅花四物湯治婦人臂疼又如癱瘓劉立之云是血證四物湯加紅花煎服見效便祕八味丸治婦人大小便祕澀更數醫不效劉立之云此血弱不能榮養臟腑津液枯澀遂服八味丸數服而愈怒氣傷肝橘歸丸治婦人肌膚手足俱有血線路此怒氣傷肝血失常經所以如此服後藥兩日無事橘皮二兩當歸一兩上為細末蜜丸溫酒下腳氣三聖散治婦人腳氣遇發吐水至一桶粥藥不下醫用三聖散見效生料五積散治中湯嘉禾散上三藥合而為一隨意水煎服之陰證方可用腳氣衝心見血氣類病奶奶癰瘡黃瓜蔞一二個連皮穰子銼碎上用無灰酒一二升於沙瓶內煮存一升去滓時時溫服酒盡再煮滓服如覺初時便服此藥即時痛止更不成瘡如已成瘡服之其瘡自穿其痛自止奶結硬凡未成瘡才覺腫硬作痛以蔥早尉之其法用中樣小海味瓶口寬者以炭火入瓶內上以熱灰填滿平瓶口以蔥葉及蔥白捶損令遍覆瓶口以手帕子裹定倒執將瓶口向腫處任意輕輕尉之有驗肖貢元方六甲胎神禁忌圖衡陽上官宅施産母禁食凡妊娠經五個月食兔肉兒缺唇食雀肉兒目盲食鴨子兒倒生食鱉肉兒項短食驢肉兒過月食乾薑蒜面令胎不安逐月胎神正月床一雲房及酉方二月戶一云窗及未方三月門一云堂及巳方四月灶一云卯方五月身一云醜方六月灶一云倉屋及亥方七月碓磨一雲子方及巳方八月廁一云窗戶及未方九月門一雲房及酉方十月戶一云卯方十一月灶一云爐及醜方十二月床一雲房及亥方逐日胎神寅申日爐巳亥日未子午日碓卯酉日大門辰戌日雞犧丑未日廁生子所向吉方子午卯酉日向西南方辰戌醜末日向東南方寅申巳亥日向西北方逐月安産室吉方陽月宜天德方陰月宜月空方藏胎衣方正二三四五六七八九十十一十二天德方丁坤壬辛乾甲癸艮丙乙巽庚月德方丙甲壬庚丙甲壬庚丙甲壬庚月空方壬庚丙甲壬庚丙甲壬庚丙甲生氣方子醜寅卯辰巳午未申