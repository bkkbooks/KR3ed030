body:
  text: 卷之九頭痛門附眼耳鼻口舌齒咽喉治方附子湯治頭風至驗大附子一個生用去皮臍緑豆一合上同銚子內煮豆熟為度去附子服豆即安每個可煮五服後為末服之蓽拔散治偏頭痛絶妙蓽撥一味為末令患者口中含左邊疼令左鼻吸一字右邊疼右鼻吸一字即效細辛散治偏頭痛細辛雄黃各等分為末少許搐鼻一字輕金散治偏正頭風痛夾腦風眉稜骨痛牽引兩眼抽掣疼痛迸出或生翳膜視物不明藿香葉荊芥穗旋覆花香白芷石膏末細研水飛防風各半兩川烏兩頭尖者去皮尖生用二錢半天南星二錢半川芎半兩草烏頭一錢半上十味各修事掛日中曬乾同搗為細末每服只一字食後淡茶調下神效不可言丙寅候僉授之抱婆丸治男女諸虛不足女人頭風男子氣虛弱吐痰及腳氣腰疼下元虛冷並宜治之大附子一兩一隻炮去皮蒼朮三兩泔浸一宿南木香不見火大川烏去皮尖炮天麻酒浸炙半兩上為細末酒煮麵糊丸如梧桐子大空心溫酒鹽湯下頭風食後蔥酒下細辛丸治頭痛久不瘥烏梅藁本川芎北細辛各半兩甘草上細末石膏半斤研細入坩堝子內火煅過飛去石末滴石膏水和丸彈子大茶酒任下一丸無時候金花一聖散治頭風川芎川烏去皮白芷各等分上細末每服一字以生蔥三寸薄荷葉三四片同煎食後調服一字散治偏正頭疼全蠍八個防風一分殭蠶半兩天麻一兩川烏一個炮南星一個重半兩以上者研為末生薑自然汁和成一塊入硃砂一粒豆大乳香一粒豆大和南星用文武火煨令香熟切作薄片焙乾上同為末入麝香硃砂各半兩拌勻每服一字食後蔥酒茶調下硫黃丸治頭痛硫黃二兩研焰消一兩上以雪糕為丸每服二十丸臘茶下硫黃丸治腎厥頭疼狀如斧劈痛不可忍硫黃南星炮石膏飛焰消各等分上細末糊丸如梧桐子大每服三十丸空心進二服加至四十丸有人患頭疼數月痛致厥不省人事皆作虛陽上攻又有做風氣並痰治求醫於僕診其脈心脈肝脈俱洪大遂以硃砂五苓散用龍膽草煎湯調下二錢一服頃刻如失出張氏究原方南荊散治頭風南星一個重一兩荊芥穗半兩上將南星切片用生薑自然汁淹一夜次早搗為餅新瓦上焙乾微黃同荊芥為末每服二錢入修仁茶少許調服如無修仁建茶亦得定齊霍哲夫方又方治頭風楊梅皮多用上為細末入消風散薄荷煎各一貼若楊梅皮末多則各加兩貼合和為末卻用十分厚白梅肉杵為丸如彈子大每服一丸食後蔥茶嚼下金陵髽角楊道人方治腦瀉方防風白附子北細辛白茯苓川烏菖蒲乾薑香白芷川芎甘草節各等分上為未每服三錢嚼生蔥白湯調下食後服謝子清方眼靈應丸治內外障眼黃連大者蕤仁各二兩太陰元精石陰陽火煅石決明草決明各一兩羊子肝七個去膜竹刀切上用多年粟米飲為丸如梧桐子大每服二十丸臨臥時用臘茶吞下翳膜厚者不過一月近者不過十日服至七日烙頂以助藥此方因宋公琪丞相早歲知綿州有典史黃仁鍔患赤眼喪明夢得神人惠之蒼朮丸治內障蒼朮半斤上一味切作片黑豆一小升用水二碗煮乾焙研為末糊丸每服三十丸空心鹽湯下羌活散治一切風熱上攻頭目赤腫疼痛昏澀眵淚怕日羞明赤脈翳膜羌活獨活柴胡川芎黑參赤芍藥桔梗地骨皮荊芥薄荷桑白皮各半兩大黃山梔子仁黃芩各一兩上件各生用為㕮咀每服重三錢水一盞半煎一盞去滓無時服如有翳膜加蟬蛻密蒙花各半兩淚多則加木賊半兩地骨散治大人小兒眼赤或生翳膜此心經受熱所致地骨皮生地黃黑參甘草木通黃芩上等分粗末白水煎服以上二方系何統制智大用之有效祛風散治一切風熱上攻眼目赤腫羞明大黃黃芩地骨皮山梔子仁各半兩柴胡元參赤芍藥荊芥薄荷防風甘草桑白皮各二錢半上為㕮咀每服三大錢水一盞半赤腫加生地黃煎如大小便祕澀心胸滿悶加枳殼還光散治一切男女暴生赤白翳膜菊花炒羌活防風蟬蛻去足翅蒺藜炒川芎當歸甘草炙上等分細末食後茶調下茶調散治男女頭風攻注眼目昏暗最治睛疼藿香香附子各半兩甘草二錢半上為細末食後蔥茶調下此三方系潘德大常用有效柴胡散治眼目暴赤腫痛柴胡蒼朮甘草等分上為末白水煎如頭疼壯熱則用生薑蔥煎已驗黃連湯治火眼廣西鎮干何清之方鷹爪黃連七莖去毛節杏仁七粒去皮尖北棗七枚上用新瓦盆存貯入水八分以紙覆蓋慢火熬存二三分放在地上去火毒候冷存在湯瓶上蒸溫不要熱病者仰臥令人滴藥汁在眼尖角近鼻者候口中有苦味即是藥透如未知苦則一面滴數次即安其效如神春雪膏治眼目赤腫翳羞明硼砂三錢腦子一錢通明朴硝半兩上細末入乳鉢研再用細絹羅過每用小錢光弦者點津液沾藥末入目中閉霎時令藥勻方開眼淚出為度青金散治眼目四季發動羌活甘草荊芥生熟地黃川芎鬱金地骨皮桑白皮各一兩上㕮咀每服三錢水一盞煎八分食後熱服當歸散治一切眼病川芎菊花當歸尾荊芥羌活生熟地黃防風乾葛北芍藥各等分上粗末白水煎候熟入生地黃汁數點磁石丸明目清神磁石煅醋淬七次白朮神麯枸杞子麥糵當歸人參熟地黃辰砂牛膝白茯苓干菊花上等分為末酒糊為丸白湯吞下五十粒溈山初老方洗眼藥黃助教方韶粉防風馬牙硝餅子銅青上細末每用一字溫湯調無時洗立效龍膽膏治遠年日近翳膜遮障攀睛瘀肉連眶赤爛視物昏暗不睹光明隱澀多淚迎風難開治之神妙爐甘石不以多少揀粉紅梅花色者為妙用坩堝子盛火煅七次入黃連淬七次黃連不以多少捶碎以水浸一宿濾去黃連滓將煅紅爐甘石淬足七次了同黃連水細研飛過後澄在下去上面水暴乾再用乳鉢以蜜細嚼羅過方可用平稱三錢龍膽草不以多少洗淨日乾不見火細研為末平稱一錢桑柴灰羅過平稱二錢好黃丹羅過平稱半錢上件藥味同白蜜四兩一處入在一紫黑瓷器內文武火慢熬以竹篦子攪如漆色不黏手為度切勿犯生水仍不可用鐵器熬藥藥成依舊用瓷器盛頓每服如皂角子大新汲水半盞化開洗三日不用每日洗數次無礙藥盞須用紙蓋不可犯灰塵截赤目極有神驗決明散治斑瘡入眼寧鄉彎頭劉氏祕方用功效草決明青葙子乾葛槐花敗荷葉水上者一片上細末食後米泔水調下如四五十日只服此藥若日子久則眼老睛懸卻再合後藥香白芷香附子連翹甘草蟬蛻上為細末二錢水一盞煎七分用此汁調前藥仍忌口浮萍散治斑瘡入眼大人小兒皆可用浮萍陰乾為末上每服二錢以生羊子肝半個入盞子內以杖子刺碎沒水半合絞取肝汁調下食後不甚者一服差已傷目者十服差已見效蒼朮散治斑瘡入眼蒼朮一兩槐花藁本蛇退防風枸杞白蒺藜各三錢黃芩川芎各半兩木賊甘草白菊花各二錢蟬蛻四錢乳香沒藥各半錢硬石膏煅半兩乾葛一兩上件為細末用白水煎食後服加穀精草三錢半尤妙菊花散治痘瘡入眼白菊花三兩緑豆殼密蒙花旋覆花穀精草甘草各一兩上為㕮咀每服一錢乾柿一枚粟米泔一盞煎乾盡為度取乾柿食後服升麻湯治斑瘡錢氏云斑瘡未出之初或云瘡疹或云傷風疑似之間以升麻湯主之此方通古今用之不知醫幾千百孩兒矣若欲出而不快出身體遍熱獨耳鼻腳梢中指冷者此是瘡證無疑急用升麻湯解肌為穩若夫斑子已見而身不大熱瘡出得參差須要托裡急於升麻湯中倍加白芍藥及加南木香服之則瘡子出得齊無倒陷之患矣熱盛而瘡出亦齊者於此時宜以消毒飲子解熱為捷藥方極多而緊切者此三方為上加味四物湯治斑瘡入目或瘡痘收後方目有翳膜宜用此藥治之當歸尾芍藥川芎蒼朮白菊花乾葛羌活各等分上每二錢水一盞入生地黃少許杵碎同煎半盞量兒大小服之乳食後服忌一切動風毒物雖愈後忌三二月方可蟬菊散治斑瘡入目或病後生翳障蟬蛻淨洗去塵土白菊花各等分上為末每服二錢水一盞入蜜少許同煎乳食後量兒小大與之有驗屢矣耳安腎丸治虛弱耳聾安腎丸半斤磁石一兩醋煅石菖蒲羌活各一兩上三件為末共混合為丸如梧桐子大每服四五十丸鹽湯溫酒任下羊腎丸治耳重聽過於思慮則其病尤甚此藥主之石菖蒲九節者蔥子炒各三錢羊腎一對以酒一升煮乾薄切焙乾皂夾一錠去黑皮蜜塗炙去子用川椒三十二杖去目及閉口者微炒出汗上為末用蜜為丸如梧桐子大每服三四十丸空心溫酒下九江雷制屬方清神散治氣壅於上頭目不清耳常重聽干菊花白殭蠶炒去絲嘴各一兩荊芥穗羌活木通川芍防風各半兩木香二錢甘草石菖蒲各三錢上為末每服三錢食後臨臥服茶清調下磁石羊腎丸治風虛不爽時有重聽或有風痹之狀並皆治之磁石末二兩火煅七次醋淬用蔥子一合木通三兩用水同煎一晝夜去蔥木通川椒去目石棗去核防風白朮茯苓北細辛山藥川芎遠志肉大川烏炮木香當歸菟絲子酒浸炒黃耆鹿茸酒浸一宿炙各一兩肉桂六錢半熟地黃九蒸二兩石菖蒲一兩半上為末用羊腎兩對去皮膜以酒煮爛和諸藥細研以所煮羊腎酒攪糊為丸如梧桐子大每服百十丸空心溫酒鹽湯任下已上二方相間服卻忌牛肉雞鴨子臨川阮助教方驢膏治積年耳聾驢生脂和生薑搗綿裹塞耳載醫說妙不可言有人耳癢一日一作可畏直挑剔出血稍愈此乃腎臟虛致浮毒上攻未易以常法治也宜服透水丹勿飲酒啖濕面蔬菜雞豬之屬能盡一月為佳不能戒無效治耳膿方新增密陀僧一錢輕粉半錢麝香一字上為末先以綿卷耳內膿卻摻入藥末麝香散治聤耳底耳耳內膿出新增桑螵蛸一個慢火炙及八分熟存性麝香一字別研上為細末研令勻每用半字摻耳內如有膿先用綿紙捻以藥摻之又方干胭脂白礬枯過新增鼻鬱金散治鼻中息肉鬱金豬牙皂角各一兩上用水同浸一宿火煮透鬱金爛為度去皂角留鬱金焙乾次用北細辛半兩同為末入麝香硇砂各一錢或半錢拌勻煉蜜為丸如茶子大食後煎茶下細辛散治鼻齆不聞香臭瓜蒂北細辛上等分各細末綿裹如豆大塞鼻中治鼻內生息肉詩狗頭骨化灰硇砂加少許每服搐半錢息肉化為水口遠志散治口瘡立效五倍子半兩遠志去心半兩上同研為粗末用紗羅隔過摻少許於舌上吐出則瘡已隨愈獨勝散治口瘡縮砂殼火煅存性為末摻口內瘡上即安立效散治口吻邊生瘡浸淫不愈檳榔火煅為末入輕粉傅瘡上立愈二方黎居士方並試收效茱萸散治口瘡及咽痛地龍去土炙吳茱萸去浮者上等分炒為末米醋入生曲調塗足心神效舌飲酒喉舌生瘡方治連月飲酒咽喉爛舌生瘡水中螺蚌肉上用蔥豉薑椒煮汁飲三盞差聖惠方舌無故出血方一士人無故舌出血仍有小穴醫不能曉何疾偶曰此名衄炒槐花為末摻之而愈良方齒二妙丸治齒衄蜀士何光甫方巴豆不去殼蓽澄茄七枚上研爛為細末綿裹左齒痛納之左耳右齒痛納之右嘉禾散治齒疼耿運管病朽齒者疣去而齒之左右上下非痛非腫不能嚼食食後姜煎嘉禾散一服次以地骨皮煎湯漱之空心以羊腰一對切片不令斷以蔥絲椒子青鹽蒺藜末固之散二錢拌勻擦腰子內荷葉包煨熟食而愈齒縫出血方齒縫出血不止他藥不能治者鹽主之素問云鹽勝血故也蘭室寶鑑用麥門冬煎湯漱之亦良又方治齒縫出血蓋上實下虛也八味丸服之而愈治冷證齒痛方安腎丸八味丸上相合鹽湯送下白芷散治牙疼白芷血餘川芎百草霜川烏草烏雄黃花桑皮燒硃砂全蠍麝香北細辛沒藥當歸上等分為末每服一錢茶酒任下空心先將此藥用醋調如膏次以皂角炭火燒令煙出卻用皂角點藥搽患處即安立效散治牙疼白礬一兩生薑三兩切片同白礬炒乾蓽撥一兩焙乾上等分入燒鹽少許為細末摻牙痛處如神細辛散治牙疼福州宮醫王子益用此二方有效北細辛蓽撥各二錢白芷川芎各三錢川烏一個全蠍五個上六味日乾為末或痛先用鹽水洗淨用少許傅痛處立效或有熱腫即入腦子少許和藥擦之皆效退腫藥天花粉白芷赤小豆鬱金荊芥薄荷上六味等分日乾為末蜜水調塗痛處細辛散治牙齦腫痛全蠍白礬北細辛葉各二錢麝香少許上細末摻腫處仍用荊芥煎湯灌漱最佳高州報恩新老方治蟲蛀牙痛方紅川椒末三錢明乳香一錢上同研熔蠟丸麻子大每服一丸塞孔中又方紅川椒末一錢大巴豆肉一粒上研細飯丸麻子大以薄綿包塞孔治風牙痛方露蜂房炒國丹各等分為末摻患處牙齒日長方牙齒逐日長漸漸脹開口難為飲食蓋髓液所致只服白朮愈衛生全方齒間肉壅出方汪丞相徽之祈門人有寵平日好食動風物性尤嗜蟹或作蟹簽恣啖之一日得風熱之疾齒間壅一肉出漸大漲塞口不能開水漿不入痛楚待盡而已有一道人言能治此疾丞相命醫之不日而愈其法用生地黃汁一碗豬牙皂角數錠火上炙熱蘸令汁盡為度上末傅壅肉上隨即消縮後多金與之得此方其壻李大夫說苦參不可潔齒論豫常苦腰重久坐則傴僂十餘步然後能行有一將佐見豫曰得無用苦參潔齒否豫時以齒病用苦參數年曰此病由也苦參入齒其氣傷腎能使人腰重後有太常少卿舒昭亮用苦參揩齒歲久病腰重自後悉不用腰疼皆愈此皆方書所不載筆談導引方治齒痛東向坐不息四通上下啄齒三十六下針灸方治口齒蝕生瘡承漿一穴在頤前唇下宛宛中可灸又方治唇吻強齒齦痛兌端一穴在唇上端針入二分可灸三壯咽喉咽喉評評曰咽喉之疾本傷熱毒上攻也四時受熱藏心肺之間一旦所觸上攻咽喉所謂腎傷寒也然其證有單肉娥雙肉娥有重舌木舌胙腮有懸雍腫脹有裡外皆腫甚者上攻頭面皆腫大法先洗去口中舌上白苔其次掃去風涎如此單雙肉娥可針則針有不可針者則用熏摻藥退後方依次用服藥如是木舌服藥之外仍用摻胙腮則用塗藥輕者但服藥而自退不須用針及藥點其瘡當自消也又有腑寒咽閉別有治法如神散治咽喉深在咽下針刀不能及者膽礬純緑者研細如粉上用酸黃醋一呷調咽下自服不得者灌之即時吐下稠黏痰涎便愈可少用以冷水解之張太醫方油膏治咽喉生癰藥不下及喉閉等證生麻油半斤挼皂角十錠用生絹濾去滓上灌此麻油即時瘡穿濃血吐去而愈藜蘆散治咽喉藜蘆白礬火煅各三錢豬牙皂角三條蜜炙雄黃一錢粉草北薄荷各二錢上為細末每服少許如喉閉塞用竹管子吹入即愈吹喉散治咽喉腫痛朴硝四兩別研甘草生末一兩上研勻每用半錢乾擦喉中如腫甚者用竹管子吹入喉中為佳一字散治喉閉氣塞不通欲死者雄黃一分別研蠍梢七枚白礬一錢生研藜蘆一錢豬牙皂角七錠上為細末用一字許吹入鼻中即吐頑涎立差乳香散治咽喉張太醫方乳香青黛朴硝硼砂粉草雄黃上各等分為細末干下一字白礬散軟瘡白礬半兩飛過朴硝一錢飛過上為末銅箸點腫處再點瘡如瘡軟則用藥點穿硬則用針膽礬散點瘡膽礬一錢飛過硇砂二錢上為細末點腫處立穿穿則用合瘡口藥針法用大銅箸頭禿尾帶粒米許尖利先用箸頭點軟瘡藥三兩次看瘡軟硬次則用針針則用箸尾點藥少許熟認腫處就手針之庶患者不覺並不至針爛好處針訖用合瘡口藥萆麻散合瘡口萆麻子七粒焰消半錢上細末研成膏每用少許冷水灌漱去之南星散摻藥絳礬煅牙硝飛過南星薄荷上各量多少為細末水濕手點藥重摻腫處須用力摻之至痛無害然後服藥半夏散塗藥半夏南星白殭蠶直者上各用一錢用巴豆七粒去皮油合前藥細研用少許生薑自然汁調塗外面腫處熏藥雄黃散雄黃少許巴豆五粒上細研每遇急患不可針藥者用酒瓶裝灰坐瓶嘴下裝火一炷焚之候煙起將瓶嘴入一邊鼻中用紙覆瓶口熏之立減獨附煎治腑寒咽閉六脈微弱附子一隻切成片上用蜜炙黃咽甘味下須詳脈方可用防風立效散治咽喉柴胡升麻牛蒡子炒全蠍石膏生用乾葛赤芍藥甘草各一兩北防風鬱金薄荷葉半夏泡赤茯苓北細辛川芎羌活各半兩桔梗荊芥各二兩上粗末每服四大錢水一盞半蔥頭一個煎一盞食後臥時溫服滓合煎服忌酒毒物候發散後又相間服局方解毒雄黃丸湘中朱國學家合施方往往輒效治走馬喉閉塞不通方白殭蠶炒半兩甘草生一錢上為末薑汁調灌涎出立愈又方白礬一兩入巴豆二十一粒捶碎去殼同煅礬枯去巴豆上用礬為末一字吹入喉中又方焰消枯礬末一錢上含化或吹入鼻中口內出血以新水瀨而愈治纏喉風方白礬銅青等分為末一字吹入鼻即愈治咽喉閉塞不通方馬屁勃煎濃汁灌之又方巴豆二三粒去殼捶碎上攤紙上卷作卷插入鼻一頭以火燒借氣即通治喉痹方元公章少卿說開德府士人攜僕入京其一日忽患喉痹脹滿氣塞不通命在頃刻詢諸郡人云惟馬行街山水李家可看治即與之往李駭然曰證候危甚猶幸來此不然即死何疑乃於笥中取一紙捻用火點著方才煙起吹滅之令僕張口刺放喉間俄吐出紫血半合即時氣寬能言及啖粥飲摻藥傅之立愈士人甚神其技後還鄉里村落一醫偶傳得此術云咽喉病發於六腑如引手可探及刺破瘀血即已若發於五臟則受毒牢深手法藥力難到惟用紙捻為第一然不言所用之意後有拾得其殘者蓋預以巴豆油塗紙故施火即著藉其毒氣徑赴病處類編又方急以皂角去皮子生用為末上以箸點在腫處更以醋調藥末塗項下須臾破少血出即愈又方以皂角汁麻油灌未吐再服之治舌腫用釜下墨舌下取效鬱金散治咽喉至重者鬱金二枚白殭蠶鴨舌膽礬各半兩全蠍二個山豆根二錢半豬牙皂角五片雄黃一錢巴豆二七粒七粒同礬火煅用七粒去油生用上為細末每服半錢新汲井華水如兩茶腳多調令稀稠得所時復咽下如口噤以巴豆油紙捻成條子燒煙搐鼻自然口開卻以酸黃子醋調用鵝毛拂患處痰涎出為度如覺不快更進無害治喉癰方楊立之自廣府通判歸楚州喉間生癰既腫潰而膿血流注曉夕不止寢食俱廢醫者束手適楊吉老求赴郡守招立之兩子走往邀之至熟視良久曰不須看脈已得之矣然此疾甚異須先啖生薑片一斤乃可投藥否則無法也語畢即出子有難色曰喉中潰膿痛楚豈宜食生薑立之曰吉老醫術通神其言不妄試取一片啖我如不能進則屏去無害遂食之殊為甘香稍復加益至半斤許痛處已寬滿一斤始覺味辛辣膿血頓盡粥餌入口了無滯礙明日招吉老謝而問之對曰君居南方多食鷓鴣此禽好啖半夏久而毒發故以薑製之今病源已清無服他藥豫記唐小說載崔魏公暴亡醫梁新診之曰中食毒僕曰當好食竹雞梁曰竹雞多食半夏苗蓋其毒也命捩生薑汁折齒灌之遂復活甚與此相類類說巧匠取喉鉤方鹹平中職方魏公潭州有數子弟皆幼因相戲以一鉤竿垂釣用棗作餌登陸釣雞雛一子學之而誤吞其鉤至喉中急引乃鉤以須逆不能出乃命之堵醫不敢措手魏公大怖令人遍問老婦必能經歷時有一老婦九十餘歲言亦未嘗見此切料有智識者可出之時本郡有一莫都料性甚巧令見魏公公呼老婦責之曰吾子誤吞鉤莫都料何能治之老婦曰聞醫者意也其莫都料曾水中打碑塔添仰瓦魏公大咍親屬勉之曰試詢之公遂召莫都料至沉思久言要得一蠶繭及大念珠一串公與之莫都料遂將繭剪如錢大用物權四面令軟以油潤之仍中通一竅先穿上鉤線次穿數珠三五枚令兒正坐開口漸添引數珠捩之到喉覺至系鉤處乃以向下一推其鉤其下而脫即向上急出之見繭錢向下裹定鉤線須而出並無所損魏公大喜遂厚賂之公曰心明者意必巧也意巧者心必善醫名醫録食鯉魚骨鯁方滁州蔣教授名南金因食鯉魚玉蟬羹為肋骨所哽治哽藥如象牙屑用之皆不效或令以貫衆不以多少上濃煎汁一盞半分三服並進連服三劑至夜一咯而出因戲云此管仲之力也名醫録治哽以類推方治哽之法皆以類推鸕鷀治魚哽磁石治針哽發灰治發哽貍虎治骨哽亦各從其類也
