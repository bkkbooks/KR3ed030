body:
  text: 卷之二傷寒門附諸瘧自汗消渴便濁便數治方雙解散解四時傷寒疫癘風溫濕溫不問陰陽二證表裡未辨發熱惡寒頭疼項強腰背拘急肢節疼重嘔吐喘嗽鼻塞聲重目睛眩疼煩躁引飲往來寒熱已經汗下病勢愈甚用藥錯誤壞證惡候及不服水土山嵐瘴瘧婦人血虛發熱凡室女小兒老人並宜服之人參白朮升麻各一兩乾葛白芍藥甘草各一兩半陳皮不去白二兩香附子炒去毛三兩紫蘇葉二兩半上㕮咀每服三錢水一盞生薑五片棗二枚煎七分通口服如要出汗加蔥白三寸淡豉十四粒連投二三服略以被覆汗出立效不拘時如春夏加藁本白芷各一兩此藥乃四君子湯升麻湯香蘇散合而為一四君子湯主氣升麻湯解肌發散退熱解表香蘇散助二藥之表裡此藥性稍涼有熱者宜服之居南方瘴地或冬多愆陽當並服取效若體性有寒及壞證已虛者恐亦難用大抵有虛寒人只服人參多亦能助寒有實熱人只服白朮多亦能增熱此藥內有乾葛升麻香附子之類性寒為多自當審之防風散治頭痛壯熱惡風百節痠痛肩背拘急面赤虛煩聲重咳嗽厚朴薑製陳皮甘草炙藁本各二兩獨活防風桔梗炒各三錢蒼朮杵去皮四兩上細末每服三錢水一大盞薑三片棗二枚煎七分溫服沸湯點亦可春夏宜用之羌活散治四時傷寒頭疼鼻塞或流清涕項背拘急惡風自汗柴胡四兩白芷川芎藁本各一兩桔梗甘草獨活羌活各半兩上㕮咀每服三錢水一盞半蔥薑煎七分熱服沖和散治寒溫不節將理失宜乍暖脫衣盛熱飲冷坐臥當風居處暴露風雨行路沖冒霜冷凌晨早行呼吸冷氣久晴暴暖忽變陰寒久雨積寒致生陰濕如此之候皆為邪癘侵傷肌膚入於腠理使人身體沉重肢體痠疼項背拘急頭目不清鼻塞聲重伸欠淚出氣壅上盛咽渴不利胸膈凝滯飲食不進凡此之證若不便行解利伏留經絡傳變不已蒼朮六兩荊芥穗三兩甘草一兩二錢半上粗末每服三錢水一盞半煎八分熱服不拘時候並滓再煎才覺傷寒及覺勞倦亦須服之不問虛實皆可服之薑侍郎方白芷散治傷寒鼻塞出清涕出百一選方香白芷一兩荊芥一錢上為末臘茶清調下薄荷一錢尤佳神朮散治四時瘟疫頭痛項強發熱憎寒鼻塞聲重蒼朮五兩藁本去土羌活甘草香白芷細辛去葉川芎各一兩上為末每服三錢水一盞薑三片蔥白三寸煎七分溫服不拘時傷風鼻塞用蔥茶調下羌活散治男女感冒不問陰陽皆可服柴胡二兩粉草半兩羌活川芎白芷各一兩上為末蔥湯酒任下神應散治四時瘟疫傷寒茯苓甘草黃芩地骨皮上各等分白水煎服不過數服而愈宣和間王煥疫疾神以王有陰德以此方授之蒼朮散截四時傷寒疫疾蒼朮半斤炒麻黃一兩半去節杏仁二兩去皮尖炒甘草二兩炒上為細末每服二錢沸湯調服無時候諸瘧知母散治一切瘧疾不問先熱後寒先寒後熱熱多寒少寒多熱少久年不瘥者止一服取效贛州羅監稅傳方大有功效知母真者貝母常山檳榔上等分為㕮咀酒水各一盞煎至一盞用綿蓋定露一宿五更乘冷望東服直到巳時食乾物若吃水便吐煎時不得過婦人手川烏散治虛瘧大川烏草果子乾薑良薑各等分上銼棗七枚薑七片煎服用之常服有驗檳榔散治瘧疾不問寒熱無不愈者湘中吳德藻傳方檳榔草果子烏梅各一個常山柴胡乾葛厚朴制甘草上先銼草果子烏梅之外其餘五味只以檳榔為則作一服常山多些小有熱多乾葛加些小生薑一大塊劈破用大湯盞則酒一盞半於未發之前一日煎取一盞半臨臥取一盞服之留滓半盞又添起水酒共一盞半浸滓到天明再煎取一盞服之只可作一服便愈好後卻忌口三兩日方佳如熱多則加水寒多則加酒直要慢火煎生則吐人青蒿散治瘧疾甘草秦艽柴胡草果子青皮常山檳榔青蒿子各等分桃柳枝各七寸上以常山秦艽柴胡草果子青皮甘草為末每服用水一盞半入桃柳枝青蒿子加烏梅一枚煎八分放冷一服半夜一服只是預先一夜一服增料正氣散治瘧疾經驗湘中胡伯村傳方金不換正氣散每服加檳榔三個草果子一個烏梅一個常山少許薑棗半酒半水兩盞同煎一盞去滓五更放冷服蒜餅丸治瘧疾經驗周亨叔方用蒜丸酒餅子如梧桐子大每服一丸五更熱酒下或十丸亦可愚度大概積瘧有驗三虎丸治瘧疾北常山草果子甘草上各等分用白酒餅一個小者二個共為細末生蜜為丸彈子大隔先一日鹽湯下一丸臨發又一丸發旺又一丸立效瘧丹治瘧疾臘茶硫黃各等分上寒多則加硫黃少許熱多則加臘茶少許臨發時用冷水調下甚者兩服即愈用之屢驗四勝飲治瘧疾初患瘧疾未上十次者不可便截皆因暑邪入於脾經生冷傷於中脘或先寒後熱或先熱後寒或獨作或連日併發或日一發寒則肢體顫掉熱則滿身如燒頭疼噁心煩渴引飲口苦咽乾背脊痠疼其陰陽未分胸膈停痰腸鳴腹痛裡急後重欲作痢疾若有此疾此藥表解陰陽並皆治之即日安愈生料五苓散不換金正氣散小柴胡湯草果散上此藥共和令勻不問男女孩童大小皆可加減煎服如大人但作四服水一盞半生薑五片肥棗一枚煎至一盞空心熱服合滓再煎兩次不拘時候但忌生冷一切毒物及忌一月飢飽風寒免至再發乃蜀中道人傳授功效如神此方系撫州蕭世榮刊施常山飲治瘧余嘗服之取效常山檳榔烏梅甘草北柴胡草果子各等分上㕮咀為末薑棗煎隔日煎下露一宿遇發日早晨溫服仙授散加麻黃蜀漆湯治一切瘧疾蜀漆即常山苗子若用葉尤佳桂心甘草茯苓各一兩黃耆五兩生地黃一斤知母芍藥各二兩上㕮咀每服三錢水煎不拘時服此方出活人書治婦人産後寒熱其狀似瘧湘中名醫黃槐卿用之治瘧屢有功效檳榔散治瘧疾大檳榔三個常山一錢烏梅一個鱉甲一錢煨上銼散雞鳴時一碗酒一碗水煎至半碗候十分冷服飯食茶湯亦要冷吃蒼耳丸治久瘧不瘥蒼耳草子根莖皆可用上銼碎焙乾為末酒煮麵糊為丸無時服大蒜平胃散治一切瘧平胃散一貼大蒜一個擂爛用一大碗井水調蒜澄清以一半調平胃散飲盡又以余蒜水再飲用厚被蓋臥汗出即愈友人鄧瀛叟因赴監試感此遇道人授此方服之遂安二薑丸治虛瘧白薑炮良薑壁土炒上等分細末用豬膽汁為丸如梧桐子大每服三四十丸遇發前空心酒吞下如此二服而愈五苓飲子治瘧疾發作譫言妄語如惑鬼神或時大叫澤瀉一兩赤茯苓豬苓白朮各兩半官桂二錢半上為末熱水調下才服小便清狂言息有效草果飲療實瘧常山柴胡各一兩甘草檳榔各半兩白薑七錢烏梅隨意加減上㕮咀每服四錢半水半酒生薑一塊烏梅一個煎未發前服再發再服不過三服愈三生飲治虛怯之人發瘧未可以常山等藥攻之者三生飲順元散合和多加生薑煎服蓋無痰不成瘧此極有效冷附湯治虛瘧附子一隻炮上切片子分作二服生薑十大片水兩大盞煎一盞隔夜煎下用綿蒙盞露一宿至五更初取冷服凡患瘧疾無過是痰實痞塞不通脾氣弱虛熱在上停於胸膈不得入於臟腑所以五更冷服乃使藥下達壯脾胃去痰實降虛熱心氣屢試屢驗不再散治久瘧黃丹一兩百草霜三兩上為末新汲水五更望南服用水不多露星散戴防禦治瘧真方天下無二陳皮六兩蒼朮四兩米泔水內入生薑汁浸一宿曬乾甘草三兩厚朴以陳壁土生薑二片酒一盞和水五盞厚朴四兩煮令乾為度曬乾草果三兩檳榔生用木香半夏湯泡七次縮砂仁各二兩青皮二兩去瓤銼碎以巴豆三四粒去皮膜線穿定於青皮內炒巴豆黑去巴豆上㕮咀每服五錢水二盞薑五片烏梅棗子各二枚入酒一呷同煎三五沸和滓露一宿至天明取入再同滓煎至七分去滓空心通口服滓再煎下於未發前再煎服如熱多寒少加前胡去半夏如寒多熱少加官桂川薑去青皮如嘔吐加丁香附子去半夏木香草果七棗湯治瘧瘴草果常山貝母雞心檳榔大棗甘草烏梅上七味等分青蒿倍之每服四錢用水一盞半煎至七分通口服滓再煎其效如神祕傳瘧丹甘草生用信砒真者生用少許寒水石如琉璃亮者是上將三味碾為細末麵糊為丸如緑豆大硃砂為衣每服大人五丸小兒二丸早晨面東用冷水吞下忌毒物如不丸者用末子以冷水調大人每服只用一字錢小兒每服半字錢臨發日服之更請莫吃熱食只用溫湯淘飯止肌粥食一例放冷恐熱觸犯藥性真實藥料志誠修合不過五六服自然而愈後服草果半夏湯泡七次制厚朴青皮良薑壁土炒甘草上等分㕮咀每服三錢水一盞烏梅煎服空心良薑丸新增醒脾治瘧良薑二兩上末豬膽丸梧子大紫蘇湯下二十丸自汗救汗湯治陽虛自汗不止芍藥三兩官桂去皮取有味者三兩甘草二兩附子生用不去皮三兩一方不用附子上㕮咀每服五大錢水一盞半薑五片棗二個同煎八分去滓溫服不拘時合滓再煎牡蠣散治臥即盜汗風虛頭痛東萊呂架閣傳牡蠣煅白朮防風上等分酒服寸匕日二服止汗之效無出於此又方治盜汗屢驗太平白芷一兩辰砂半兩上為細末酒調下又方治盜汗如神鬍子容方道地真龍膽草北防風上等分水煮麵糊為丸每服三五十丸無時白湯下白朮散治盜汗極驗趙冀公傳白朮不拘多少銼成小塊或稍大用浮麥一升水一斗煮乾如白朮尚硬又加水一二升煮取出切作片焙乾去麥不用上研為細末別用浮麥湯每服二三錢不拘時候茯苓湯治虛汗盜汗白茯苓為細末煎烏梅陳艾湯調下二錢服之神妙耆附湯治盜汗附子二錢炮去皮臍黃耆一錢鹽水或蜜炙上粗末每服三錢水一盞半生薑三片棗一個煎七分去滓食前後有如虛出汗用防風不以多少麩炒赤色研為細末煎豬皮湯下以上等證蓋陽經虛皮膚髮泄盜汗多生故有是證如傷風別有方牡蠣散治氣虛夜多盜汗白朮一兩牡蠣大而白者火煅通赤二兩別研極細黃耆略炙防風不用駐尾者各一兩上細末搗令極細方可服每服三錢溫酒下日二三服消渴八味丸治消渴梁國佐傳妙甚八味丸去附子加五味子用繭空及茄空煎湯下鹿茸丸鹿茸二兩菟絲子一兩浸酒蒸天花粉半兩上煉蜜為丸每服五十丸空心北五味子湯服治渴疾五味子湯黃耆六一湯蠶繭湯有一人苦渴疾日飲鬥水諸藥不效遂服煮蠶繭繅絲湯一盞其渴頓除恐不及時如無但以亂綿煎湯服棘鉤子散治傷酒多或成渴證棘鉤子本草載云距𧈭當門子五粒上用棘鉤子煎湯吞下當門子其渴立止蓋棘鉤最能勝酒大凡人家若酒房畔有此木不宜冬瓜飲子治渴疾大冬瓜子去皮搗爛取自然汁五大碗五苓散一兩去桂上調成飲子時時吃一盞吃藥時不得與水不過二料立愈白朮散治胃虛發渴白朮一兩人參茯苓甘草各半兩上為末每服七錢水盞半煎七分服凡吐渴之後多有腫疾仍預服復元丹數服梁國佐傳加味四君子湯治消渴人參白茯苓白朮甘草桔梗上等分細末白湯調下神功散治消渴北白芍藥一兩半甘草一兩上㕮咀每服三錢水盞半煎六七分無時服麥門冬丸治消渴麥門冬去心爛研成膏瓜蔞根黃連去須上二味為末入麥門冬內搗勻為丸每服三十丸早晚食後煎麥門冬湯下參耆湯治消渴人參桔梗天花粉甘草各一兩白芍藥綿耆鹽湯浸各二兩白茯苓北五味各一兩半上㕮咀每服四大錢水盞半煎八分日進四服留滓合煎以上四方載梁氏總要方一方有木瓜乾葛烏梅三味雞蘇丸治病後虛羸發渴雞蘇丸用五味子煎湯吞下仍服安腎丸便濁硃砂鹿茸丸治小便白濁李正道傳龍齒七錢鹿茸一兩半酒浸炙鹿角膠一兩螺粉炒上細末用石菖蒲遠志銼碎酒浸煮山藥糊為丸以硃砂為衣如梧桐子大用木香勻氣散下三十丸如無白濁平補只用鹽湯溫酒空心服鎖精丸治小便白濁朱仁卿傳破故紙炒青鹽各四兩白茯苓二兩上末酒糊丸空心酒或鹽湯下三十丸地黃丸治白濁如神田監簿傳熟地黃九蒸十兩菟絲子淘洗酒浸蒸鹿角霜各五兩茯苓柏子仁各二兩附子一兩上末鹿角膠煮酒為丸每服百十丸鹽酒任下遠志丸治小便赤濁如神遠志去心用甘草煮半斤茯神去木益智仁各二兩上為末酒糊丸臨臥棗湯下五十丸梁國佐云有效便數治小便太過王叔繼安撫傳益智仁不以多少為細末臨臥每服二錢入鹽少許即止縮泉丸治丈夫小便頻數史越王方烏藥益智炒川椒去目併合口者出汗吳茱萸九蒸九曝上等分酒糊丸梧桐子大每服五十丸臨臥鹽湯下雙白丸白茯苓去皮鹿角霜上等分細末酒糊丸梧桐子大每服三十丸空心鹽湯下此二方梁氏總要本
