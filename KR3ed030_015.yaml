body:
  text: 卷之十五拾遺門半夏丸治五絕一曰自縊二曰牆壓三曰溺水四曰魘魅五曰產乳凡此五絕皆以半夏一兩上為末水丸如豆大納鼻孔中即愈此是扁鵲法好事者閒慢制下危急得濟南嶽魏夫人方治魚骨鯁橄欖一味用急流水服之若無橄欖討核燒為末亦可又方白梅取肉去核砂糖含下須臾自下又方玉屑無憂散用貫眾調下妙不可言鹽梅丸治誤吞鐵錢及骨鯁之類古文銅錢十數枚白梅十個淹過宿即爛每服一丸如綠豆大侵晨取流水吞下即吐出治誤吞錢羊脛骨灰為細末米飲下泥薺取汁呷之自化又方山棗子燒灰存性白湯服武林劉開國大任傳治痱子藥滑石半兩綠豆粉四兩炒過上研如粉搽之田螺散治狐臭有效田螺二個各起掩入巴豆一粒去殼取肉在螺內仍掩住須臾盡化成水卻去掩挾任胸下令貼在肉上須臾狐氣上衝噁心欲吐卻以感應丸一貼並神保丸三丸同用溫湯送下令瀉即愈兩服斷根丁香丸治積熱傷食丁香三粒巴豆二粒去殼用管子葉包捶碎去油入缽內研爛縮砂四顆去殼烏梅一個切片去土瓦焙乾上除巴外併為細末仍入巴豆研勻卻用百草霜同和麵糊為丸如綠豆大煎米飲下積塊不妨大小而用有效豆蔻丸治腹痛嘔蟲陳皮甘草訶子使君子半夏沒石子各半兩厚朴制七錢木香肉豆蔻各二錢半上㕮咀每服三錢姜三片棗一枚水一盞煎七分無時湘中老醫陳必勝以此醫一女使遂除根本四物湯治休息痢四物湯下駐車丸每服百粒痢初作一服而愈此方系順慶朱承事家施人無不見效化蟲丸治諸蟲蕪荑錫灰神麯麥糵上等分為細末麻油為丸取月初五更空心用炙豬肉細嚼咽汁不吃肉汁引動蟲次用濃煎石榴根湯下丸子藥十丸靈脂散治毒蛇傷五靈脂一兩雄黃半兩上為末以酒調服以滓塗咬處甚者再服出醫說又方急以酒調好雄黃末傅之毒水流如涎大效治鼠癧方新增信石入綠豆同研斑蝥去足翅為末上面糊為丸黃丹為衣用時打破以醋浸一宿其瘡先以艾灸次用此抹又方新增白朮白茯苓甘草黃耆當歸檳榔白芷黑牽牛半生半熟密陀僧白芍藥各一兩郁李仁半兩斑蝥一分用秫米同炒黑去翅足或玻多者更添半錢斑蝥去斑蝥秫米又一分同前藥炒黃色為度上為細末粳米糊為丸如芥子大小兒七丸大人十丸至十五丸燈心湯下忌蔥菜油膩房色酒不妨忌使性氣孕婦不可服後服復元通氣散立效治齁喘甜瓜蒂七枚研為粗末用冷水少許調澄取清汁呷一小呷如其吐才飲竟即吐痰若膠黐狀胸次既寬齁亦定少再作又服之隨手而愈治紫白癜風密陀僧別研為末五錢自然銅研重篩五錢砒別研為霜用二錢豬牙皂角五錢為末上為末和勻先用熱水揩洗去黑被抹乾用水調藥薄薄揩拭肉上令入肉紋一日晚用一次三次黃柏散治穀道生泡癢而復痛此風毒流行證黃柏皮黃連去須白礬煅過白蛇皮燒灰各等分上細末重篩入麝香臘茶少許和勻津唾調抹爪破水出則乾摻一方只用黃柏皮末一錢枯礬半字和勻米泔調塗此方專治行路揩襠穀道痛仍用水先洗唾調散治同前五味子末唾調合掌丹治瘡疥蛇床子藁本各一兩硫黃一分石亭脂老硫黃青色一錢麝香二分上先用前二味為細末卻細殺後三味併入前末和勻生麻油調於無風處爬發用少許在掌心合定候融暖化稀遍身揩擦服四物湯勻氣血去風毒四物湯用生地黃赤芍藥加荊芥等分粗末水煎治風癬癬有數種荷葉瘡者開生如圈多在頭面柯皮癬者皮厚癢痛輕者用荷葉心左纏藤葉同為末麻油調塗厚者加砒少許和勻水調塗煮膠法梁國佐傳鹿角不以多少先用瓦缸盛水浸三日漉出用江中沙子揩洗要見黃色然後用鋸二寸長一塊別換江水再入缸浸三日用一大瓦缽有蓋者用鹽泥和陳壁土作泥固濟隨缽大小作一灶用第二次所浸水入缽內和鹿角煮常以鐵瓶燒水在灶門口如缽內水耗一寸又添一寸斷不可添冷水須用純櫟炭凡三日三夜不可斷火以煮盡水為度第四日早漉出用乘熱修去皮便成鹿角霜缽內所餘汁須要熬取十分稠黏卻用竹筒溜出斟在陰凍處隔宿即凝結破開竹筒用布線鋸成餅子收頓又煮膠法須用兩鍋一鍋常要溫湯準備添用又法鹿角不用自死者不以多少三寸許截斷去粗皮將鹿角於河水浸七日其每日一易候日足洗淨鍋中煮每鹿角五斤用桑白皮半斤楮實一斤舶上硫黃二兩硃砂二兩同煮之如水盡旋添湯及一伏時自然已軟或火不相繼末軟再煮一伏時如軟放冷取出於當風處掛起便可入藥用煮角水濾去諸藥慢火再熬便可為膠丸藥法蜜劑每藥一斤用蜜一斤麵糊劑每藥末一斤用面四兩米粉亦如之養生雜論青牛道士皇甫隆遇青牛道士封君達云體欲常少勞無過食去肥醲節酸鹹減思慮損喜怒謹房室養性養性之道欲小勞但莫太疲及強所不能堪爾食欲小而不欲頻常如飽中飢飢中飽善養性者先飢乃食先渴乃飲食後當行畢摩腹數百遍臥常習閉口口開則失氣邪從外入屈膝側臥益人氣力勝正偃臥春欲晏臥早起夏秋欲夜寢早起冬欲早臥晏起雖云早起莫在雞鳴前雖云晏起莫在日出後莫久行久立久坐久臥久聽久視莫強食莫強酒飲則不欲多多則速吐之為佳勿令至醉唾不至遠行不疾步耳不極聽目不極視坐不久處立不至疲臥不至厭先寒而衣先熱而解真常子養生酒多血氣皆亂味薄神魂自安夜漱卻勝朝漱暮餐不若晨餐耳鳴直須補腎目暗必須治肝節飲自然脾健少思必定神安汗出莫當風立腹空莫放茶穿孫真人養生銘怒甚偏傷氣思多大損神神疲心易役氣弱病相縈勿使悲歡極當令飲食均再三防夜醉第一戒晨嗔亥寢鳴云鼓寅興嗽玉津妖邪難犯己精氣自全身若要無諸病常當節五辛安神宜悅樂借氣保和純壽夭休論命修行本在人若能遵此理平地可朝真孫真人十二多多思則神殆多念則志散多欲則志昏多事則形勞多語則氣乏多笑則臟傷多愁則心懾多樂則語溢多喜則忘錯昏亂多怒則百脈不定多好則專迷不理多惡則惟悴無厭真人養生銘人慾勞於形百病不能成飲酒勿大醉諸疾自不生食了行百步數以手摩肚寅丑日剪甲頭髮梳百度飢即立小便飽即坐旋溺行處勿當風居止無小隙遇夜濯足臥飽食終無益思慮最傷神喜怒最傷氣每去鼻中毛常習不唾地平明欲起時下床先左腳一日無災殃去邪兼避惡如能七星步令人長壽樂酸味傷於筋苦味傷於骨甘即不益肉辛多敗正氣咸多促人壽不得偏耽嗜春夏少施泄秋冬固陽事獨臥是守真慎靜最為貴錢財生有分知足將為利強知是六患少欲終無累神靜自然安修道宜終始書之屋壁中將以傳君子養性之術楊泉物理論曰穀氣勝元氣其人肥而不壽元氣勝穀氣其人瘦而壽養性之術常使穀氣少則病不至矣四損遠唾損氣多睡損神多汗損血疾行損筋
