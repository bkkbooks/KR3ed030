body:
  text: 序二氣運行化生萬物而不能常和平人者天地之心必求以抉其偏吾身與天下均此理也先賢謂不為相則必為醫相與醫分殊而心同皆所以抉陰陽之偏而致中和以生斯人也宰相之方抑多矣自典謨以後集其驗有五焉曰伊訓曰説命曰周官曰出師表曰資治通鑑若夫醫師之方集之者衆而未有灼然保其驗者吾宗君輔萃聞見紀其效而録之視疾痛疴癢之於身切矣求余序所以作余曰藥進醫手方傳古人理也飲地黃蘆蔔後果可服清涼散乎早服黃昏湯則不必飲定志丸乎吃厚朴湯者必衆矣君輔其為我驗之咸淳元年歲在丙寅二月初吉眉山朱景行序
