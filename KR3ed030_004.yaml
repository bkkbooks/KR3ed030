body:
  text: 卷之四脾胃門附嘔吐翻胃虛腫脾胃評評曰脾為諫議之官胃為倉廩之官足太陰之經也蓋脾胃屬土位居中央屬乎戊己主於中州每旺四季一季之中土旺十八日內主肌膚外應於唇惡濕好燥喜歌樂畏怒氣故與足陽明胃之經相為表裡表裡溫和水穀易化若飲食過度傷於生冷由是百病生焉脾之脈以阿阿緩短為本脈若實大弦長濡弱皆病脈也若脾脈虛弱則腹脹食減飲食不化或嘔吐泄利甚則腹痛面黃氣急腫滿若脾脈實大則唇焦口燥身熱頰痛體重腹脹善飢善瘛甚則舌根腫強口內生瘡故胃為水穀之海主稟四時皆以胃氣為本諸脈無胃氣者死啓元子云補腎不著補脾脾能納五味以養五臟故脾胃之氣一日不可虧也智者觀之則思過半矣治方大沉香降氣湯治男子婦人氣不升降氣聚衰弱脾胃不和飲食不進嘔逆噁心自痢腹痛虛喘氣促虛陽上攻及男子婦人氣血不調流注腳氣並皆治之南嶽董云叟方沉香木香丁香真紫蘇子炒白朮茯苓橘紅肉豆蔻各一錢檀香厚朴半夏湯泡七次五味子人參各一錢半當歸各二錢半藿香葉半兩白豆蔻仁二錢上㕮咀分作十服水一盞半生薑三片棗一枚煎八分空心服大便不通加枳殼去瓤心下不寧加麥門冬子去心不思飲食加神麯麥糵炒夜不得臥加酸棗仁炒壯筋骨長肉補血加黃耆鹽水浸炙四肢疼痛加桂與芍藥臟腑有寒加熟附子此藥屢用神效不可具述崇土散治脾土虛弱腎水無畔岸易致腹滿腹痛時有泄瀉之證皆宜服之白朮一兩切大片以黃土半兩水一碗煮一晌須洗去泥焙丁香三錢生用乾薑一兩黃泥裹煨十分乾草果半兩黃泥裹煨乾去皮人參半兩黃泥裹煨縮砂連皮二兩黃土炒少時去皮粉草半兩黃泥裹煨乾去土銼上為末每服二錢沸湯調服日空心三服或用伏龍肝煎湯尤妙此方系杭州傳來服之屢有效五補散五臟先補於脾脾土實而飲食自進病證不生脹亦不作平補不燥製厚朴炒淨陳皮去白炒茴香去土石炒丁香皮不見火益智仁去皮炒縮砂仁炒神麯碎炒甘草炙良薑銼碎炒桔梗去蘆肉桂去皮不見火木香上十二味等分為細末鹽湯點下一日三服或用姜三片鹽少許煎服亦得湘中陳必勝方真是奇妙厚朴湯治脾胃不和冷瀉腹痛生薑厚朴棗肉各一兩已上用水一碗煎乾入粟米粥半盞同杵為餅子貼壁上候乾取下焙乾並後藥同碾服縮砂仁炒良薑草果仁炒甘草炙白朮訶子炮各半兩肉桂二錢半上氣實加青皮半兩虛加陳皮半兩細碾為末每服三錢入燒鹽少許空心沸湯點服八珍散治脾疼不進飲食白豆蔻仁炒石蓮肉不去心炒白茯苓炒薏苡仁炒白扁豆蒸沉香不見火陳皮各一兩炙甘草半兩炒上㕮咀每服六錢重水二盞姜五片煎八分去滓服用紙隔藥炒勿令傷藥力胡石壁為軍器監偶得此疾得門人制屬進此藥而愈生胃丹此丹兆天之五氣回黃反谷生精生陽壯脾元實腎水翻胃吐食胃虛生風手足搐搦痰涎潮作聲久病全不納食胃氣欲絶最能救之南康劉立之方人參神麯炒麥糵炒谷糵炒半夏曲各一兩白朮白芍藥川續斷川牛膝酒浸焙川厚朴薑製丁香防風各一兩半白豆蔻仁炒山藥白茯苓木香沉香各二兩香附子三兩縮砂仁炒二兩粟米七升生薑五斤取自然汁浸粟米蒸爛焙天南星一斤用生薑滓和作餅真黃土成泥包裹放慢火內煨令香熟去土焙為末上為細末法丸如緑豆大每服一百丸用白湯吞下生胃丹生胃氣消痰沫開膈進食粟米四兩溫水浸透炊作飯火焙乾乘熱用生薑自然汁和濕再焙乾如是制七次粉白天南星二兩薑汁浸一宿次日用生薑汁和紙筋黃泥裹南星晾乾用慢火煨半日泥焦乾為度候冷取出南星入藥人參白朮茯苓各二兩陳皮白豆蔻仁縮砂仁麥糵炒半夏曲青皮蓽澄茄石蓮肉各一兩南木香三錢上件精揀制同為細末用米粉糊丸如緑豆大每服五六十丸薑湯吞下食前服煮朴丸治脾胃不足停寒留飲泄瀉無時厚朴一斤制天南星去皮四兩肉棗去核五十個生薑一斤半和皮洗切作片入大蒜十杖同煮已上用水五升同煮上四味於銀器中煮令乾略炒去姜不用卻入後藥乾薑炮茴香炒各四兩青鹽一兩煅甘草一兩半炙同前藥煮乾去草不用附子炮川椒擇口閉者去目炒白茯苓各二兩上件細末神麯糊為丸如梧桐子大每服五十丸加至七十丸空心米飲下參橘丸壯脾進食消飲下痰醴泉梁國佐方人參神麯半夏泡七次縮砂仁麥糵各二兩炒白茯苓去皮四兩橘紅一斤去白用生薑一斤同搗曬乾上為細末薑汁打糊為丸每服五十丸薑湯下熱水亦得法制姜附丸治脾胃虛弱香附子炒去毛稱一斤米泔水浸秋冬三日春夏一日夜濾出新水洗浸入銀器中水三碗令香附上有水寸余次取大蒜二十頭去皮膜取仁鋪在香附上慢火煮之候蒜如糊即用銀匙不住手攪二三百轉以蒜不見而汁干為度取出候冷每香附子一個橫切作五七段慢火焙乾冷入後藥神麯炒黃六兩乾薑炒四兩蓽撥丁皮胡椒縮砂仁炒各二兩上為極細末湯浸一宿蒸餅為丸如梧桐子大每服五十丸隨湯亦可下不拘時候浸蒸餅待湯已入蒸餅了稍冷用新布包裹裂去水方可用藥如覺難丸入少麵糊為丸不妨更加淨陳皮二兩用鹽水浸焙乾尤妙如寒多加附子二兩桂一兩周馬帥之祖承奉因靖康初自泗州逃難山陽夜行墜古冢中已先有人在矣至曉各散出於冢外得幅紙裹太平錢八十四文紙上有此藥方云江南上下人弱疾當作於脾胃脾元壯實則飲啖美健自然無病壯脾有藥曰法制姜附丸先祖甫弛檐即合此藥無日不服一生無疾壽八十四祖母安人服之又九十六母永國夫人服之壽九十八婆婦雖老皆飲食不減壯年甚妙朴附丸厚腸胃止寒泄助元氣進飲食兼治脾腎氣弱手足浮腫川椒去目茴香各二兩青鹽一兩附子四兩去皮生用切作片子生厚朴生薑各四兩上用水三升於銀器內慢火煮水盡為度焙乾為末煮糊為丸趙忠肅取效方蒜煮壯脾丸厚朴蒼朮白茯苓各二兩陳皮七錢甘草二錢半訶子一兩附子川烏各一兩生薑半斤棗子五十枚大蒜十個去皮煮爛上細末神麯糊丸每服百十丸空心米飲鹽湯任下厚朴丸寬中進食推化積聚三山魯太丞方胡大卿常服之厚朴四兩去浮皮蘸生薑自然汁炙焦黃蒼朮二兩米泔水浸洗曬乾切片略炒莪朮二兩濕紙裹煨去皮切片青皮二兩洗去瓤曬乾銼細略炒陳皮二兩洗去瓤曬乾銼細略炒當歸二兩去蘆淨洗曬乾荊三稜二兩去蘆切片白芷二兩切片已上用老醋浸七日春夏浸五日取出焙乾碾為細末入後藥中禹餘糧火煅醋淬凡十次為細末用水飛過再入坩堝內火煅通紅淨稱二兩再研針砂二兩淨洗用醋浸一宿煮乾研極細淨稱上二味同前藥末內醋煮麵糊搜和為丸如梧桐子大候乾每服七八十丸至百丸陳米飲送下食前朱佐方脾疼單方張忠順盛夏調官都城苦熱食冰雪過多又飲木瓜漿積冷於中遂感痹疼之疾藥不釋口殊無退證纍歲日齊道人適一道人曰我受官人供固非所惜但取漢椒二十一粒浸於漿水盆中一宿漉出還以漿水吞之若是而已張如所戒明日椒才下腹即脫然更不復作類編冰煎理中丸泗州楊吉老名醫也徽廟常苦脾疾國醫進藥俱不效遂召吉老診視訖進藥徽廟問何藥吉老對以大理中丸上云朕服之屢矣不驗吉老日臣所進湯使不同陛下之疾以食冰太過得之今臣以冰煎此藥欲以受病之源果一二服而愈瑣碎録木香神效散治遠年近日一切脾病南木香青皮陳皮麥糵炒大枳殼炒荊三稜蓬莪朮神麯炒甘草炙各二錢半北白芍藥川白芷肉桂去皮延胡索破故紙各二錢半蓽澄茄丁香各一錢上㕮咀每服三錢水一盞半生薑三片棗子一枚煎至七分空心服臨熟加鹽一捻再煎兩沸忌麵食豆腐一切生冷此方得之鄉里蕭國賢國賢得之川僧云自感此疾以來遇食冷物或天氣寒冷便發發則胸間一點痛起或引入背膂痛不可忍服之遂絶根源屢用屢效難以具述出朱佐方枇杷葉散調理脾胃清膈下氣去積滯舒氣除痰推陳納新養生之要不可缺也丁香乾薑半夏湯浸洗沉香枇杷葉薑汁塗炙肉豆蔻麵裹煨各三錢甘草五錢半炙白豆蔻仁炒陳皮縮砂仁炒各六錢茯神去木白朮各一兩檳榔二錢半煨青皮四錢半木香四錢上㕮咀每服三錢水一盞半生薑三片棗子一枚煎至七分不拘時候白豆蔻丸補脾胃氣弱飽則胸間虛滿白豆蔻仁炒縮砂仁炒人參白朮茯苓去皮丁香白姜粉草麥糵各一兩炒良薑半兩上細末煉蜜丸如彈子大每服一二丸食前煎人參棗湯嚼下寶慶張太醫方屢用有效烏雞煎丸補脾胃虛弱大附子炮去皮臍川當歸各一兩紅椒半兩白茯苓七錢上為細末用烏雞一隻將米醋爛蒸合末為丸如梧桐子大每服五六十丸空心鹽湯溫酒任下廬陵範太醫方桃仁散治男子脾痛不可忍神效桃仁不拘多少螺粉炒卻不用粉上為細末空心酒調服進食散調脾進食療腹脹吐逆青皮陳皮甘草肉桂附子炮草果子訶子良薑白姜上等分㕮咀生薑三片棗子一枚水一盞半煎至一盞空心一日三服丁香調氣湯白豆蔻八錢丁香七錢縮砂仁乾薑炮木香白朮炒各半兩甘草炙一兩半炒鹽一兩三錢上為細末熱湯點服魏氏方經進過院湯草豆蔻一兩用生薑五兩切片同拌以水三升慢火煮水於為度取出焙乾白豆蔻仁蓬莪朮炮益智仁各半兩粉草炒鹽各一兩半上為細末熱湯點服平胃丸正胃消痰平胃散四兩半夏四兩薑製好棗二百枚燈心草一小把上水一大碗煮候棗爛去燈心草用棗去皮核取肉為丸如梧桐子大每服九十丸薑湯下安脾散白朮白豆蔻仁炒香附子炒人參甘草上等分白湯點服信庵趙大師姜附湯治脾虛腹脹嘔吐痰飲食不進或發寒熱白豆蔻半兩去殼附子一個七錢炮縮砂仁三錢白姜一兩炮甘草半兩上㕮咀每服三錢水一盞半煎八分空心服屢用取效生胃丸治酒食所傷胸膈不快不思飲食良薑白姜各四兩並油炒丁香胡椒上細末麵糊丸如梧桐子大每服百十丸米飲陳皮湯下蠍梢散治腹脹胡椒一兩蠍尾半錢去刺上面糊為丸如粟米大每服五七丸至一二十丸陳米飲下參附正氣散治脾腎傷損見諸氣門青棗散治脾胃泄瀉心腹膨脹疼痛不納飲食或作吐逆翻胃脾痛氣不升降兼脾胃積冷陳皮甘草乾薑良薑各炒上等分細末每服一錢鹽湯空心點服薑棗煎亦得忌生冷魚腥酒豬肉動氣物只可吃鳩子雀兒豬肝肺等物參藿散治脾胃積冷吐逆不納飲食宿食不消氣不升降嘔吐酸水心腹膨脹腳手虛浮甘草白芷各一兩丁皮半兩厚朴三兩制上㕮咀每服三錢姜三片紫蘇五葉水一盞煎至七分服之無時如虛浮入黑豆五十粒濃煎忌生冷魚腥動氣等物導引方去太倉不和臂腰虛悶欹身兩手一向偏側急努身舒頭拱手竟扒相牽漸漸一時盡勢氣共力皆和來去左右亦然各三七項前後兩角緩舒手如是似向外扒放縱身心搖三七遞牙亦然嘔吐丁香半夏丸治宿寒在胃嘔吐吞酸丁香不見火一兩乾薑炮半夏湯泡七次橘紅各二兩白朮一兩半上為細末生薑自然汁打糊為丸如梧桐子大每服五十丸淡薑湯送下食前柴胡湯治熱證嘔吐柴胡去蘆半斤黃芩人參甘草炙各三兩半夏湯洗七次焙乾二兩半上銼散每服三錢水盞半生薑五片棗一枚煎熱服如神湯治痰證嘔吐連日不效半夏子炒神麯不拘多少炒黃色去半夏留神麯丁香上用二味水一盞半煎八分其藥自然煎成濃汁不妨通口服其疾即止用此藥下養正丹甚妙大半夏湯治痰證嘔吐半夏制二兩人參四錢切片上銼每服四錢姜七片蜜少許熟煎服四七湯治喜怒悲思憂恐驚之氣結成痰涎狀如破絮或如梅核咯不出咽不下或中院痞滿氣不舒快痰涎壅盛上氣喘急並宜服之出易簡方半夏五兩茯苓四兩紫蘇葉二兩厚朴三兩上㕮咀每服四錢水一盞半生薑七片棗一枚煎至六分去滓熱服不拘時一名大七氣湯大治七氣並心腹絞痛一方治七情所傷中脘不快氣不升降腹脅脹滿香附子炒半斤橘紅六兩甘草一兩同煎尤妙附子散治虛弱翻胃大黑附子一枚作兩截中心各剜小孔入丁香四十九粒塞滿以竹針插合置磚上炭火熁四圍淬生薑自然汁半碗再熁再淬以盡為度去皮切焙上為細末每服一錢半粟米一捻北棗二個煎食前服翻胃治翻胃方大附子一枚切去蓋刳中使淨丁香四十九粒以蓋覆之線縛著真銀石器中浸以生薑自然汁及蓋而止慢火煮乾為度上為細末一錢匕摻舌上漱律下若煩渴則徐食糜粥忌油膩生冷淳熙元年冬蟡侄自鄱陽往四明過婺州義塢晚泊逆旅倏有野服者坐於傍扣其何人曰邑醫孫道攻療眼疾蟡與之語孫曰君貴家子弟必藏好方畀我一二或可以為人起疾蟡素祕翻胃方即口授之孫喜書之於冊末幾州鈴轄苦此疾危甚孫為拯治用此方數服愈類編驢尿治翻胃方外臺載云昔幼年經患此疾每食餅及羹粥等須臾吐出正觀中許奉御兄弟及柴蔣等時稱名醫奉敕令治罄竭其術竟不能療漸至羸憊死在朝夕忽一衛士云服驢小便極驗日服二合後食惟吐一半晡時又服二合人定時食粥吐即便定迄至今日午時奏之大內五六人患翻胃同服一時俱差此藥稍有毒服時不過多盛取及熱服二合病深七日來服之良驗本事方溫胃散治翻胃真附子一個去皮臍分作四塊生薑半斤水一大碗慢火同煮至水盡取附子切焙上為細末每服一錢空心溫米湯調下薑桂湯治翻胃嘔吐無不效白姜炮紅豆肉桂丁香粉草縮砂仁炒敗姜用灶心土炒上各半兩為細末每服一錢生薑自然汁一分沸湯調下治翻胃嘔吐方山礬葉不以多少炒黃用黑小豆炒香田螺殼火煅上為末或酒或熟水調二三錢服之立止水煮平胃散趙端明本蒼朮厚朴制陳皮甘草四味各十兩肉棗半斤除核稱生薑二十兩切片子粟米一升洗以上是古本以下是加品白茯苓茴香各二錢上以上藥同一處用文武火煮水約過藥三寸煮水乾為度火焙為末每服一錢空心鹽湯點服附子五苓散治翻胃吐食大附子一隻取空入五苓散在內炮熟上為細末用薑湯下何元壽方十膈散治翻胃嘔吐老薑二大拇指大剜空中間以子母丁香二粒在內合住以濕紙煨上以十膈散嚼生薑丁香同下蕭純仲方導引方除腹肚冷風宿疾積胃口冷食飲進退吐逆不下正坐兩手向後捉腕反拓席盡勢使腹弦弦上下七左右換手亦然虛腫制緑豆治十種水氣脾腎氣浮腫悉皆治之大附子一隻去皮臍切作二片用緑豆二合半水三碗半入瓷器內煮候乾熟上取出乘熱空心只吃緑豆其附子留住次日將附子兩片作四片再用緑豆二合半水三碗半同煮乾熟乘熱空心吃緑豆第三日再別用附子一隻緑豆二合半如前法度服之又第四日亦如前第二日法度服之每一日臨臥時吃豆但依此資次凡服四日其水從小便下腫自消退如未退再以前藥服之忌生冷毒物鹽酒六十日無不效者荊南朱監酒惠迪夫嚴州人與胡全才僉判云某有一水氣藥收二十餘年醫百十人萬不失一只如到荊南已醫八九人胡全才傳與先君後將此藥醫三老人皆年八十餘又傳與諸醫收效甚衆真奇方也沉香大腹皮湯治腫沉香陳皮良薑附子丁香川芎白豆蔻草豆蔻仁各半兩厚朴大腹皮炙各一兩白朮二兩半上細銼為散每服三大錢水一盞半生薑七片煎至八分去滓食前通口服信庵趙魯公母雍國夫人腫三十年後在襄陽得此藥服半月愈赤小豆粥治水腫屢效赤小豆炒倍加樟柳頭細切片黃丫魚生細切豬腰一對生細切燒鹽少許上先將赤小豆煮濾去汁不用將豆樟柳頭大白陳米煮粥若得大樟蓼同煮尤妙無亦可候粥七分熟卻入黃丫魚與豶豬腰同煮覺魚與豬腰皆熟方入燒鹽吃之不過半月立愈病輕者其效尤速又方生樟柳切片赤小豆等分鯽魚去腸存鱗三枚上件二物實魚腹中線縛之水三升煮令豆爛去魚只取二物食之汁送下單方治脾虛受濕發腫一切虛腫皆治張斗南方大附子十枚生削去皮破四塊用赤小豆半方藏附子中慢火煮附子這熟軟去豆焙乾附子上為末用薏苡仁粉煮糊丸梧桐子大每服百十丸空心冬瓜湯下或蘿蔔湯下沉附湯治腫病大凡腫病因積而得先用積藥積既除而腫再作小便不利到此束手矣若用利小便藥性寒而小便愈不通故小便不利則中焦下焦不升降痞隔為寒氣所結故水凝而不通但用沉附湯附子一隻生去皮臍切成片上用生薑十數片水三盞煎八分次用沉香濃磨二錢許加入藥再煎二沸去滓空心服如此則小便自通喘滿自去矣沉附湯一向吃三五十隻附子無礙男子婦人皆可服梁國佐方加減五苓散治腫疾木豬苓白茯苓白朮板桂各七錢澤瀉一兩南木香丁香沉香檳榔各三錢白豆蔻三錢半上為細末每服一錢半煎白樟柳湯空心溫點服如要取水加甘遂半錢在藥內利三五次又當以勻氣藥止之大凡治腫三日兩日又一取之取三二次水必去矣續用勻氣藥調理治腫之法無出此也勻氣之藥或烏沉湯勻氣內去甘草用之緣取腫藥內中有甘遂蓋甘遂反之故也此藥先不若濃煎燈心木通湯點服為妙不要甘遂從小便下甚穩更量虛實用之大要看尺脈腫盛而尺脈如絲或洪浮按之無根者皆不可下此死脈也外臺云脈大者生小者死叔和云水氣浮大得延生沉細應當是死別過氣丸治脾腎氣虛腎水流溢四肢作腫大蒜五枚剝去皮碎附子一大隻去臍切作塊赤小豆揀五兩上三味同於砂鍋內用水五升煮乾為度水三升漸添至五升只取附子為末余不用卻入後藥白花商陸根半兩沉香二錢木香三錢車前子三錢半上件同附子用薏苡仁末煮糊為丸如梧桐子大每服五十丸薏苡仁湯下空心日進三服其效如神穀神嘉禾散治一切腫喘煎下黑錫丹臨臥服五苓散效沉香降氣湯治腫喘每覺氣自小腹衝上便眠臥不安用局方沉香降氣湯吞下局方茴香丸後來用八味丸與安腎丸消風散合拌丸用四物湯下謝節使服之而愈殊不可曉平胃散治腫病不進飲食蘿蔔子一盞白水煎候清汁煎平胃散上每服二錢所以煎蘿蔔子汁一盞加薑棗煎至七分仍入蘿蔔一捻同煎服此方屢有效胃苓丸治腫平胃散五苓散上各一貼用大蒜蒸熟丸胃苓二藥五十丸煎木通湯吞下野雞餛飩法治腹腫野雞不問雌雄一隻陳皮茴香炒生薑馬芹子炒川椒炒上用蔥醋浸一宿蒸餅和雞肉同作料為餡少著鹽外用麵皮包作餛飩煮熟爛食用又先早晨服嘉禾散食後吃餛飩日中服導氣枳殼丸晚間兩熟野雞食黏斷卻用前件料物調和野雞肉食後停息少時服錢氏八味塌氣丸醴泉梁國佐方獨勝散治水氣腫脹大理孫評事傳一家專貨此藥盛行川獨活用巴豆炒去巴豆上碾為細末煮精豬肉蘸藥服服者皆痊治酒遍身黃腫方五靈脂一兩上為末入麝香少許研勻飯丸小豆大每服十丸用米飲吞下加料五加皮散治水腫先用五加皮飲加澤瀉薑棗煎先服三服次用大戟甘遂等分為末麵糊為丸如彈子大用樟柳桑白皮緑豆濃煎湯細嚼空心下有老人足脛微腫脾胃虛弱泄瀉吐食調脾補胃略無寸效用三合散而愈後服復元丹兼補脾氣連自利三日其病脫然蓋復元丹專治脾胃虛弱而致腫者紅丸子治一切飲食不化氣滿膨脹紅丸子二百粒用巴豆二十粒去殼同炒取巴豆色變為度上用橘皮湯送下不拘時煎木香湯下尤佳縮砂飲治氣脹氣蠱等病如神蘿蔔子研自然汁浸縮砂仁一宿炒乾又浸又炒不厭蘿蔔子汁多浸數次炒乾上以縮砂為細末每服一大錢米飲調下橘蒜丸治心腹痞脹大蒜去皮每一瓣鑽一竅入去殼巴豆一粒用濕紙裹煨熟去巴豆不用上用蒜搗成膏入橘紅末與蒜膏一味杵成劑為丸梧桐子大每服三五十丸米飲薑湯下海上方以陳皮包大蒜煨熟研和為丸米飲下
