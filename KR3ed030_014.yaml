body:
  text: 卷之十四中毒門附蛇蟲傷湯火傷中毒評評曰凡中藥毒及一切諸毒從酒得者難治言酒性行諸血脈流遍身體也因食得者易治言食與藥俱入於胃胃能容雜毒又逐大便泄出毒氣毒氣未流於血脈故易治也已毒即歸於臟飽者毒氣未能深入故宜急解凡解諸食毒爛嚼甘草咽之則毒吐出矣治方犯天麥毒方齊州有人病狂每歌曰五靈華蓋曉珍嚨天府由來汝府中惆悵此情言不盡一丸蘿蔔火吾宮又歌曰踏陽春人間二月雨和塵陽春踏盡秋風起腸斷人間白髮人後遇一道士作法治之乃云夢中見一紅裳少女引入宮殿皆紅紫飾小姑今歌道士曰此正犯天麥毒女則心神小姑脾神也按醫經蘿蔔治面毒故曰火吾宮即以藥並蘿蔔食遂愈洞微志礬灰散治中諸毒劉立之方晉礬建茶各等分上為末每服二錢新汲水調下得吐即效未吐再服雄黃散治中惡毒亦救蛇虺毒尤佳趙信庵方雄黃不拘多少上為末麝香少許以麥門冬湯調下出舌數寸者亦治甲子歲以此藥救三人凍青飲解砒毒凍青葉擂取自然汁添井花水服須瀉下解解砒毒方凡人誤食生砒唯單飲生麻油以吐為度則其毒氣自消不能為害治誤食諸毒方貫衆濃煎湯服之即解中仙茅附子毒方鄭長卿資政說少時隨父太宰官懷州將官服仙茅遇毒舌脹出口漸大與肩齊衆醫環視不能治一醫獨曰尚可救少緩無及矣取小刀釐其舌隨破隨合釐治百數始有血許醫喜曰無害也舌應時消縮小即命煮大黃硝石數杯連服之並以藥末摻舌上遂愈又蓋諒郎中說其兄詵因感疾醫盧生勸服附子酒每生切大附子二兩浸以斗酒旦起輒飲一杯服之二十年後再為陝西漕使諒自太學歸過之南樂縣拉同行中途曉寒詵飲一杯竟復令溫半杯皆酒至自覺微醉乃與妻使飲行數里妻頭腫如斗唇裂血流下駐路傍隨行李職醫告之李使黑豆緑豆各數合生嚼之且煎湯並飲至曉腫始消詵仍服之不輟到長安數月失明遂致仕時方四十二歲解藥毒方王仲禮嗜酒壯歲時瘡齄發於鼻延於顙心甚惡之服藥弗效僧法滿使服何首烏丸當用二斤適墳僕識草藥乃掘得之其法忌鐵氣但入砂鉢中藉黑豆蒸熟既成香味可人念所蒸水必能去風證以頮面初覺極熱漸加不仁至晚大腫眉目耳鼻渾然無別望之者莫不驚畏王之母高氏曰凡人感風癩非一日積吾兒遇毒何至於是吾聞生薑汁赤小豆解毒山豆根黑蛤粉能消腫亟命僕搗捩薑汁以三味為末調傅之中夜腫消到曉如初蓋先採何首烏擇焉不精為狼毒雜其中以致此撓也類編治蠱毒方嘉祐中範吏部道為福州守日揭一方於石云凡中蠱毒無論年代近遠但煮一鴨卵插銀叉於內噙之約一食頃取叉視卵俱黑即中毒也其方用五倍子二兩硫黃末一錢甘草三寸半生半炙丁香木香麝香輕粉各少許糯米二十粒上八味瓶內水十分煎取七分候藥面生皺皮為熟絹濾去滓通口服病人平正仰臥令頭高覺腹中有物衝心者三即不得動若出以盆桶盛之如魚鰇之類乃是惡物吐罷飲茶一盞瀉亦無妨旋煮白粥補忌生冷油膩殜醬十日後服解毒丸三五丸經旬平復類編解蠱毒並咒方頃有朝官與一高僧西遊道由歸峽程頤荒遠日過中餒甚祗小村舍間其家而勢必就去住未判僧曰吾有神咒可無憂也食至僧閉目誦詩俄見小蜘蛛緣碗吻僧曰速殺之於是竟食無所損其咒曰姑蘇啄摩那吾知蠱毒生四角父是穹窿窮母是舍耶女眷屬百萬千吾今悉知汝摩薩薩摩何時同行者競傳其咒所至無慈別傳解毒方用豆豉六粒巴豆去皮二粒上入百草霜一處研細滴水丸緑豆大以茅香湯吞下七丸治金蠶蠱毒方泉州一僧治金蠶蠱毒云才覺中毒先吮白礬味甘而不澀次嚼黑豆不腥者是也但取石榴根皮煎汁飲之即吐出活蟲無不愈者李晦之云以白礬茶芽搗為末冷水服凡中一切毒皆可治之雄黃散治五積蠱毒雌黃末雄黃末麝香末上各一錢取生羊肺如指大以刀開內雄黃等物以肺裹吞下治蠱毒方白礬末甘草末上等分清水調下或吐出黑涎一兩碗或瀉曾驗又方牡丹根搗為末服一匕日三服中挑生毒方興化人陳可大知肇慶府肋下忽腫起如生癰癤狀頃刻間其大如碗識者云此中挑生毒也俟五更以緑豆細嚼試若香甜則是已而果然凡搗川升麻為細末上取冷熟水調二大錢連服之遂洞瀉出生蔥數莖根鬚皆具腫即消縮煎平胃散調補且食白粥後亦無他又方雷州民康材妻為蠻巫林公榮用雞肉挑生值商人楊一者善醫療與藥服之才食頃吐積肉一塊剖開筋膜中有生肉存已成雞形頭尾嘴翅悉肖似康訴於州州捕林置獄而呼楊生令具疾證用藥其略云凡吃魚肉瓜果湯茶皆可挑生初中毒覺胸腹稍痛明日漸加攪刺滿十日則物生能動騰上胸痛沉下則腹痛積以瘦悴此其候也在膈上則取之其法用熱茶一甌投膽礬半錢於中候礬化盡通口呷服良久以雞翎探喉即吐出毒物在下膈即瀉之以米飲下鬱金末二錢毒即瀉下乃擇人參白朮各半兩碾末同無灰酒半升納瓶內慢火熬半日許度酒熟取溫溫服之日一盞五日止然後飲食如故地漿治菌毒方四明溫臺間山谷多生菌然種類不一食之間有中毒往往至殺人者蓋蛇毒氣所熏蒸也有僧教掘地以冷水攪之令濁少頃取飲皆得全活此方見本草陶隱居注謂之地漿亦治楓樹菌食之笑不止俗言食笑菌者居山間不可不知此治中菰菌毒方茱萸煎湯服吐下解熟艾煮服三五盞犬頸下取熱血灌之雄雞血亦可中菌毒方崇寧間蘇州太平山白雲寺五僧行山間得菌一叢甚大摘而煮食之至夜發吐三人急採鴛鴦草生啖遂愈二人不甚肯啖吐至死此草藤蔓而生對開黃白花傍水依山處皆有之治癰疽腫毒尤妙或服或傅皆可人謂之金銀花又曰老公須本草名為忍冬草己志中酒毒方次酒中毒經日不醒者用黑豆一升煮取汁上每服一小盞溫服不過三服即愈今人所謂中酒也中鱔魚蝦蟆鱉毒方頃有一士人好食鱔魚及鱉與蝦蟆嘗云此三物不可殺大者有毒殺人蝦蟆小者亦令人小便祕臍下蔽疼有至死者宜以生豉一大合上投新汲水半碗浸令豉水濃頓服之即差茅亭客話中豆腐毒方人有好食豆腐因中其毒醫治不效偶更醫醫至中途適見做豆腐人家夫婦相爭因問之云今早做豆腐妻誤將蘿蔔湯置腐鍋中今豆腐不成蓋豆腐畏蘿蔔也醫得其說至病家凡用湯使卒以蘿蔔煎湯或調或咽病者遂愈諸果有毒方本草衍義諸果有毒桃杏雙仁毒五月食未成核果令人發癰疽癤及寒熱又秋夏果落地為惡蟲緣食令人患九漏桃花食之令人患淋桃李仁不可和雞子食患內結不消中斑鳩毒方名醫録浙人王夫人忽日面上生黑斑數點日久滿面俱黑遍求醫士不效忽遇一醫云夫人中食毒爾某治之一月平復後覺其方止用生薑一片切碎研汁將滓焙乾卻用薑汁煮糊丸問其故云夫人日食斑鳩蓋此物嘗食半夏苗是以中其毒故用生薑以解之藥反中毒方解諸藥相反中毒蠶蛻燒灰細研一錢涼水調下頓服取效雖面青脈絶腹脹吐血服之即活中魚毒方虞侍郎蘇州人平生善食鱠中年病腹堅側身不得每發疼痛幾死纍治不效一善醫者切脈曰侍郎右關脈伏伏為積聚生冷之積成瘕在腹則痛不可忍以取藥令用橄欖汁吞丸子藥數粒晚下利一盆許是魚鱠縷前一半皆成魚矣從此遂安中萵菜毒方遁齊閒覽云萵菜出咼國有毒百蟲不敢近蛇虺過其下誤觸之則目瞑不見物人有中其毒者搗生薑汁飲之即解治中山雞鷓鴣毒方南唐書云南唐相馮延己苦胸中痛纍日不減迎太醫令吳延紹密詰廚人曰相公平日食何等物件對曰多食山雞鷓鴣延紹日吾得之矣投以甘草湯而愈蓋山雞鷓鴣者皆食烏頭半夏故以此解之中石斑魚子毒其魚身有紅斑如虎斑樣眼小口細其子不可食食之令人吐而頭眩魚尾草搗汁服少許吐立止此草一名樚木根似黃荊八月開紫花成穗葉似水楊無大樹經冬不凋漁人以藥魚神仙解毒萬病丸酒磨服久近頭疼太陽疼薄荷酒磨紙花貼太陽穴牙疼酒磨塗及含藥少許吞下牙關緊急磨塗一丸分三服打撲顛損傷折炒松節酒磨下半粒仍以水磨塗湯火犬鼠蜈蚣毒蛇百蟲傷並用水磨塗並服一粒癰疽發背未破魚臍瘡諸般瘡癤惡瘡腫毒水磨塗並服覺癢即消治小兒急慢驚風五疳八利蜜水薄荷磨隨大小加減孕婦不可服牛馬六畜中毒亦以此救神良凡居家或出入不可無此藥真濟世衛家之寶如嶺南毒藥最多若遊宦嶺表才覺意思不快便服即安二廣山谷間有草曰胡蔓草又名斷腸草若以藥人急水吞之急死緩水吞之緩死又取毒蛇殺之以草覆上以水灑之數日菌生其上取為末酒調以毒人始亦無患再飲酒即毒發立死其俗淫婦多自配合北人與之情相好多不肯逐北人回陰以藥置食中比還即戒之曰子某年來若從其言即復以藥解之若過期不往必斃矣名曰定年藥北人屆彼亦宜志之若覺著毒四大不調即便服之或於雞豚魚羊鵝鴨等肉內下藥後食此物即觸發急服此藥一粒或吐或利隨手瘥五倍子三兩淡紅黃色者捶碎洗淨紅牙大戟一兩半淨洗山慈姑二兩洗淨即鬼燈檠金燈花根也麝香三錢研續隨子一兩去殼研細紙裹壓出油再研如白霜上三味焙乾為末入麝香隨續子研令勻以糯米糊為丸每料分作十四粒於端午七夕重陽日合如欲急用辰日亦得於木臼中杵數百下不得令婦人孝子不具足人及雞犬見之有一女子久患勞瘵命垂旦夕為血尸蟲所噬磨一粒服之一時久吐下小蟲千餘條保靈丹解毒方論治蠱毒諸毒一切藥毒神妙往時蜀俗喜行毒而城都故事歲以天中重陽時開大慈寺多聚人物出百貨其間號名藥世者於是有於窗隙間呼貨藥一聲識其意亟投以千錢乃從窗隙度藥一粒號解毒丸一粒可救一人命夫跡既叵測故時多疑神仙政和間祐陵以仁聖惠天下嘗即上清寶録宮中之前新作兩亭左曰仁濟主給藥治疾苦右曰輔正主符水除邪鬼因遂詔海內凡藥之治病彰彰有聲者悉索其方書而上之焉於是城都守臣監司奉命相共窮其狀乃得售解毒丸家蓋出世拒行毒者為仇害故匿其跡非有所謂神仙者既據方修治得其全即並藥奏御下殿中省上曰朕自弛天子所服御以濟元元毋煩有司也繇是殿中省群醫堵司驗其方則王氏博濟方之保靈丹爾當是時猶子行適領殿中監事故獨得其詳吾落南來是藥常救兩人食胡蔓草毒得不死蓋不可不書百衲居士鐵圍硃砂一兩淨細研大山豆根半兩雄黃黃丹麝香黃藥子續隨子生杵末各二錢半川巴豆肥者二錢半取肉不去油斑蝥二錢半去頭翅足糯米半炒半生用赤蜈蚣二條一炙一生上十味各修制入乳鉢研和於端午重陽臘日修合不令雞犬婦人見用糯米稀糊丸如圓眼核大陰乾瓷合收每服一丸好茶清吞下不得嚼破須臾病人自覺心頭如拽斷皮條聲將次毒物下或自口出或大便出嫩則是血老則是鱉或蜣螂諸雜帶命之物藥丸凝血並下以水洗淨取之可救三人如中毒口噤即挑開下藥或蛇蠍馬汗諸毒以好醋磨傅患處立解服藥已效如知毒害之家不必研究若訴之其毒再發不救瘥後更忌酒肉毒食一月惟軟飯可也或急用但擇吉日精潔修合此方出劉涓子神仙遺方雞峰普濟方一卷獸能解藥毒論名醫言虎中箭食青泥野豬中藥箭緣薺苨而食雉被鷹傷以地黃葉貼之又礜石可以害鼠張鷟曾試之鼠中如醉亦不識人知取泥汁飲之須臾平復鳥獸蟲物猶知解毒何況人乎被矢中者以甲蟲末傅之蛇蟲傷治蛇齧方論臨川有人以弄蛇貨藥為業一日方作場為蝮所齧即時殞絶一臂之大如股少頃遍身皮脹作黃黑色遂死有一道人方旁觀出言曰此人死矣我有一藥能療但恐毒氣益深或不可治諸君能相與證明方敢為出力衆咸竦踴勸之乃求錢二十文以往才食頃奔而至命汲新水解裹中藥調一升以杖抉傷者口灌入之藥盡覺臍中搰搰然黃水自其口出腥穢逆人四體應手消縮良久復故其人已能起與未傷時無異遍拜觀者且鄭重謝道人道人曰此藥不難得亦甚易辦吾不惜傳諸人乃香白芷一物也法當以麥門冬湯調服適來事急不暇姑以水代之吾今活一人可行矣拂袖而去郭邵州沰得其方嘗有鄱陽一卒夜直更舍為蛇齧腹明旦赤腫欲裂以此飲之即愈被毒蛇咬傷方本草衍義有人被毒蛇傷良久已昏困有老僧以酒調藥二錢灌之遂蘇及以藥滓塗咬處良久復灌二錢其苦皆去問之乃用五靈脂一兩雄黃半兩上為細末酒調下二錢爾有中其毒者用之無不驗也治蛇傷欲死者雄黃末萵苣汁和作餅貼瘡豬血調貼亦可香白芷麥門冬湯調白礬末傅之北細辛末水調塗仍以酒服之鴨嘴膽礬末沸湯化細呷並傅瘡五葉藤又名五爪虎陰乾為末乾摻止痛立安巴豆數粒細研貼瘡立效散治蛇傷垂死者鐵蛟龍一名水藕一名金蓮花取根二兩銼片焙乾知母貝母各一兩雄黃半兩天雄一個生用紫河車三兩大川烏一個真北細辛上細末用生地黃酒調服即愈如鼻口血來生地黃酒加雄黃丸下如傷風隨脈證用發散藥並服之見瘡口腫不消用針腫處候毒氣出即安如有孕婦則除天雄少用川烏忌食葷物蕭南仲方屢效治一切蛇毒所傷方赤腳大蜈蚣一條瓦上焙乾雄黃巴豆霜各一錢麝香少許上為細末以杏核數個每個各磨成一竅去仁填藥在內令滿卻以蠟塞竅臨時蠟丸以針挑藥末塗傷處候黃水出即瘥用畢後塞其竅一枚可救數人治蛇咬腫痛七葉黃荊捶爛塗之治蛇傷方酒研水邊烏桕根吃即活又方急以酒調好雄黃末傅之毒水流如涎大效治蛇蟲所傷方凡蛇傷蟲咬倉卒無藥去處以大藍汁一碗雄黃末二錢上調勻點在所傷處並令細細服其汁神驗如無藍以澱花青黛代之山林日用方每欲出時用雄黃一桐子大火上燒煙起上以熏腳繃草屨之類及袍袖間即百毒不敢侵害邪祟遠避治蚯蚓咬方浙西軍將張韶為蚯蚓所咬其形如大風眉須皆落每夕蚯蚓鳴於體有僧教以濃作鹽湯浸身數遍瘥治蜘蛛齧方雄黃傅之朝野僉載中蜘蛛毒方治蜘蛛咬一身生絲羊乳一味飲之貞元十年崔員外從質云目擊有人被蜘蛛咬腹大如孕婦其家棄之乞食於道有僧遇之教飲羊乳末幾而平本草誤吞蜈蚣方有村店婦人因用火筒吹火不知筒中有娛蚣藏焉用以吹火蜈蚣驚迸竄入喉中不覺下胸臆婦人求救人無措手適有人在傍云可討小豬兒一個切斷喉取血婦人頓服之須臾以生油一口灌婦人遂噁心其蜈蚣滾在血中吐出繼與雄黃細研水調服遂愈蜈蚣咬方蜘蛛取一枚咬處安當自飲毒蜘蛛死痛末止更著生者立效今人以蜘蛛飲毒了即將放淨水中以活蜘蛛甚妙孫真人又方中蜈蚣毒者以烏雞屎水調塗咬處效大蒜塗亦效桑汁白鹽塗亦效又畏蛞蝓不敢過所行之路觸其身即蜈蚣死故取治蜈蚣毒也壁鏡咬方醋磨大黃塗之又方壁鏡毒人必死用白礬治之又方以柴灰汁三度煮沸取白礬為膏塗瘡口即瘥治療毒蛇亦效蠶咬人毒入肉方取芋塗之今以芋近蠶不生也本草治諸獸毒方馬咬用獨顆粟子燒灰帖貓咬用薄荷汁塗鼠咬用麝香唾調塗或用貓毛燒灰裛之狗咬傷涎入瘡令人昏悶者浸椒水調菵草末塗豬咬松脂熔作餅子貼又屋溜中泥蛛為蜂螫方處世劉易隱居王屋山嘗於齊中見一大蜂骨於蛛網蛛持之為蜂螫墜地俄頃蛛鼓腹破裂徐徐入草齧芋梗微破以瘡就齧處磨之良久腹漸消輕躁如故後人有為蜂螫者挪芋梗傅之而愈天蛇毒方太子中允關杞曾提舉廣南西路常平倉行部雍管一吏為蟲所毒舉身潰爛有一醫言能治使醫視之曰此天蛇所螫疾已深不可為也乃以藥傅其瘡有腫起以鉗拔之有物如蛇凡取十餘條而疾不起又豫家祖塋在錢塘西溪嘗有一田家忽病瘌通身潰爛號呼欲絶西溪寺僧識之曰此天蛇毒爾非癩也取木皮煮飲一斗令其恣飲初疾減半兩三日頓愈驗其木乃今之秦皮也然不知天蛇何物或云草間黃花蜘蛛是也人遭其螫仍為露水所濡乃成此疾露涉亦當戒也筆談誤飲蛇交水毒方陳齊郎湖州安吉人因涉春渴掬澗水兩口咽之數日覺心腹微痛日久疼甚服藥醫診之云心脾受毒今心脈損甚齊郎答云去年步春渴飲澗水得此病醫云齊郎吃卻蛇在澗邊遺下不淨在澗水內蛇已成形在腹中食其心而痛也遂以水調雄黃服之果下赤蛇數條皆能走也名醫録猘犬所傷方沈約宋書曰張收嘗為猘犬所傷醫云宜食蝦蟆膾收甚難之醫含笑先嘗收因此乃食瘡亦即愈犬傷方凡犬傷人量所傷大小杏仁爛嚼沃破處以帛系定至瘥無苦本草衍義虎犬咬人方白礬末摻瘡中裹之止痛立愈蠍螫方礬石一兩醋半升煎之投礬末於醋中上以礬醋浸螫處井底泥傅亦愈治蠼螋妖蟲方隱於牆壁間尿射人之影令人遍體生瘡如湯火所傷治法用烏雞翅毛燒灰上麻油調傅以雞者百蟲所畏能治之瑣碎録又方用雞子尖頭剜小竅取白塗四畔瘡即愈諸蟲入耳方蟲之類能入耳者不獨蜒蚰如壁蝨螢火扣扣頭蟲皂角蟲皆能為害有人患腦痛為蟲所食或教以桃葉不拘多少洗淨日乾上為枕睡一夕蟲自鼻出形為鷹嘴人莫知其名有人蜒蚰入耳遇其極時以頭撞柱至血流不知云癢不可忍蜒蚰入耳往往食髓至盡又能滋生凡蟲麻油灌妙湯火傷治湯火瘡方劉寄奴不以多少上為末先以糯米漿雞翎掃傷處後摻藥末在上並不痛亦無痕大凡湯著急以鹽末摻之護肉不壞然後用藥傅之至妙本事方湯潑火燒詩細碾山梔子濃調雞子清鵝毛輕拂上立便冷如冰又方黃連黃柏輕粉各等分朴硝少許上為末入麻油用合子合住上飯蒸調塗立愈治湯潑火燒方生側柏葉燒灰存性上碾為末以雞子清調瘡上如干再上蕭擇中知録曾用有效方黃柏散治湯火傷雞子殼黃柏樹皮朴硝上等分為末白水調塗極妙至聖膏治湯火傷雞子黃一兩上用銀石器內熬自然油調好粉傅之愈
