body:
  text: 卷之七黃疸門附失血淋閉五疸評評曰疸之證有五曰黃汗黃疸谷疸酒疸女勞疸者是也古方敘五種黃病者其實則一治一切發黃方三山曾太丞方山茵陳川楝肉麥門冬山梔子甘草上等分用燈心煎服不拘時候單方治黃疸身眼黃如金色不可使婦人雞犬見東引桃根切細如箸若叉股以下者一握上以水一大升煎取一小升適溫空腹頓服後三五日其黃離離如薄雨散最後差百日方平復身黃後可時時飲一盞清酒則眼中易散不飲則散遲忌食熱面豬魚等肉此徐之才家祕方又方治黃疸先用溫白丸痢動三兩次次用嘉禾散五服後服五苓散倍加豬苓山茵陳湯點服如吃茵陳湯逆滴水為丸不問溫酒皆可服其病須服此藥稍多方愈黃耆散治黃汗黃耆去蘆蜜炙赤芍藥茵陳各二兩石膏四兩麥門冬去心豉各一兩甘草炙上㕮咀每服四錢水一盞半薑五片煎至八分去滓溫服不拘時候治傷寒發黃五苓散加山茵陳煎服失血附折傷瘀血失血評評曰血為營氣為衛心生血肝藏血肺主氣營衛調和則氣血流轉決無壅滯之虞其或六氣有傷七情鬱結氣滯經絡則血行失度故有吐衄之患焉夫失血之證有三一曰內衄二曰肺癰三曰傷胃此證未有不因熱而發蓋血遇熱則溢血氣俱熱則血與氣壅故發為吐衄也又有感冒得汗後邪氣未解鬱於經絡隨氣湧泄發而為吐衄者有之又有飲酒傷胃遂成嘔吐物與氣上腹痛自汗發為吐衄者有之故憂愁思慮則傷心心傷則吐衄肺傷則唾血或有折傷吐血治之各有方法單方治吐血咯血不止白及研為末粥飲調服台州獄吏憫一大囚將死頗照顧之因感語之吾七次已死罪盡力抗諱苦遭訊拷坐是肺皆𧋽損至於嘔血適得一藥每用其效如神荷君庇拊之恩特此以報只白及一味米飲調餌其後凌遲劊者剖其胸見肺間竅穴數十處皆白及補填之色猶不變也洪貫之聞其説為郢州長壽宰規之赴洋川任一卒忽苦咯血勢絶危貫之用此救之一日而止癸志又方用新汲冷水調真蒲黃服見效胡制參方本草用溫湯下又方治咯血烏梅不以多少煎湯調百草霜一服愈又方治吐血辰砂妙香散又用絲茅根煎湯調平胃又用好京墨研末白湯化阿膠稀調服有人吐血連並不止服此而愈三豆湯治飲酒太過衄血吐血起則無事睡則尤甚服諸藥不效服此而愈烏豆赤小豆緑豆上各等分渾水服槐花散治咯血失聲槐花炒為末用糯米飲調服二服仰臥止衄散治氣虛發衄黃耆六錢赤茯苓白芍藥當歸生地黃阿膠各三錢上為末每服二錢煎黃耆湯下柏皮湯治血常失道暴出色鮮煩躁引飲大柏皮梔子各一兩甘草半兩上㕮咀每服五錢用水三盞煎至一盞去滓溫服地黃煎治心經火熱脈洪數或吐或衄生地黃汁半斤大黃末一兩上將地黃汁熬幹一半入大黃末熬丸如梧桐子大熱水五丸食後未止加至十丸又地黃煎治咯血嘔血嗽血生地黃沉水掬取汁二升生藕取汁一升生薑四兩取自然汁真酥三兩人參一兩為細末阿膠一兩微炒為末上先將地黃生薑汁同阿膠末入石器用慢火熬候稍稠即入參末熬少時方入真酥熬攪勻稀調得所每服一彈子大早晨日中臨臥含津咽或以麥門冬湯化亦得又方治咳嗽吐紅不止烏雞子清以手磨成水須磨千百次自然化成水然後用人參研為細末上每服人參二錢重調勻約五更服服藥時不得語仰啜下自然覺心肺俱涼滿口津液如無烏雞子亦得終不及烏雞子如此吃月十日未有不效者單方治嗽血咳血用小兒胎髮燒灰麝香酒調下每個小兒胎髮作一服婦人病用男子胎髮男子病用女胎髮又方治吐血失血後應男子失血勞疾後用婦人初生男子胎衣以長流水直是不住洗去惡血待清汁出方妙以酒煮直待爛為度卻不用鐵器煮止用瓶鉢之類俟其爛取去杵爛如泥次入茯神末三五兩又杵覺干又入酒些小又杵丸如梧桐子大每服百十丸米飲或酒下或用人參湯於中更加茯苓當歸尤妙云服時有些逆人愚見加少麝香於中尤妙並朱佐方參香丸治咳嗽吐紅辰砂人參乳香上三味等分用烏梅肉為丸麥門冬湯下京口朱醫方藁本湯治男子咳嗽吐紅不止梁時發方極有功效藁本二兩晉礬青皮陳皮罌粟殼各一兩上五味不犯鐵器杵爛用瓦瓶煮久煮為妙食後服二神湯治吐血絶妙治男子婦人吐紅之疾蓋是久病或作急勞損其榮衛壅滯氣上血之妄行所致若投以藕汁生地黃等涼劑治之必求其死矣每遇患者用藥甚簡甘草炙乾薑炮等分上為末每服二錢水一中盞煎至五七沸帶熱呷空心日午進之和其氣血榮衛自然安痊不可不知薏苡丸治痰吐臭穢及咯血薏苡仁一兩生薑半斤切小塊上件將手帕裹飯上蒸以米熟為度生薑不用卻以麥門冬天門冬二件去心生地黃各三兩為一處搗取自然汁入生蜜人參末各一兩打和入薏苡仁蒸乾每服三四十丸生薑湯下地黃丸治吐血遍服藥不效者生地黃一斤淨洗細研取汁其滓再入好酒少許又取汁令盡附子一兩炮去皮臍切片子入地黃汁內用銀器熬咸膏取出附子焙乾上以山藥三兩為末以地黃膏子和成劑丸如梧桐子大每服三十丸米飲空心服六一散治咯血發寒熱黃耆六兩炙甘草一兩炙上細末如常服點不拘早晚干吃亦得治氣而嘔血方五膈寬中散下理中丸蓋白薑能止血也固榮散治吐血三山曾太丞方蒲黃地榆各二兩滑石四兩甘草半兩上細末每服五大錢溫酒調下次用後藥震靈丹二丸黑錫丹二十丸養正丹十丸來復丹三十丸上件作一處作一服用湯使隨意下四方出梁氏總要方治勞心吐血方親用見效蓮子心七個糯米二十一粒上為細末酒調服出治未病方犀角地黃湯治傷風汗下不解鬱於經絡隨氣湧泄為衄或清道閉流入胃脘吐出清血及鼻衄吐血不盡余血停留致面黃大便黑犀角鎊屑生地黃白芍藥牡丹皮上等分㕮咀每服四錢水一盞半煎至八分去滓溫服不拘時如狂者加黃芩大黃其人脈大而遲腹滿但依本方不須加減治衄血方山梔子燒灰存性為末蔡子渥傳云同官無錫監酒趙無疵其兄衄血甚已死入殮血尚未止一道人過其門聞其家哭詢問其由道人云是曾服丹或燒煉藥豫有藥用之即活囊間出藥半錢匕吹入鼻中立止良久得活又方治鼻衄不止欲絶者良方茅花一大握銼水二碗煎濃汁一碗分二服飲立止藕汁飲治吐血衄血不止生藕汁生地黃汁大薊汁各三合生蜜半匙上件藥汁調和合勻每服一小盞細細冷呷之不拘時治鼻衄血方生地黃不拘多少取汁服豫在汝州時因出驗尸有保正趙溫不詣尸所問之即云衄血已數斗昏困欲絶豫使人扶腋以來鼻血如簷溜平日所記治衄數方旋合藥治之血勢皆衝出豫謂治血者莫如地黃試遣人四散尋生地黃得十餘斤不暇取汁因使之生吃漸及三四斤又以其滓塞鼻須臾血定又癸未歲豫婦吐血有醫者教取生地黃自然汁煮飲之日服數升三日而愈有一婢病經血半年不通見釜中飲汁以為棄去可惜輒飲數杯隨即通利地黃活血其功如此地黃但用新布拭淨搗汁勿用水洗信效方治鼻衄七蒸丸鹿茸七兩分七處蒸酸棗仁半兩去殼石蓮肉半兩去心白茯苓一兩菟絲子一兩淨洗肉蓯蓉一兩益智仁一兩去殼北茴香半兩青鹽拌勻上將鹿茸切片分作七份以碗七隻各蒸一份以好酒一升每處用藥一份同浸一宿連碗排飯上蒸飯熟取出為度和勻焙乾為末以山藥十兩煮糊為丸如梧桐子大硃砂為衣每服五十丸至一百丸棗湯下獨勝散治鼻衄廣西計議何清之方鏡面草又名螺厴草水洗擂爛入酒濾去滓取汁服一金散治鼻衄出血過多昏冒欲死諸藥不效大蒜研左鼻貼在左腳心右貼右兩鼻貼兩腳心又方好香墨濃研點入鼻中又方生蒲黃二錢青黛半錢生藕汁調作一服即驗又方亂髮灰吹入鼻中雄黃散治鼻痔雄黃北細辛麝香上三味為末搐入鼻中又方人中白新瓦上火逼以溫湯調服即止旋盆內積溓垢是也淋閉通草湯治諸淋通草王不留行葵子茅根桃膠瞿麥當歸蒲黃炒滑石各一兩甘草半兩上㕮咀每服四錢水一盞半薑五片煎八分溫服不時二神散治諸淋急痛海金沙七錢半滑石半兩上末每服二錢半多用燈心木通麥門冬新水煎入蜜調服鹿角霜丸治膏淋多因憂思失志意舍不寧濁氣干清小便淋閉或復黃赤白黯如脂膏鹿角霜白茯苓秋石各等分上為末用糊丸如梧桐子大每服五十丸米飲下發灰散治血淋若單單小便出血如尿此為莖衄此方主之亂髮燒為灰不以多少上為末入麝香少許每服二錢用米醋泡湯調下治淋以葵子末等分用米飲調下最治婦人胞轉不尿石燕丸治小便澀痛不可忍出砂石而後方通石燕燒紅水淬二次滑石石韋去毛瞿麥穗各等分上為末糊丸如梧桐子大每服五十丸瞿麥燈心湯下日三服瞑眩膏治諸淋疼痛不可忍及砂石淋大蘿蔔上切作一指厚四五片用好白蜜淹少時安鐵鏟上慢火炙乾又蘸又炙取盡一二兩蜜反復炙令香熟不可焦候冷細嚼以鹽湯送下沉香散治氣淋多因五內鬱結氣不舒行陰滯於陽而致壅滯小腹脹滿便溺不通大氣分泄小便不利沉香石韋去毛滑石王不留行當歸各半兩葵子白芍藥各三分甘草橘皮各一分上為細末每服二錢煎大麥湯調下石韋湯治心經蘊熱傳於小腸小腸熱於脬中脬屈僻而系轉診心脈大而牢石韋去毛車前子上二味等分濃煎汁飲之其人腹脹必忍溺好屈臥曲膝致陰縮腫此厥陰之證加赤茯苓黃耆等分尤妙犀角地黃湯治小腸淋瀝出血疼痛難忍及治心血妄行衄血等疾犀角半兩如無真犀角以升麻代之芍藥二錢牡丹皮半兩上三味為粗末入生地黃二寸打碎水一盞同煎至八分空心服之心血妄行衄血等疾食後臨臥服之用絲茅根煎服余癸丑夏嘗苦淋漓之疾出血不已得黃應明授此方數服而愈小便出血方用自己頭髮一握洗淨燒灰溫酒調下一服立效白薇散治血淋熱淋白薇芍藥上等分為細末每服二錢用酒調下立效單方療小遺出血條淡豆豉煎湯服效透格散治五淋勞淋血淋氣淋石淋熱淋困危淨白硝石一兩上為細末每服三五錢勞淋葵子煎湯下血淋冷水下熱淋瞿麥煎湯下氣淋滑石湯下石淋桑白皮煎湯下單方治淋疾數年不愈者四君子湯去甘草白水煎服單方治小便出血竹茹為末白水煎服甚妙通祕散治血淋痛不可忍方陳皮香附子赤茯苓等分上粗末每服二錢水一盞煎六分空心服本草云陳皮利小腸鏡面散治小便出血余頃在章貢時年二十六忽小便後出鮮血數點不勝驚駭卻不疼如是一月若不飲酒則血少終不能斷偶得一器清汁云是草藥添以少蜜解以水兩服而愈其名鏡面草又名螺厴草其色青翠所在階縫中多有之單方治尿血香附子為末用飛過白礬酒下定磁散治砂石淋真定磁赤芍藥上等分為細末濃煎燈心湯空心調服燈心湯治熱淋疼痛燈心乾柿二味等分銼碎水煎服信效散治五淋此三方梁氏總要方赤芍藥一兩檳榔半兩上㕮咀每服三錢水一盞半燈心五莖煎空心服治砂石淋方鄞縣尉耿夢得夢苦砂石淋十三年每溺時器中剝剝有聲痛楚不堪耿命採苦杖根俗呼為杜牛膝者淨洗碎之凡一合用水五盞煎耗其四而留其一去滓以麝香乳香少許研調服之一夕即愈本事方小薊飲子治下焦結熱血淋生地黃四兩小薊根滑石通草蒲黃炒淡竹葉藕節當歸酒浸山梔仁甘草炙各半兩上㕮咀每服四錢水一盞半煎至八分去滓溫服空心
