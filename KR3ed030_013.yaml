body:
  text: 卷之十三補損門傷損證治評傷損一科尤為難事假如刀傷一證盛至破肚出腸頭破出髓又有斷指斷臂者誠然可畏然切觀被傷之人不在致命處尚可治療如破肚腸出大小腸不曾傷破則以桑皮使香油浸用藥散止血次以香油洗去血穢內入卻以針穿桑白皮線縫合傷處續以生肌活血藥傅之自然無事要知香油乃傷損上藥一則止血二則不生蟲三則生肌如被傷處口未合聚常用之自有奇效設或腸間但傷一竅不拘大小便無可活之法其間糞穢從孔中出日爛一日焉有再生之理哉又如頭破髓露者依舊與藥服餌活血去風然後傅以去風生肌之劑如南星血竭柏皮之類是也外有鬥毆磕損墜馬損傷折足斷臂或有碎骨者必須刮開去其碎骨整頓條理以絹帛縛定傅以生肌去風之劑服之以活血接骨之藥如自然銅血竭乳香沒藥之類是也其間腰腹內恐有敗血必須除去卒急無藥可辦急以火麻骨燒灰為末熱酒調服或以童便一半相投服之為妙如無麻骨用麻布亦可然後用桃仁大黃川烏血竭無往不效曾有腰內瘀血不除年老為終身之病者亦有之矣或有閃挫及脫臼之類治之又有手法醫者須以意調理之龜獻奇方治傷折方論昔有傷折或云宜用生龜尋捕一龜將殺患人忽夢一龜進作人言告曰汝被傷勿相害吾有奇方可療遂授此方治腕折傷筋損疼痛不可忍用生地黃一斤藏瓜薑糟一斤生薑四兩切都炒令均熱以布裹罨傷折處冷則易之甚有奇效本事方又論類編紹熙五年秋湖口人林四因日暮馳馬巔墜折一足骨斷招外醫莫肯治經旬痛甚偶一道人過門聞其聲而問故入視曰筋接骨非敗龜殼不可治此卻難得要生者甚易道人曰但得殼足矣生與敗等也語訖即退林招衆醫議之皆云一足所傅多少龜殼灰可辦茲去五里許江畔一大龜身闊二尺常跧伏泥中捕而脫其殼燒灰傅損處計其收效賢於小者百數也時已昏暮未暇遣僕半夜後鄰室張翁者夢烏衣人來訪自通為江畔老龜哀投甚切云林四折足醫欲殺吾取殼以療傷折望一言救護張謝曰老夫愚鈍如何施力烏衣云只煩丈人詣林氏諭衆醫曰往日曾有龜傳一方於人而贖命用淹藏瓜糟罨斷處次將杉板夾定方書亦嘗記載如更增赤小豆一味拌入糟中然後板夾不過三日即十全安愈願公便以告之異日當圖報遂去黎明張如所戒林與皆喜而從之應期而驗療打撲傷損方論打撲傷損瘀血凝滯氣因不行關竅皆不通大便必閉壯者可服洗心散老弱者可服七聖檳榔丸凡有此證須問臟腑所打處疼痛若傷處大痛大便三二日不通然後可下前二藥若大便不閉傷處不甚猛痛則可不服宜服沒藥乳香當歸又長安石史君常至通衢有從後呼其姓第者曰吾無求於人念汝有難故來救汝出一紙卷授石曰有難則用之乃治折傷內外損方書也明年因趨朝坐馬為他馬所踢折足墜地又踏一臂折家人急合此藥且灌且裹至夜半痛止後手足皆堅牢如未傷時方本出良方用川當歸鉛粉各半兩硼砂二錢同研令細濃煎蘇木汁調服一錢匕損在腰以上先吃淡粥半碗然後服藥損在腰以下即先服後食仍頻頻呷蘇木汁別作糯米粥入藥伴和攤紙上或絹上封裹傷處如骨碎用竹木片夾定乃以紙或衣物包之其妙如此故表而出之又丁州涇口市民陳公誦觀音甚誠慶元初出行顛折一足忍痛叫菩薩越三晝夜夢一僧拄杖持鉢登門問所苦陳曰不幸折一足貧無力訪醫只得告佛僧曰不用過憂吾有一方接骨膏正可治汝便買緑豆粉於新鐵銚內炒令真紫色旋汲井水調成稀膏然後厚傅損處須教遍滿貼以白紙將杉木縛定其效如神不必假他劑也語訖僧忽不見陳亦寐如方修制用而愈熱蔥涕愈傷指方論崔給事頃在澤潞與李抱真作判官李相方以毬杖按毬子其軍將以杖相格承勢不能止因傷李相拇指並爪甲掰裂遽索金瘡藥裹之強坐頻索酒飲至數杯已過量色愈青忍痛不止有軍吏言取蔥新折者便入溏灰火煨熟剝皮擘開其間有涕取罨損處仍多煨取續之易熱者凡三易之面色卻赤斯須云已不痛凡十數度用熱蔥並涕裹遂畢笑語本事方療打撲傷損方論本草衍義自然銅有人飼折翅鷹後遂飛去今人打撲傷損研極細水飛過同當歸沒藥各半錢酒調服頓服仍以手摩痛處療墜馬折足方論定州人崔務墜馬折足醫令取銅末和酒服之遂痊平及亡後十餘年改葬視其腔骨折處有銅末束之朝野僉載療蹴鞦韆墜損方論宣和中有一國醫忽承快行宣押就一佛剎醫內人限目今便行鞭馬至則寂未有人須臾臥轎中扶下一內人快行送至奉旨取軍令狀限日下安痊醫診視之已昏死矣問其從人皆不知病之由皇恐無地良久有二三老內人至轎下環而泣之才得其實云因蹴鞦韆自空而下墜死醫者云打撲傷損自屬外科欲申明又恐後時參差不測再視之微覺有氣忽憶藥篋中有蘇合香丸急取半兩於火上焙去腦麝用酒半升研化灌之至三更方呻吟五更下惡血數升調理數日得痊豫謂正當下蘇合香丸蓋從高墜下必挾驚悸血氣錯亂此藥非特逐去瘀血如氣逆鬼殗殜傳尸心痛時疾之類皆治良方載甚詳須自合為佳耳本事方搓滾舒筋方論道人詹志永信州人初應募為卒隸鎮江馬軍二十二年因習驍騎墜馬右脛折為三困頓且絶軍帥命舁歸營醫救鑿出敗骨數寸半年稍愈扶杖緩行骨空處皆再生獨腳筋攣縮不能伸既落軍籍淪於乞丐經三年遇朱道人亦舊在轅門問曰汝傷未復初何不求醫對曰窮無一文豈堪辦此朱曰正不費一但得大竹管長尺許鑽以一竅系以繩挂於腰間每坐則置地上舉足搓滾之勿計工程久當有效詹用其説兩日便覺骨髓寬暢試猛伸足與常日差遠不兩月病筋悉舒與未墜時等豫頃見丁子章以病足故作轉軸踏腳用之其理正同不若此簡便無力者可辦也癸志治臂臼脫方論許元公入京師赴省試過橋墮馬上臂臼脫路人語其僕曰急與接入臼中若血漬臼則難治矣僕用其説許已昏迷不覺痛遂僦轎異歸邸或曰非録事巷田馬騎不能了此疾急召之至已日暮秉燭視其面曰尚可治乃施藥封腫處至中夜方蘇達旦痛止去其封損處已白其青瘀乃移在臼上自是日日易之腫直至肩背於是以藥下之瀉黑血三升五日復常遂得赴試蓋用生地黃研如泥木香為細末以地黃膏攤紙上摻木香末一層又再攤地黃貼腫上此正治打撲傷損及一切癰腫未破令內消云類説續骨膏治打撲傷損骨折黃柏半夏桂花上為末生薑自然汁調塗腫痛處其功全在生薑如藥干頻上薑汁為佳當歸散治打撲傷損當歸沒藥各一兩芍藥木香川白芷川烏各半兩川芎生地黃各三錢鬱金二錢上為末空心酒調每服二錢如未愈加川牛膝紅花蘇木各半兩調服神仙接骨丹黃丹飛過密陀僧自然銅各四兩辰砂血竭乳香沒藥一兩黃蠟白礬飛過臘月豬脂各十三兩上件新鍋子先下脂熔濾去筋膜次下蠟成油去鍋於冷處次下密陀僧黃丹自然銅末更慢火煎滴水中不散為度便出鍋於冷處下諸藥用柳木篦子攪勻入瓷器中不住手攪至凝丸如彈子大候極冷收入通油新瓷合內永不敗壞若一切折傷不問內外輕重雖已無氣但心頭尚暖者分一彈作十五丸熱蔥酒吞如已絶不能吞即以熱蔥酒磨腫但下喉即自省人識痛病人痛亦定仍取十丸入少油火炙軟攤在帛上貼痛傷處如傷損處大用二丸以上此藥不黏肉即以尋常膠黏膏藥平胃膏治打撲傷損不問皮破與暗傷悉能治之平胃散以冷水調塗則愈昔有一士夫與一同官交甚密書柬往來止以一小廳子徑傳人宅是日偶失去銀盞遂以其事執之小廳而同官以小廳根之不覺打碎小廳子右手破骨出遇一道人教以前藥遂愈安城劉克昭傳用之果有效雙烏散洽諸傷百損如被打破傷折久後時時疼痛雖新被傷縱不破皮而內損者尤宜服此川烏草烏略炮各三錢當歸白芍藥蘇木大黃生乾地黃紅曲炒各半兩麝香少許上為細末用酒煮一瓦瓶放冷服如覺麻痹無害但二烏頭生用有力恐太猛所以用溫火略炮龍骨膏治金瘡真龍骨少許海螵蛸五倍子赤石脂國丹煅過不用亦可如使血竭尤佳石亭脂一方不用卻用麝上藥斟酌或等分亦得如傷大先以冷鹽水洗淨卻用黃桑生漿塗四圍待水乾皮斂即以藥干傅百發百中如小小傷只以冷鹽水略洗便傅藥此直截妙甚上二方得之軍中以重資購之如傳用之屢驗單方治打損撲金瘡悶絶蒲黃末以熱酒灌又方淋過灰滓水調塗半寸收醋傾地上撩泥塗生大黃末酒塗並能見效又方生地黃以米醋調傅瘡上又方用冷水麻油各一半打和卵黃用雞毛拂之治惡瘡金瘡刀斧傷見血好降真香為末貼之入水並無妨絶妙又方石灰一升石榴花半斤為末取少許傅上擦少時血止便安崔元亮海上方預製急用無不效者治金瘡昔張氏經驗方治刀傷磕損血不止痛難禁此出於荊門軍點頭録余分教石城鄉人戴堯臣作尉試馬於伴宮之前馬劣拶人豫籬戴損大指甲離肉血淋余偶記此方亟令人將蔥白煨爛乘熱縛定痛與血隨止蔥冷再易遂不復痛翌日洗面全不見痕迹活人甚衆不可具述此三方出外科精要又方晚蠶沙生用細末摻勻綿裹之隨手瘡愈血止治刀箭及折傷烏狗血和酒連吃數碗蓋犬血能去惡血也淮西總管李貴傳親見效雍管易倅因會客於南樓墜樓者二十餘人亦用此收功神妙丸威靈仙根和烏豆煮焙乾為末酒麵糊為丸空心下五十丸見效廣東馮帥干云渠當年腰下為金瘡所傷遇春則發痛入小腹有不可忍忽傳此方療之神妙肘後方治箭鏃入骨不可拔者巴豆微炒去殼蜣螂上二味研勻塗所傷處斯須痛定必微癢且忍待極癢不可忍便撼動箭鏃拔之立出治損折傷等疾陳充國方自然銅醋淬木鱉去油草烏川烏上件四味為末以醋煮麵糊為膏熱塗損處時時更易痛盛以火尉之治金瘡方周崇班緣捕海寇被寇以提刀所傷血出不止分明筋如斷骨如折用花蕊石散掩之血不止痛亦不定有兵士李高言某在軍中被人傷中欲死見統領以藥一貼名紫金散掩之血止痛定明日瘡靨如鐵遂安又無癱瘓後告統領求此方只用紫藤香磁瓦刮下石碾碾細傅之救卻萬千人也名醫録紫藤香即降真是最佳者斂金瘡口止疼痛方劉寄奴一味為末摻金瘡口裡立效宋高祖劉裕微時伐狄見大蛇長數丈射之傷明日復至聞有杵臼聲往覘之見青衣童子數人於榛中搗藥問其故答曰我王為劉寄奴所射合藥傅之帝曰吾神何不死答曰寄奴王者不死不可殺帝叱之皆散收藥而反每遇金瘡傅之良驗寄奴高祖小字也黑神散治傷損大吐血或因酒食飽低頭掬損吐血至多並血妄行口鼻俱出但聲未失無有不效百草霜蚌粉上等分為末每服二錢用糯米飲調下側柏枝研汁尤效速鼻衄搐一字皮破灸瘡出血舌上出血並乾摻上立止黃耆湯治病證如前枳實三十個炒為末黃耆二兩甘草半兩紅棗三十個同枳實末搗爛慢火焙焦黃上為末用米飲調二錢食後服地黃散治打撲金瘡止血住痛闢風續筋骨生肌肉地黃苗地嵩青蒿蒼耳苗赤芍藥各五兩用清水浸取汁生艾汁三合石灰三升上五月五日午時修合前藥汁拌石灰陰乾入黃丹三兩更杵羅細凡有金瘡折傷出血用藥封裹勿令動著十日瘥不腫不膿本事方生地黃散生地黃川芎赤芍藥生藕節當歸蕓薹子川芒硝荊芥馬齒莧陰乾各一兩上為細末和勻酒煎蘇木取酒調藥二大錢無時候服如血不甚發熱減芒硝加桃仁荷葉干血醒散世驗方生地黃苧根去皮或苧燒灰等分上杵爛半酒半男童子小便急濾藥汁調小便酒灌之仍生雞鴨血調同服尤佳桃花散貼法乾地黃生桃木取白皮劉寄奴葉枯桐皮取白皮生薑左纏藤葉國丹各等分上為細末和勻用生餅酒調塗損處如因損而成風則加服風損藥
