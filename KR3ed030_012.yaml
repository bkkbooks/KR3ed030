body:
  text: 卷之十二癰疽門附瘡癤臁瘡陰瘡瘡腫癰腫脈證出林氏類次脈經脈數身無熱內有癰也腹無積聚身無熱脈數此為腸有膿也薏苡附子漿湯主之諸浮數脈應當發熱反而灑淅惡寒苦有痛處當發癰毒或有赤腫皆此證候脈微而遲必發熱弱而數為振寒當發癰腫脈浮而數身體無熱其形嘿嘿胸中微躁一作胃微躁不知痛之所在此人當發癰腫經云脈浮而數其人發熱而惡寒或有痛處是欲為癰癤脈滑而數數則為熱滑則為實滑主榮數主衛相逢則結為癰熱之所過則為膿也治癰疽方論歙丞胡權在都下遇異人授以治癰疽內托散方曰吾此藥能令未成者速散已成者速潰敗膿自出無用手捺惡肉自去不假刀砭服之之後痛苦頓減其法用人參當歸黃耆各二兩川芎防風厚朴桔梗白芷甘草各一兩皆細末別入桂末一兩令均每服三五錢熱酒調服以多為妙不能飲者煎木香湯點然不若酒為奇服石發疽論齊王侍醫遂病自煉五石服之臣意往過之遂請意曰不肖有病幸診遂也臣意即診之告曰公病中熱論曰中熱不溲者不可服五石石為藥精悍公服之不得數溲亟勿服色將變癰遂曰扁鵲曰陰石以治陰病陽石以治陽病夫藥石者有陰陽水火之齊故中熱即為陰石柔齊治之中寒即為陽石剛齊治之臣意曰公所論遠矣扁鵲雖言若是然必審診處度量立規矩稱權衡合色脈表裡有餘不足順逆之法參其人動靜與息相應乃可以論論曰陽疾處內陰形應外者不加悍藥及鑱石夫悍藥入中則邪氣闢矣而宛氣愈深診法曰二陰應外一陽接內者不可以剛藥剛藥入則動陽陰病益衰陽病益著邪氣流行重於俞始喻反忿發為疽意告之後百餘日果為疽髮乳上入缺盆死此謂論之大體也必有經紀拙工有不習之文理陰陽失矣史記療癰毒方論向友正元仲之子也淳熙八年為江陵支攝公安令癰發於胸臆間極療半載弗愈嘗浴罷甚委頓而臥似夢非夢見一丈夫微揖而坐傳藥方與曰用沒藥乳香瓜蔞三味酒煎服之且言桃源許軫知亦有此方但不用瓜蔞若用速效宜服此友正敬謝即如所戒不終劑而愈後詣玉泉禱雨瞻壽亭關王像蓋所感夢者因繪於家類編結癰說五臟不和則九竅不通六腑不和則留結為癰預療背疽方論揚州名醫楊吉老其術甚著某郡一士人狀若有疾厭厭不聊莫能名其何等病往謁之楊曰君熱證已極氣血銷鑠且盡自此三年當以背疽死不可為已士人不樂而退聞茅山觀中一道士於醫術通神但不肯以技自名未必為人致力士人心計交切乃衣僮僕之服詣山拜之願執薪水之役於席下道士喜留置弟子中誨以讀經晝夜只事左右頤旨如意歷兩月久覺其與常隸別呼扣所從來始再拜謝過以實白之道士笑曰世間那有醫不得底病汝試以脈示我才診脈又笑曰汝便可下山吾亦無藥與汝但日日買好梨吃一顆如生梨已盡則收乾者泡湯飲之仍食其滓此疾自當愈士人歸謹如其戒經一歲復往揚州楊醫見之驚其顏貌腴澤脈息和平謂之曰君必遇異人不然豈有安之理士人以告楊立具衣冠焚香望茅山設拜蓋自咎其學未至也北瑣夢言載醫者趙那云一朝士疾危只有一法請剩吃消梨不限多少如咀嚼不及捩汁而飲或希萬一用其言遂愈此意正同類編方雲母膏愈腸癰論王仲言余話楊介吉老者泗洲人以術聞四方有儒生李氏子棄業願娶其女以授其學執子婿禮甚恭吉老盡以精微告之一日有靈壁縣富家婦有疾遣人邀李生以往李初視云腸間有所苦耶婦人曰腸中痛不可忍而大便從小便中出醫皆以無此證不可治故欲屈君子李曰試為籌之若姑我之藥三日當有廖不然非某所知也下小丸子數十粒煎黃耆服之富家依其言下膿血數升而愈富家大喜贈錢十萬置酒而問之曰始切脈時覺芤脈現於腸部王叔和脈訣云寸芤積血在胸中關內逢芤腸里癰此癰生腸內所致然所服者乃雲母膏為丸爾切脈致此可以言之醫矣李後以醫科及第至博士李植元秀即其從子也發背無補法諺云背無好瘡但生於正中者為真發背虞奕侍郎背中生小瘡不誤只以藥調補數日不疼不癢又不滋蔓疑之呼外醫灸二百壯已無及此公平生不服藥一年來惟覺時時手腳心熱疾作既不早治又服補藥何可久也泊宅編外科精要方說夫癤者節也癰者壅也疽者沮也一寸至二寸為癤二寸至五寸為癰五寸至一尺為疽一尺至二尺為竟體疽大抵癰疽脈洪數甚者難治脈微澀者易愈凡熱盛脈數宜用漏蘆並單煮大黃等湯不甚熱脈緩弱只投五香連翹湯此第一隻初覺背疽之疾便合服內托散後來方免變證此藥但可服十數服而止即合繼服五香連翹湯此第二隻如大便寬快內熱既退即合住服若一二日大便再秘須合服取利毒氣亦看病人虛實進藥又用沉麝湯此第三隻甚者神仙解毒丸方見諸毒門及拔毒之藥疽破後多服洪氏排膿內補散若無嘔逆之證酒調有嘔吐之證香湯下若癰疽破後當終始服餌癰疽初作不問大小便用艾灸痛則灸至不痛止不痛灸至痛止此十全之功也但是初發三日已前十灸十愈自然消散此十全之效也後李氏治疽法言之詳矣癰疽初作之時便無著艾既灸之後便宜用麥飯石膏四圍塗傅以護其根腳不可使開中心卻要留癰口如錢大使毒出如癰漸小隨其大小傅之直候疽破膿潰之後口收只有徑寸許卻用神異膏貼傅卻住用麥飯石膏癰疽才破有口便合用豬蹄湯洗其初連日洗五日後間日洗欲安之際三日洗癰疽既破膿血潰多五七日後方可用神異膏貼傅若根腳小五日後貼如闊大須七日十日後方可貼癰口將收之際最忌用急澀斂口之藥只宜用神異膏貼多見昧者破此一段不過病者厭於將理醫者急欲獲利不思毒氣發泄未盡其痰再來人命自此不救所要深思熟慮以人命為重陰功厚利一舉兩全豈不美哉疽疾將安之際宜多服加味十全湯以補其氣血庶幾肉易生背疽之人多是先發渴而後背疽作或有背疽安而後發渴疾因此不救者甚多若有渴疾之人宜專服加減八味丸能使渴疾安疽疾不作若驟得背疽之疾既安之後不問有無渴證常服加減八味丸滋益血氣使精神強健忍冬丸亦妙若是氣虛而嘔其證心不煩熱遇早便嘔或聞穢氣而嘔早晨宜服嘉禾散如有寒熱宜服家傳不換金正氣散仍五更初兼服山藥丸以補腎氣一應諸癰腫欲知有膿與無膿以手掩腫上熱者為有膿不熱者為無膿藥方次序內托散五香連翹湯沉麝湯漏蘆湯已上四方首宜相間多服藥性平和可謂穩重自有宣熱拔毒之意更諸香散氣行血免生他證次當便服已下活氣血療癰毒未成者即散已成者速潰也神仙黃礬丸國老膏萬金散遠志酒忍冬酒已上五方不問是癰是疽是瘡是癤服之取效也神仙解毒萬病丸秘傳連翹湯單煮大黃湯已上三方是通行宣熱拔毒之藥可斟酌虛實用之萬無失一也豬蹄湯神硝散已上二方治癰疽破後煮水洗淨軟帛搵干或用膏藥貼去敗毒生新肉或末藥摻之麥飯石膏神異膏血竭膏牡蠣地黃膏已上四方治癰未破腫痛破後塗角四畔余腫臨時詳酌更換用之服藥既退之後合服驅除餘毒治氣血生肌肉既破之後合服內補十宣散多服為妙也家傳不換金正氣散加減八味丸忍冬丸黃耆六一湯五味子湯論發背有熱未有不因風而得之疽疾將安當補氣血加味十全湯神效瓜蔞散立效散塞里散獨聖散生肌散綠雲散宣毒散等輩主之炙癰疽法李氏云治疽之疾灼艾之功勝於用藥初發一日之內尖頭如麻豆大時便好措手其法用大獨頭蒜薄切如小錢大亦如錢厚以蒜錢則於疽頂尖上以熟艾炷安於蒜錢上灸之三壯一易蒜錢若灸時疼痛要灸至不痛初灸時不痛然後止以百壯為準用大蒜取其毒有力多用艾炷取其火力通透如法灸之瘡一發膿潰繼以神異膏貼之即日而安一能使瘡不開大二內肉不壞三瘡口易合一舉而三得之然人未知之而多遲疑不決至二日之後疽大如指毒氣開散病者不能堪火不可灼艾矣可不預知之乎但頭上見疽或項以上見疽則不可用此法灸反增其疾其餘皆可艾灸為上也內托散真綠豆粉一兩乳香半兩上研勻濃煎甘草湯調下若毒氣衝心有嘔逆證大宜服此五香連翹湯木香沉香各三兩丁香半兩連翹射干升麻黃耆生木通桑寄生最能療此疾如無真者只倍用升麻代之獨活各三分上粗末每服三錢重水一盞煎至七分溫服銀器煎藥尤佳疑似之間多服無效二日後與漏蘆湯相間服之漏蘆湯疽作後二日服此退毒下膿又與五香連翹湯間服生大黃十三兩黃芩去皮赤芍藥生銼去蘆甘草生銼升麻漏蘆去蘆麻黃去根白蘞洗淨白及去須枳殼米泔浸一宿去白各四兩上㕮咀每服四錢水二盞煎一盞紗帛濾去滓空心食前熱服以快利為度病人更自量增損服立效沉麝湯木香麝香研沉香乳香研藿香葉連翹各等分上細末每服二錢水一盞煎七分溫服無時加減八味丸大地黃先焙用酒浸飯上蒸七次焙秤二兩山藥炒山茱萸去核焙各一兩牡丹皮去木肉桂半兩澤瀉水洗切作塊灑濕蒸五次切焙白茯苓去皮各八錢真北五味子一兩上細末煉蜜為丸如梧子大每日五更初未言語前溫酒或鹽湯吞下三四十丸內用真北五味子最為得力此味能生腎水平補降心氣大有勸效黃耆六一湯常服此藥終身可免癰疽仍大治渴黃耆六兩半用鹽水濕潤飯上蒸三次焙粉草一兩半生半炙上細末每服二錢早晨日午白湯點酒調尤好一發背之人雖云有熱未有不自腎虛而得之者若疽疾減過五分之後便合如前法五更服山藥丸或加減八味丸李氏云疽疾將安及七八分便當服加料十全大補湯以補氣血每日當與排膿內補十宣散相間服之加味十全湯治癰疽後補氣血進飲食黃耆捶扁令鹽湯濕潤蒸三次焙銼大地黃先洗焙乾以酒灑蒸七次焙各二兩大當歸去蘆頭酒洗切焙川芎人參白茯苓甘草炙白芍藥桂心烏藥隆興者白朮米汁浸半日切焙麵炒陳皮北五味子微炒各半兩上㕮咀每服一兩水一碗生薑五片棗子二個同煎至八分碗作兩服家傳不換金正氣散蒼朮米泔水浸削去發炒四兩紫色大厚朴薑製四兩甘草炙二兩陳皮三兩去白半夏湯泡七次仍用制二兩藿香葉二兩人參木香白茯苓各一兩上細末每服二錢水一盞姜三片棗一個煎八分入鹽少許溫服無時排膿內補十宣散治癰疽瘡癤未成者速散已成者速潰人參當歸生甘草防風黃耆捶扁令鹽湯浸透瓷器盛蓋飯上蒸三五次焙乾各二兩厚朴苦梗白芷薄桂川芎各一兩上細末酒調下神效散治癰疽發背腸癰奶癰黃耆用鹽水炙忍冬葉各五兩當歸一兩八錢甘草炙八錢上細末每服二錢以酒一盞半煎至一盞不問老少皆可服之留滓傅瘡孫真人單煮大黃湯宣熱拔毒錦紋大黃酒浸去皮上一味不以多少銼如麻豆大水煮服即快利此要法也豬蹄湯治一切癰疽腫壞消毒氣去惡肉凡瘡有口便要用此湯先濯香白芷不見火生甘草老羌活露蜂房有蜂兒者黃芩去心赤芍藥當歸各等分上粗末看疽大小用藥如疽大加料用時先將豶豬前蹄二隻一斤只用白水三升煮軟將汁分為兩次澄去面上油花並下面滓肉每服用藥粗末一兩投於汁中再用文武火煮數沸去滓以故帛蘸藥湯溫溫徐徐薄揩瘡上死肉惡血隨洗而下淨洗訖以故帛搵干仍避風此一方極神效所用露蜂房最有理謂其以毒驅毒也洗藥豬蹄湯藁本當歸柱獨活茴香黃連薔薇根狼牙草甘草大黃芍藥各二兩上粗末先用豶豬前蹄一隻煮濃汁澄去滓肉並面上油花每用藥末半兩蹄汁一碗蔥白一根漢椒二十餘粒同煎三五沸去滓通手洗此二方治癰疽破後先用洗淨軟帛搵干貼膏藥去毒生新肉也神硝散蛇床子二兩為粗末朴硝一兩研上勻和每三錢重水一盞煎沸去滓通手洗摻後末合瘡口五味子湯大治口燥舌乾此腎水竭也北五味子黃耆生人參麥門冬去心各一兩半甘草炙半兩上㕮咀每服半兩水一盞半煎八分溫服無時一日一夜五七服妙牡蠣地黃膏治癰未破腫痛大黃一兩牡蠣鹽泥固濟煅出火毒一宿研極細二兩上生地黃研取汁調塗腫上干時用地黃汁刷濕毛疊菜又名驅風草治諸般癰癤惡瘡聤耳其草葉梗皆有白毛開白花子先綠而後紅顆中有穰子更治風毒腳氣先煮沸水一盆盛出入藥候冷淋洗腳腫消痛住大有功效國老膏大橫紋粉草二斤上捶碎河水浸一宿揉令漿汁濃去盡筋滓用密絹濾過銀石器內慢火熬成膏以瓷罐收之每一二匙無灰酒浸起服或白湯亦可曾服燥藥丹劑亦解之或微利無妨萬金散治癰疽惡核腫痛發腦背等已潰未潰便宜服此排膿托裡瓜蔞一個去皮取子大甘草節二分沒藥一分研細旋入上除沒藥無灰酒三升銀石器內煮至一碗許去滓卻入沒藥每服半錢許浸無灰酒服無時候遠志酒治一切癰疽發背癤毒惡候浸大有死血陰毒在中則不痛傅之即痛有憂怒等氣積而內攻則痛不可忍傅之即不痛或蘊熱在內熱迫人手不可近傅之清涼或氣虛血冷潰而不斂傅之即斂此本韓大夫宅用以救人極驗若七情內郁不問虛實寒熱治之必愈遠志不以多少米泔浸洗去土去心上細末酒一盞調藥末三錢遲頃澄清飲之以滓傅病處忍冬酒治癰發背初發時便當服此藥不問疽發何處發眉發頤或頭或頸或背或腰或脅婦人乳癰或在手足服之皆效如或居於鄉落之間僻陋之所城市藥肆又遠或居貧乏之中無得藥材但虔心服此亦能取效仍兼以麥飯石膏及神異膏塗傅其效甚奇忍冬藤五兩木捶微微捶損不可犯鐵大甘草節一兩生用上二味入沙瓶內以水二碗用文武火慢慢煎至一碗入無灰好酒一大碗再煎數沸去滓分為三次溫服一日一夜連進吃盡如病勢重一日一夜要兩劑服至小大腸通利則藥力到沈內翰云如無生者只用乾者終不及生者力大而效速忍冬葉入沙盆內爛研入餅子酒少許生餅酒尤佳調和稀稠得所塗傅四圍中心大留一口泄其毒氣此藤凌冬不調故名忍冬草其藤左繞附樹延蔓或在園圃牆籬之上藤方而紫葉似薜荔而青故又名左纏藤二月開花五出微香蒂帶紅色花初開則色白經一二日則色黃故又名之金銀花又名鷺鷥藤又名金釵股又名老翁須在處有之近代名人用之奇效其藤尤效於紅內消如洪內翰邁沈內翰存中良方中所載甚詳療癰疽發背經效奇方皆是此物忍冬之藤形並開於後原書此處有一幅忍冬藤形圖今刪麥飯石膏治發背諸般癰疽神效白麥飯石其石顏色黃白類麥飯糰者是如無此石只尋舊面磨近齒處石不限多少用炭火煅全紅以好釅米醋淬之如此煅碎十次方得卻碾為末重羅去粗者取細末入乳缽內用數人更迭研五七日要如面樣極細為妙白蘞碾為細末鹿角不用自脫者須揀帶腦頂骨全者即是生取之角方可用截作二三長炭火內燒令煙盡為度碾羅為末再入乳缽內更迭研令極細用上煅成麥飯石細末二兩白蘞末二兩鹿角灰細末四兩最要研得極細方有效驗若研得不細塗得極痛若細而嫩大能止痛收口排膿合和時量藥末多少用經年好米醋入銀石器內合魚眼沸卻旋漸入前三味藥一末在內用竹篦子不住手攪熬一二時久令稀稠得所取出傾在甕盆內候冷以紙蓋其上勿令著塵埃每用時先用豬蹄湯洗出癰疽上膿血至淨以故帛搵干以鵝翎拂藥膏塗傅四圍凡有赤處盡塗之但留中心一口如錢大以出膿血使熱毒之氣隨出如膿未潰能令內潰如已潰則排膿如湍水逐日見瘡口收斂如患瘡久肌肉腐爛筋骨出露用舊布片塗藥以貼瘡上但內膜不穴亦能取安洗瘡勿以手觸動嫩肉仍不可以口氣吹著瘡更忌有腋氣之人及月經見行婦人或有孕人見合藥亦忌此等合此藥時須要麥飯石好鹿角要生取帶腦骨者燒灰時卻不使腦骨但辨其生取與自退爾若能精擇藥材精虔修制勝用他藥收功多矣仍可熬取好米醋一大碗收甕器內候逐日用藥於瘡上久則其藥干常用鵝翎點醋拂濕其藥勿令繃也初使須一日一洗一換藥十日後兩日一換古方云白麥飯石顏色黃白類麥飯曾作磨者尤佳愚謂麥飯石不可作磨如古人云曾作磨者尤佳則惑人矣麥飯石其狀如飯糰生粒點若無此石當以舊面磨近齒處石代取其有麥性故也屢試得效此石鋪家有時無賣念欲用之於溪中尋磨石中有白石粒如豆如米大者即是也但其石大小不同或如拳或如鵝卵或如盞大略如握聚一團麥飯焉古方有序字多古之呂西華秘方傳以外舅之親計其不可得裴員外㗖之以名第河南尹脅之以重刑呂寧絕榮望守死不傳君子責之以存心隘是方之得不易如此神異膏治疽疾先以麥飯石膏塗傅俟其瘡根腳漸收止於寸徑大卻用神異膏貼之收口此藥隨其人病深淺取效合時不可與婦人雞犬貓厭穢物見之露蜂房要用蜂兒多者細剪事制極淨一兩全蛇蛻以鹽水洗淨者焙乾秤半兩細剪元參半兩黃耆三分黃丹五兩羅取細者後入杏仁去皮切片一兩真麻油一斤男子亂髮淨洗焙乾如雞子大上藥先將麻油入銀銚中同亂髮於風爐上慢火熬候發焦熔盡以杏仁投入候杏仁變黑色用好綿濾去滓再將所熬清麻油入銀銚內然後入黃耆元參二味慢火熬一二時久出銚子安一冷風爐上候半時久火力稍息旋旋入露蜂房蛇蛻二味先準備柳枝杖子才入二味便惡急攪下了卻移銚子於火上不住手攪慢火熬至黃紫色又再用綿濾過復入清油在銚子內乘冷投黃丹急攪片時又移銚子於火上以文武火慢慢熬不住手用柳枝杖攪十餘轉候藥油變黑色滴一二滴於淨水中見得凝結成珠子則是膏成就若珠子稀再熬少時必候得所然後瓷器內封收用或恐偶然熬得火太過稍硬難於用卻量度將少蠟熬麻油添在內用瓷器盛封蓋於甑上蒸乘熟攪勻收而用之膏藥熬成了須用連所盛瓷器置淨水盆中出火毒一晝一夜歇三日方可用熬此膏藥極難於火候須耐煩看緊慢火猛即藥中火發不特失藥性又傷人面目救助不及千萬謹戒膏藥方甚多不下數十治持疽之神效無出於此家藏神驗血竭膏伍氏方川當歸去蘆頭酒洗白芷大黃黃連去須黃柏木鱉子皂角去皮子杏仁漢椒去梗目閉口者苦參去蘆露蜂房各一兩男子亂髮一兩半乳香沒藥血竭別研各二兩國丹羅過六兩上除乳香沒藥血竭外余藥銼碎令勻用真麻油八兩浸一宿入鐵銚內文武火煎令發焦為度綿濾去滓取清油秤過多少再入銚內煎令沸每兩清油入國丹一兩柳杖攪不住候加減軟硬得所就水中試之不黏手為度再入乳香沒藥血竭三味攪勻候冷取出用白皮紙就熱火上隨瘡口大小熨開剪去四邊白紙貼瘡口上合藥用辰日及天德月德天醫吉日為佳綠雲散治毒發瘡生於背腦金雞鳳尾草干秤八兩生粉草一分切上慢火焙為細末分作四服每用酒一升煎沸入冷酒二升和勻以醉為度立效若曾服金石重藥反者此藥最妙宣毒散初發或灸後用傅貼消腫收赤暈圍聚露蜂房三兩炒略微焦南星赤小豆各一兩小米一合生草烏一分生白礬半錢重上細末淡醋調塗四畔干即再上塞里散止痛消腫初發則消已成則潰既潰則生肉常服活血補虛不患瘡痍黃瓜蔞三個去皮取穰子炒忍冬藤三兩乳香一兩蘇木二兩沒藥一兩甘草節炙半兩上粗末每用藥一兩半無灰酒三碗藥入瓶內煮至一碗半去滓分作三服空心日午臨臥服如要常服即為細末酒糊為丸如彈子大硃砂為衣每服一丸細嚼當歸酒下打撲傷損患服至五丸即安神效瓜蔞散治婦人乳癰黃瓜蔞子多者一個去皮焙乾川當歸生甘草各半兩沒藥乳香一錢各別研上用酒三升同於銀石器中慢火熬取一升清汁分為三次食後乳疽之方甚多獨此一方神效無比立效散治發背及諸癰癤並瘰癧有效或婦人乳癰神妙紫色皂角刺半斤不用枯者細銼炒赤生甘草二兩乳香別研半兩沒藥別研一兩瓜蔞五個去皮取肉並仁搗碎炒黃上細末每服二錢溫好酒調下無時候生肌散斂瘡口木香檳榔黃連洗去須上等分淨器中研羅為細末時以傅瘡若瘡口猶未斂白及末輕粉各少許和勻即效獨勝散凡癰疽皆緣氣滯血凝而致宜服諸香能行氣通也如瘡初作便服此代茶每食後半盞許香附子去皮毛以生薑汁淹一宿焙乾研令極細上無時白湯調二錢服瘡潰後只以局方中小烏沉湯內甘草但用五分之一瘡愈後常服半年尤妙臨安陳正節公上元下桂云大凡疽疾多因怒氣而得之若有此疾必多怒但服香附子藥進食寬氣神仙解毒萬病丸治一切癰疽發背及療魚臍瘡人不識者方附諸毒門上外科精要乃臨川醫士陳自明所編廣東帥趙平齋番隅郡齋今擇其最者以衍其傳治癰疽發背三法第一法如上藥後覺冷如水萬不失一或不覺冷則難治蓮花蕊黃鬚者三錢生用雄黃半兩生天南星半兩生川當歸去蘆二錢蜈蚣赤腳者一條生飛羅面二錢生苣霜二錢生上七味不見火曬乾為細末釅米醋調成用紙花大於患處紅暈上半寸許傅藥於紙花上貼於患處用篦子重疊䴸紙令著實紙花留眼子在瘡口上放近下令出膿水一日一換臨換藥時用煎熟溫湯以軟帛子蘸湯洗去舊藥候乾再上新藥其藥不可久留久留則無力旋合不可過三日如瘡大用藥多則以此料劑添合之如發渴一面服第二藥或不渴亦多服之候膿水盡始用第三藥斂瘡口忌一切毒食患者不可令聞穢氣其藥功效不可盡述第二法治瘡正發時作渴雖不渴亦多服之一瓜蔞一個綿耆一兩粉草半兩乳香綠豆粉各二錢上五味㕮咀水二碗煎至一碗溫服一日三服頻多煎如熟水時時呷之尤妙第三法赤蘞生用白蘞生用寒水石飛過以上各半兩龍骨半兩輕粉一錢黃丹二錢飛過上為細末干撒於瘡口上不可犯生水如瘡口將斂切戒近色欲內托散治癰疽發背瓜蔞二枚去皮留穰加倍用沒藥二錢半別研甘草半兩生用上用白酒四碗煮甘草瓜蔞煎減一半去滓入沒藥末放溫緩緩飲盡服此必膿多痛止如痛未上膿來多更依前作一劑服膿流三五日方洗洗方豬懸蹄淨洗不拘多少煎沸湯放溫淋洗拭乾又方臘茶末白湯調放冷洗豆粉膏治發背綠豆粉炒赤放下出火毒上井水調傅四圍大凡用藥塗瘡不可當心塗當心則瘡便走散只當在四圍塗住不可使之散去甘草膏治發背甘草三大兩生為末大麥面九兩上用一大盤中攪和令勻取上等好醋少許別捻入藥令勻百沸水梭和如餅劑方圓大於瘡一分熱傅腫上以紬片及故紙隔令通風冷則換之已成膿自出未成膿便內消崔元亮海上秘方李北海云此方神授極奇鹿角膏治一切癰癤方治未成不可用膏藥貼宜此藥塗鹿角尖用砂缽內同老米醋濃磨上時以鵝翎塗拂四圍當中留一口遇干再塗一二日即內消牡蠣膏治癰腫未成膿者拔毒白牡蠣為末以水調塗干更塗神效膏治癰疽一切毒瘡灶灰汁即是餅藥蠣殼灰篩細糯米舂白上先將瓦盆載餅藥在日裡曝要得稍溫仍將一把灰一把米層層撒在瓦盆內其灰米上約留半寸餅藥就把在日裡曝灰米發變如角黍然時或添餅藥在日裡曝如用藥時取出上件藥以淡餅藥調之入缽中研成膏用手傅在瘡上以早為上如瘡方發腫時便可傅藥才幹便傅以消散為效不可中輟其腫又移在別處再以藥仍前傅之才移便是作效如瘡已聚膿血則以藥傅四畔只留其頭使之血出亦以血盡瘡口合為度其瘡口或皮膚有破損處千萬不可傅藥痛不可忍如婦人小兒只宜用清水或十分淡餅藥調之或以信紙先安在瘡上然後以藥傅紙上更宜斟酌無日則以火代之先用餅藥在溫火上熏熱既入米灰則不可用火煮療蜂窠癰黑蜂巢泥調法醋傅之才幹又傅藥癢而不痛立效上二方得之循州謝推宮雷仲渠家三世施此二藥鄉人言以是獲登第之報治腦疽用松節細研用豶豬膽汁和合麻油傅瘡親見效治瘰癧玉屑妙靈散滑石二兩用靜江者上為細末每服二錢米飲調下若有琥珀研細濃燈心湯服之尤佳良久旋下其物正如剝皮子葡萄肉而瘡盡平復此方載之陳氏方中余親見其效一醉散治疸𤷍貝母香白芷上等分為末酒服次飲酒醉為妙酒醒而病去矣又方煎犀角飲子調五苓散服單方治瘰癧破與未破及膿血淋漓其效如神牡蠣不以多少用灰深𠯜上以三斤火炭煅候炭盡取八兩為細末甘草二兩上件二味勻拌每服二錢食後以建茗同點日二服忌魚酒酢醬油鹽海昧等此病多有人父子相傳至死如服此藥定並不疼痛亦無吐痢又方牡蠣用火煅為末以糊為丸如梧桐子大每服二十丸以連翹煎湯吞下生肉方臘月豬脂松脂煮過收水上白者黃蠟煮過收淨潔者上各二兩用清麻油五六兩慢火熬成膏先將溫水洗去舊藥拭乾用紙剪一大圍子塗藥在上蓋瘡上如癢不得動此生肉故也一日一次換藥切戒毒物瘡癤治疔瘡腫外臺秘要方云疔腫方甚多皆不及此蒼耳莖子等燒灰上以酢泔澱和泥塗上干即易不過十餘度即拔根出國丹膏治一切瘡癤國丹五兩巴豆十粒麻黃八兩方竹柳條各五十寸上件油焦下竹柳巴三味煎焦黑色卻入國丹打勻黑為度令自然成膏如瘡未破用巴豆如已破則去巴豆羚羊角散治一切膿泡熱瘡及發背羚羊角黃耆生熟地黃川芎當歸芍藥上等分㕮咀每服三錢水一盞半煎至八分空心服鹿角丸治療同前鹿角銼黃耆炙上等分卻入羚羊角一半蜜丸地黃溫酒下趙龍學病虛服之剛劑過多劉立之云必有瘡疾服此藥後不發止遍身發細瘡用生地黃汁解白餅酒常服兼進前方服之遂無事蓋鹿角散血羚羊角消膿兼用鍾乳粉鹿茸為丸服之加減五苓散治療同前沉香檀香生熟地黃升麻乾葛芍藥黃耆黃芩羚羊角犀角連翹甘草防風上等分㕮咀每服三錢白水煎服仍煎何首烏散服增益四物湯治一切瘡川芎當歸地黃甘草芍藥防風荊芥金雞鳳尾草上㕮咀等分每服三大錢水一盞半煎八分服有驗百花散治一切瘡鬱金黃連黃柏梔子仁葵花上細末冷水調成膏貼瘡痛處其效如神土朱散治一切瘡土朱國丹牛皮膠上細末用好酒一碗溶牛皮膠入此二味和勻澄清吃清藥酒留腳傅之瘡上干又再貼驅風散治瘡紅椒開口者七粒連根蔥頭七個上同煮水淨洗用絹衣掩干余甲子夏自八桂歸途中為瘡瘍所苦暫憩湘山寺遇長老寂翁授此三方數日而愈平胃散治一切瘡用麻油傅之立效獨珍膏治軟硬癤諸熱毒疱瘡五倍子不以多少瓦上焙乾上細末冷水調塗仍入數點麻油廬陵一士人傳曾效赤小豆治善惡瘡並赤腫及痄腮無不愈者仁宗在東宮時常患痄腮命道士贊能治療取赤小豆七七粒為末傅之而愈中貴任承亮在旁知狀後自患惡瘡瀕死尚書郎傅求授以藥立愈問其方赤小豆也久之訟官過豫章或苦脅疽幾至五臟醫者治之甚捷承亮曰君得非用赤小豆耶醫驚拜曰某用此活三十口願勿復言有僧發背如爛瓜周鄰家乳婢後疽作用之皆如神其法細末水調傅瘡及四傍赤腫藥落再傅之又一本為末每服二錢水一盞煎服仍用新汲水調藥傅之緣赤豆粉黏物既干難揭則用苧麻根為末和之便不黏也此法尤佳殺蟲方雞心檳榔一兩黃連一兩炒去須穿山甲十個燒存性麝香半錢上為細末用臘茶末調塗隔日一洗一日三五次用藥如此三五日後用收暈暖肌膚生新肉藥黃連散治疥瘡萬不失一大椒黃柏皮黃連各半兩檳榔一兩上為細末用巴豆二十粒煎麻油塗之巴豆煎至黑為度治癩頭瘡方先用本人小便燒秤錘令紅投於小便中方與洗頭瘡都無皮了然後以帛拭乾卻以歷青五文細研上用油魚三個以盞熬成油調歷青塗三日效火氣入瘡方黃柏皮為末摻之立愈有婦人因冬間向火兩股上遂成瘡其汁淋漓人無識者後見一道人云此皆火氣入內而生用此方果如其言後又再作適無黃柏用薄荷煎塗之立愈治漆毒成瘡方磨鐵槽中泥塗之即愈往年蕪湖二漆牙相爭其人以漆一桶自頭澆其人患瘡幾死有人教以此方治之而愈又蟹黃塗之亦愈二草散治諸般瘡金雞鳳尾草四兩甘草一兩上為細末酒調下生用者擂爛酒服不拘時候神效餅子治一切毒瘡山慈姑五倍子草烏燒存性木鱉子焙乾以上各半兩國丹二錢上為細末先用雞子作餅熱傅瘡上候冷取出傅藥其上數日間瘡干連皮脫去瘡干即用麻油調德安寺有僧面上生遍幾死一用即安藜蘆散治疥瘡已效藜蘆一味不拘多少用鹽少許以卿魚煎油塗五香連翹散治風氣瘡自上而下調之風瀝自下而上雞嘴連翹丁香沉香藿香南木香桑寄生甘草射干一兩麝香少許上為細末白水煎服食後服又用牛尾蕨根謝婆根又名赤葛子根二味捶碎酒三碗渾服並用洗瘡口潰爛之後亦用此藥洗直要潔淨大惡忌白物豆腐面白羊白雞白豬一切白物皆忌之如服藥後小便淋瀝用五苓散加葵麥木通煎吃此方得之艱用之收效又方藜蘆羅過三碗生用每以三碗曬將二碗入硫黃一兩蛇床子三錢輕粉少許斑蝥荊芥各五錢大椒三錢上同為末熬麻油乘熱清調臨臥塗疥瘡上次以前藜蘆一味入甘草三五十錢同為末每服半錢酒調酉時服名涼肺散大忌炒豆黃菜用之果效治小兒頭瘡及一切疥瘡烏桕樹粗皮向東者大椒五倍子苦楝樹根皮焙乾白礬上研為細末用麻油調塗有膿水干傅亦可萬金膏敗毒生肌諸毒瘡皆可用黃耆半兩當歸半兩白芷三錢杏仁三錢防風三錢羌活二錢獨活二錢官桂二錢白蘞二錢狼毒二錢乳香三錢沒藥三錢黃連一錢黃丹四兩清油一斤桑白皮二錢上除黃丹一味以文武火於銀器內煉不住手攪千餘下後入黃丹次用柳枝攪滴水上如珠為度陰天煉春冬軟收夏月蒼收用新瓷器盛以竹篦子攤用勿使沾塵常好好蓋覆愈久愈好艾瘡尤佳貼上不痛古藤吳僉判元益授此方用之效治臁瘡諸方花乳石散復元通氣散追風獨活散上各一貼合和酒調空心服洗藥海桐皮石榴皮上等分煎湯淋洗令淨然後用熏藥熏藥牛蒡子一字研為細末上用紙捻子將藥在內燒熏之然後塗藥檳榔散塗瘡全蠍七個斑蝥十四個巴豆十四粒檳榔一個麻油十五錢重上用麻油慢火煎先入全蠍次入斑蝥次人巴豆隨巴豆下檳榔見巴豆黑色方入黃蠟一兩侯熔去前四味藥滓不用只用蠟油入後藥黃柏皮二錢炙雄黃一錢研生硫黃一錢研蛇床子二錢研國丹一錢水飛海螵蛸一錢白膠香黃連杏仁輕粉麻油膠香與油先溶上細末同入麻油中調傅瘡下攝高客傳見效單方治外臁瘡臭爛數十年不愈者生烏龜一個打死去肉取殼酸醋一碗炙數次醋盡為度仍煅令白煙存性用碗蓋地出火毒上為細末入輕粉麝香拌勻臨用先用蔥水洗干方用藥胡師賢親見效檳榔散治遠年內外臁瘡檳榔干豬糞燒存性龍骨一錢輕粉少許上為細末麻油調塗三日一次換不過三服愈忌無鱗魚濕面雞肉動風毒物此方乃建安軍人犯法傳與司理官楊炳之極妙收斂瘡口令乾方牡蠣一塊用草鞋包縛入火內煅令通紅去火候冷取出細研上隨用時旋入枯飛過白礬些小拌和傅瘡口上治陰莖瘡豆粉一分蚯蚓二分上水研塗上干又傅之治妒精經效單方大田螺二個和殼煅過存性上碾為末以輕粉搽於所患處便安陰腫方治男子陰腫大如升核痛人所不能治者馬鞭草搗爛塗之小兒陰腫方治小兒陰囊忽虛腫痛者生甘草汁調地龍糞輕輕塗之治小兒熱毒遊腫方破草鞋人亂髮燒灰醋和傅本草治婦人陰腫堅硬方枳實半斤碎炒令熟故帛裹熨冷即易之本草治腳腫方男子六十一歲腫生瘡忽食豬肉不安醫以藥利之稍愈時出外中風汗出後頭暴腫起紫黑色多唾耳輪上有浮泡小瘡黃汁出乃與小續命湯加羌活一倍煎服之遂愈背腫方楊愔患背腫馬嗣明以煉石塗之便差粗黃色石如鵝鴨卵大猛火燒令赤內醇醋中自有石屑落頻燒石盡屑暴乾搗篩醋和塗腫上無有不愈神妙
