body:
  text: 卷之一諸風門附卒中腳氣中風評風之為病或為寒中或為熱中或為厲風世傳大風也或為偏枯或為腰脊強痛或為耳鳴鼻塞頭暈痰厥其證各異且肺風之狀多汗惡風時嗽短氣渾身瘙癢晝輕夜甚心風喜怒不常色赤甚則語言不快肝風善悲色蒼嗌乾多怒上視脾風身體怠墮四肢不收色黃不嗜飲食腎風面浮脊痛不能正立色炱夫風熱怫鬱風本生於熱以熱為本而風為標虛極亦生風也治療當察老幼虛實先究其原不可一概而言之凡中風初覺不語牙關緊急痰涎作聲眼目直視經云視物而睛不動五臟六腑精氣皆上注於目得血氣和則目轉動而還明便以白梅擦牙以局方蘇合香丸炙去腦子用冷生薑自然汁灌下三兩丸再以紙捻打鼻引其氣通若省有痰繼以局方醒風湯和橘皮半夏湯加南木香煎入麝香服氣弱者增附子天雄書云除荊棘者先斷其根欲醫風者先理其氣若投墜涎鐵粉風藥之類寒藥入胃則使血脈凝澀真氣內爍必為廢人若搖頭直視心腎脫絕蓋諸陽獨留諸陰悉盡故直視搖頭心臟絕真臟病也鮮有再生若遇此證先以防風生薑煎湯調局方木香勻氣散加木香下黑錫丹一二百粒入鹽煎附子川薑天麻等分服年幼壯實中風面赤煩躁加渴局方牛黃清心丸若痰盛局方小兒比金丸一貼作一服燈心湯下氣虛中風或小便不禁手足厥逆局方姜附湯加天雄煎下養正丹更灸臍心或丹田氣海一二百壯因食所傷氣道不通壅悶氣厥痰涎作聲大便不通局方解毒雄黃丸每服七丸薑湯下更加大黃煎局方三和散服並沉香降氣湯如是左癱右瘓俟其人事省定即當依其所感隨證醫療若內因七情而得之者先當調氣不當治風外因六淫而得之者先理其氣次依所感六氣隨其證而治之經云風者百病之首其變化為他病無常皆風氣所發所謂除病之道察致之由當斟酌用藥必獲十全效也若臂重作痛時麻能飲酒人此是痰飲不可服風藥可服局方消飲丸倍術丸橘皮半夏湯加片子薑黃茯苓生薑同煎服有婦人二十歲偶食中吃驚發搐涎塞不省人事牙關緊急以白梅擦牙次用冷水茶調恆山細末二錢服下吐涎而省後投局方烏沉湯而安吐法壯實者可用有人病頭旋經云眊為眼花眩為眼黑眩暈頭旋不省人事皆是陽虛又云上虛則眩下虛則厥令服局方俞山人蘇子降氣湯養正丹來復丹如聖餅子而安如聖餅子亦治頭疼痰厥肉瞤筋惕辛頞鼻淵及飲酒過多嘔吐涎沫好飲人可加白豆蔻一粒同嚼服若治心氣怔忪膈中常滿時時吐痰睡臥不安如聖餅子去川烏加鐵豔粉極妙有一室女每經候欲行如風之狀發搐不省人事診其脈心脈浮衝任脈沉此因經行伏驚致此局方黑神散入硃砂燈心麥門冬煎湯調下服數日自後經行如常前病不作若腹痛加大聖散服一婦人腳趾赤腫痛不可忍局方香蘇飲加檳榔木瓜煎三服而痊有人每遇天陰覺渾身重疼無力此乃濕氣香蘇飲與平胃散各一帖和分四服加木瓜煎有大神效治腰隱痛行步艱辛只用平胃散加赤曲同煎服最妙有人常覺左眼瞤動忽然左邊口喎食則不能收求醫僕診其脈浮而澀氣口脈遲而澀遂授之局方香蘇飲和藿香正氣散加南木香薑棗同煎次以小續命湯加天麻磨沉香水同煎下局方養氣丹數服痊安有人四十已上歲平日好食麵飲酒苦右臂不能舉授以局方五積散加木瓜檳榔煎又用生附子一兩去皮臍南木香二錢半㕮咀分作三服水二盞姜十片煎一盞熱服數服而安治方八生飲子治半身不遂手足無力皆由飲食起居失節陽氣不斂風邪所侵若服補劑則風毒愈固其病尤難治矣宜以主陽消陰疏風去濕之藥必可取效服之旬日以手足輕腳膝有力為驗可戒羊肉豬頭動風氣物切不可針灸也亦名建陽湯天雄二兩此藥最佳無則以大附子代之去皮大川烏二兩去皮天南星白附子天麻白朮各一兩川芎木香全蠍薑汁拌全用半夏各半兩同天雄附子南星川烏並生用上件並生用銼如麻豆大每服水五盞生薑一兩切片子每藥一兩半文武火煉取一盞半更以水三盞再煉第二遍取一盞又用水三盞再煉第三遍取一盞共煉得三盞一處和合分作三服空心稍溫服一日可服此三盞何殿機複方舒筋丸治療同前蒼朮削成小塊子川牛膝去蘆銼肉蓯蓉銼木瓜去穰各一兩並酒浸一宿焙乾虎脛骨一兩酥炙附子一兩半炮去皮臍乳香研沒藥研官桂不見火血竭研細各半兩上件為細末酒煮麵糊為丸如梧子大每服五七十丸以溫酒空心送下二服何殿機複方上二方肖仲極服之曾有效八寶回春湯治男子婦人一切諸虛不足風疾血氣交攻凝滯脈絡拘急攣拳氣不升降癱中疼痛痰涎壅盛脾胃不和飲食不進此藥一則去風二則和氣三則活血大有神效大凡病風不可專服風藥攻之愈急則愈甚但專服此藥輕者一月重者二三月自然而愈且無再作蓋此藥不專治風而且和氣不專和氣而且又活血血氣和平榮衛調順則其風證不攻而自去附子炮人參麻黃去節黃芩防己香附子去毛杏仁去皮川芎當歸各一兩茯神一兩半陳皮一兩防風一兩白芍藥五兩沉香半兩半夏一兩半川烏半兩炮桂一兩白朮二兩天台烏藥半兩乾薑一兩黃耆三兩甘草一兩熟地黃一兩生乾地黃一兩上二十四味去風八味和氣八味活血八味一處為末㕮咀每服三錢水一盞半姜三片棗一枚煎一盞空心通口服合二服滓再煎此方常服有效不淺此方乃王翰林經進奉旨頒行而謝子充少年亦感風疾得此方服之而安五虎湯治中風軃曳目睛上視牙關緊急涎盛昏塞不省人事出衛生方新增南星草烏川烏並炮去皮半夏泡七次皂角去皮弦子炙上等分每三大錢水二盞姜十片煎八分溫服不以時大省風湯治一切諸風卒然痰潮神昏語澀大附子生去皮一兩天南星一兩全蠍去尾足半兩防風川芎各二錢半上㕮咀每三錢水一盞半姜七片煎七分溫服不以時十八味流氣飲治一身受風寒濕熱諸邪毒周遍氣脈上下不和羌活獨活人參枳殼陳皮白朮木香防風川芎當歸桂白芍藥甘草白芷黃耆天台烏藥白茯苓上等分為細末棗湯調下江陵傳來省風散治氣不和為風寒邪濕之氣著於手足麻痹頭重偏疼起居旋運四肢倦怠足脛緩弱掣痛無時每遇陰晦風寒神思不清痰氣相逆並宜預服羌活防風甘草白茯苓各半錢木香一分人參陳皮各三錢天台烏藥三錢白朮一兩麵炒南星半兩重者一隻炮去皮切如豆大附子九錢炮去皮臍切上㕮咀每服四錢大姜十片棗二個煎不拘時候拒風丹治風虛痰厥頭疼旋如在舟車之上天南星半夏湯洗七遍各二兩藁本細辛川芎防風羌活獨活各一兩上為細末生薑汁煮麵糊為丸如梧桐子大每服三十丸生薑湯下食後蠲痹湯治風濕相搏身體煩疼項臂痛重舉步艱難及手足冷痹腰腿沉重筋脈無力當歸酒浸一宿羌活薑黃赤芍藥黃耆蜜炙防風各一兩半甘草半兩炙上㕮咀每服半兩水二盞生薑五片同煎至一盞溫服不拘時候二妙散理氣血則風自去當歸橘皮上二味等分為末以酒調服為丸子亦可夏英公酒浸飲子治風疾已下四本宋元憲府手集方防風細銼萆薢羌活秦艽牛膝敗龜虎骨桔梗晚蠶沙炒黃各二兩枸杞子炒五兩蒼耳五升去刺捶碎酥炙干茄根八兩洗銼蒸熟上十二味用好酒二斗浸瓶盛封閉二七日開不得向面恐氣衝頭目每日午時空心及早晨各服一盞常令有酒氣一月除一切風毒濕痹癱瘓等疾四君丸治風順氣血生乾地黃熟乾地黃當歸木瓜上四味等分酒糊為丸溫酒下醒風湯治諸風痰作頭目眩暈南星四兩生去皮用防風二兩甘草一兩上為㕮咀每服五錢水兩盞姜十片同煎七分去滓溫服不拘時候氣不升降者加木香二錢半面如蟲行者加全蠍一錢小防風湯治手足不仁防風秦艽羌活附子炮各一兩上㕮咀每服三大錢水一盞半姜三片煎七分去滓入生地黃汁兩合再煎數服空心服附子大獨活湯治男子婦人體虛中風半身不遂左癱右瘓口眼喎斜手足軃曳經脈攣縮足膝軟弱四肢酷冷肌肉麻痹骨間冷疼行步艱難及風濕相搏關節痠痛自汗惡風項拘急面目浮腫兼療八風五痹久患頭風每遇陰雨發則頭疼項強筋緊頭暈憎寒嘔吐不食發渴不已一切風氣虛損不足並宜服之白姜人參肉桂乾葛北芍藥當歸各九兩川獨活十六兩大附子九枚防風甘草各十二兩上為㕮咀每服三錢水兩盞煎至一盞去滓無時溫服其驗如神中風者此藥不過十服立見殊效也人參南星丸治心虛因為驚氣所觸風邪乘虛而入或因氣觸或因驚觸或因微熱流入心經則神志昏亂涎潮手足搐溺如風之狀天南星生白附子生白茯苓天麻人參遠志肉酸棗仁炒熟上等分為細末薄荷水糊為丸如梧子食後或臥用薑湯吞下三五十丸卻用生硃砂為衣附子煎專治手臂無力麻痹不仁手足不遂風濕相搏筋骨諸疾痛不能舉大附子一枚重八錢慢火炮裂去皮切作十片同生薑米泔淹一宿去姜薄片切焙乾防風一兩骨碎補半兩去毛炒漢防己白朮各半兩乳香二錢別研上為細末入乳香勻拌好酒煮糊丸每服二三十丸空心溫酒下紫金丸治諸癱瘓手足不遂極妙天雄附子大川芎各一對淮烏四兩人參白附子乳香沒藥各半兩當歸一兩山梔子十二兩研五兩余煮用防風降真香半兩血竭尤佳辰砂四錢全蠍半兩上件生用焙乾為細末酒煮糊丸梧桐子大每服五七丸空心溫酒下腳氣木瓜酒下頭風生蔥茶下婦人冷心痛艾醋湯下獨活寄生湯治風濕相搏於腰背氣血凝滯牽引疼痛手足搐搦獨活三兩桑寄生略炙無則以續斷代之白朮炒肉桂杜仲薑製秦艽白茯苓牛膝酒浸一宿焙乾防風川芎當歸白芍藥熟地黃人參各二兩北細辛去葉甘草炙各一兩上㕮咀每服四錢水一盞半煎至七分去滓熱服食前如腰疼脅痛腿疼臨熟入麝香少許和勻服兼治歷節風三聖散又名舒筋散治男子婦人手足拘攣口眼喎斜左癱右瘓骨節痠疼腳弱無力行步不正一切風疾出百一選方除孕婦外老幼皆可服當歸洗焙肉桂去皮延胡索灰炒上等分細末酒調空心臨臥日進三服湘中黃槐卿父子三世用此二藥功效甚多防風湯治病後足履緩弱酸痹精神昏倦防風去蘆白朮北芍藥白者當歸洗人參牛膝酒浸杜仲制黃耆炙熟地黃粉草川芎羌活各等分上為末每服三錢水一盞生薑三片棗子一個煎七分服不拘時候湘中黃應明方黃耆六一湯治風濕相搏肌肉瞤動先服滲濕湯次用是藥黃耆當歸甘草上等分㕮咀水一盞薑棗煎空心服麝香輕骨丹治左癱右瘓不論走注並皆治之川草防膠獨海桐蠍皆半兩與蜈蚣羌活一倍同真麝糯米糊丸最有功選甚左癱並右瘓不論走注及諸風四肢麻痹多疼倦虛損勞傷治一同但把麝香酒研服須臾為取病源通川烏草烏防風白膠香獨活全蠍海桐皮各半兩蜈蚣羌活各一兩真麝少許上為末糯米糊為丸如彈子大空心服陳必勝方騙馬丹治風濕相搏手足疼痛及諸傷百損骨碎補去毛自然銅醋煅虎脛骨酒炙敗龜酒炙各一兩川烏炮草烏炒去尖各四兩半兩錢伍文醋煅牛膝地龍去土五靈脂當歸乳香沒藥川芎萆薢炙羌活藁本天麻防風威靈仙去苗各半兩上細末酒糊為丸如梧桐子大病上食後服病下食前服遍身疼痛不拘時每服三五十丸溫酒下淮西都統丁順傳其效莫述局方烏荊丸治風疰手足亦治便血川烏一兩炮去皮荊芥二兩上為末醋糊為丸如梧子大每服二十丸熟水吞下有人病狂言諸醫欲下一醫云當用附子後服十全湯次日脈大服排風湯而愈溫絡湯治氣血不足風冷留於經絡足脛寒冷筋脈虛弱久成寒痹手足無力步履艱辛骨節疼痛多惡風冷大壯筋脈止疼痛溫四肢下痰止眩暈白朮炒川牛膝酒浸杜仲炒附子炮虎脛骨酒炙各一兩黃耆七錢半沒藥乳香甘草人參各半兩白姜一兩半桂心三分當歸二兩二錢川芎七錢半上㕮咀水一盞姜三片木瓜二片煎七分食後服七聖散治老人腳膝疼痛不可履地杜仲姜炒續斷萆薢防風獨活川牛膝酒浸洗甘草各等分上細末酒調二錢食前服密陀僧散治風驚氣入心語音不能者密陀僧研如粉以茶調一錢一服即愈省風湯南星一兩半炮防風一兩半甘草半兩上㕮咀每服四錢重水二盞姜十片煎八分熱服氣逆加紫蘇南木香各二錢半氣虛加生附子一兩沉香二錢半胸膈不利有痰加半夏一兩人參半兩頭暈頭疼加天麻半兩全蠍二錢煎熟入麝少許以上六方載梁氏總要方並效烏犀丸治左癱右瘓口眼喎斜頭目旋暈手足頑麻渾身疼痛等疾草烏六兩生用川烏三兩半炮去皮甘草三兩甘松一兩半麻黃一兩半去節白芷一兩熟地黃一兩半乾薑一兩當歸半兩羌活半兩藿香葉一兩淨藁本一兩赤小豆半兩京墨半兩煨去膠川芎一兩上細末別將黃秫米十五兩為粉作餅子煮熟旋於缽內入藥末搗勻丸如大每服一丸用生薑一片同嚼食後茶酒任下此方何家一鋪遠邇服餌遂致溫燠鄉人林用卿嘗從其家子弟學因得此方傳之烏藥散治中風不語老人虛人可用之烏藥附子一隻天雄一隻沉香大塊各一兩甘草少許上入缽磨各一錢病勢稍重用水一碗姜十片煎半碗空心服氣中加木香半錢無氣加人參半錢正舌散治中風舌本強難轉語不正神妙蠍梢去毒一分茯苓一兩炒龍腦薄荷二兩焙上細末每服二錢溫酒下或搽牙頰亦得川芎散治中風中氣先服此藥川芎人參枳殼各一兩沉香香附子各二錢木香一兩上細末每服三錢以沸湯入鹽點灌之十二味正氣散治風中氣中陳皮厚朴半夏藿香甘草人參二錢半茯苓白朮石菖蒲木香遠志薏苡仁上除人參外余藥各半兩㕮咀每服三大錢水一盞姜三片棗一枚煎八分服以上四方載梁氏總要方用之各有效神柏散治中風不省人事涎潮口噤語言不出手足軃曳得病之日便進此藥可使風退氣和不成廢人柏葉一握去節蔥白一握連根上同研如泥用無灰酒一升同煎一二十沸溫服鄂渚小金丹治諸風晚蠶沙炒熟草烏頭生用上各等分為末生地龍為丸如少則加醋糊為丸每服四五丸白湯下多則麻人甚妙芎辛散治風化痰清利頭目不思飲食出雞峰方北細辛一兩川芎一兩甘草二錢半上為末每服二錢水一盞薄荷七片煎至五分去滓不拘時候溫服青龍膏治榮衛不和陽少陰多手腳舉動不快出雞峰方白花蛇不蚛者六兩好酒煮去皮骨新瓦上焙乾取肉一兩狗脊天麻各二兩上細末銀盂子盛無灰酒一升入此三藥重湯煮稠如膏銀匙攪細磨生薑半兩取汁同熬勻垍罐內收每服半匙頭好酒半盞攪勻服或湯亦可食前飲之極佳日二服神效果皮丸治久患風疾手足不遂果州陳皮川當歸上為末酒煮糊為丸湯酒任服不拘多少親見人用之取效神妙趁病丸腰臂痛秘方五靈脂赤芍藥各半兩川烏一個沒藥四錢麝香一錢上為細末酒糊為丸溫酒空心下朱仁卿傳聖驗黑神丸成都府昭覺寺潛庵道人真本防風去蘆焙川烏炮好墨銼焙川附子炮檀香各半兩麥冬去心焙藿香葉去土焙白茅何首烏銼用生薑汁同泡了甘草二錢浸二宿焙再浸焙各七錢乾薑七錢白殭蠶油炒去絲全蠍薑汁浸一宿焙天南星炮裂熟片切以薑汁小半盞同泡了甘草三錢銼浸二宿焙再浸焙薑汁盡為度白附子炮十分裂熟以薑汁同泡了甘草三錢浸二宿焙再浸焙阿膠水浸蒸同糯米糊作丸各七錢半細辛去葉及土銼焙白芷銼焙香附子炒去毛拍碎以生薑汁同泡了甘草二錢浸二宿焙余汁再浸川芎銼焙各八錢皂角灰燒煙煅甘松去土銼焙川者尤妙半夏湯洗十次炒令熱炮片切用生薑汁半盞泡了甘草三錢浸二三宿焙再浸再焙半兩草豆蔻拍碎去皮膜生薑汁浸一二日焙再浸焙六錢白朮銼焙一兩二錢縮砂仁去膜皮輕焙一兩麝香另細研同藥末滾龍腦同麝研滾藥末各一錢白甘草炮熟銼焙一兩七錢上為細末大缽中滾拌兩日極令勻合糯米粉二兩添水煮糊同阿膠膏和藥杵二千餘杵丸如雞頭大焙令十分乾瓷瓶收置暖處但此方修合雖好然亦遲滯不若修銼生料眾藥同片切生薑半斤或七兩甘草三兩於瓷罐內用水一斗五升上下文武火煮水乾為度仍除出甘松白茅檀香縮砂仁藿香葉勿煮止令項焙搗為末庶香氣全所有煮者眾藥亦令作一處焙搗為細末就了卻令研腦麝同香松茅數件大缽內滾三二日令藥味和合方作法和搗為丸煮藥下水之訣以水高眾藥一寸余許文武火煮若火烈藥無味卻在酌量伺候風為萬病之根源蓋五臟所受不同而引起疾證有異善衛生者此藥不可缺感證不同改湯使服之一切風疾炒烏豆淬酒下卒中僵倒或醉酒不醒生薑湯研三五粒灌下小兒驚風天吊五種癎疾入京膩粉少許煎金銀薄荷茶下沉寒痼冷生薑湯下一切氣疾茴香湯下頭風暗風荊芥湯下咳嗽痰涎半夏湯下肺氣攻衛杏仁湯下瘧疾烏梅湯下水瀉乾薑湯下痢疾甘草湯下腳疾濕氣木瓜湯下酒傷食積胃氣不和陳皮薑湯下腸風胡桃酒下傷寒吹霎蔥豉湯下時行疫疾山嵐瘴氣不服水土藁本湯下中毒甘草水研灌下牙痛夜臥含化牙宣填竅中婦人血風血氣當歸酒下血臟虛冷赤白帶下血淋血暈燒棕櫚灰研細調酒下腰背疼痛渾身勞倦溫酒下常服食後茶下此藥本訣傳之神聖功效不可盡述孕婦休服宿州紅餅子治男子婦人諸般風疾兼諸損陳氏家傳第一藥何首烏天南星川芎川烏各半兩蒼朮白殭蠶各二兩草烏一兩藿香白芷各一錢雄黃半錢上除白殭蠶雄黃外以水淨洗曬乾為末粳米粉糊捻餅子如小錢大土朱為衣用刀切十字待乾一餅分作四服空心偏正頭風生蔥茶嚼下打撲傷損松節酒下鼓槌風膝腫浸川牛膝酒下如牙疼半餅嚼在疼處先以蔥湯下一服防風湯治手足不仁或腫不已宜服之北防風川升麻川獨活川羌活北芍藥甘草上等分銼散每服二錢水一盞半煎至八分隨證上下分空心食後通口服如覺氣通遂旋服活血丹地仙丹之類此說方系名醫周繼祖累以收效今聞有用之者其應如響萬金湯治風補虛衛通氣血及治腳膝無力醫官杜壬以此治手足風累驗桑寄生北細辛桂心防風人參川牛膝白茯苓當歸芍藥杜仲薑製甘草各一兩川獨活川芎秦艽熟地黃各半兩上㕮咀每服五錢以水二盞煎至一盞服消風散治口眼喎斜半身不遂多因下元虛弱為風所乘先服順氣藥次服補藥卻用茶清調消風散下青州白丸子而愈廣東譚兄傳此方與友人何清之云此藥只服兩三日見效亦自有理仙茅散治背膊手足頭目筋脈虛掣一切風證疼痛不可忍仙茅無則以好蒼朮代之一兩陳皮枳殼炮厚朴制官桂秦艽各一錢當歸白茯苓白芍藥白芷川芎半夏餅各一錢半麻黃不去節二錢半沒藥甘草川烏炮各半兩白姜乳香川獨活二錢全蠍七個麝香半錢上除桂芷麝沒乳余並炒轉色卻入不炒藥同為細末每服三大錢炒大黑豆同木瓜蔭酒旋溫調服不拘時候寶慶張醫宗玉以此醫胡龍圖取效卒中附中風中氣中暑通頂散治初中風口噤不省人事者先用此藥搐鼻令醒方用別藥或傷風頭疼昏眩妙甚葉氏錄驗方黃躑躅一分為末雄黃一分研飛北細辛半兩為末上三件和勻不省人事時挑少許搐入鼻中即醒涎出口開方可投藥治卒中口噤不省人事者細辛皂角各少許上為末或用半夏為末以蘆管吹入鼻中藥證病源云或失音不語精神昏憒者如能言語牙關緊急者細辛末搐鼻或揩牙一法用白梅擦牙更以菖蒲末著舌下牙關即開倉卒可用獨香散治氣中目不開四肢不收昏沉南木香不以多少為細末上用瓜蔞子煎湯調下有人忽然不省人事身體軟弱牙關不緊涎不潮塞醫言中風投雄珠丸星附之屬病者轉昏僕診其脈皆濡氣閉隔絕所以脈濡授以局方木香流氣飲煎熟入麝香少許兩服而痊水沉湯治伏暑傷冷霍亂轉筋虛煩躁渴心腹撮痛吐利交作四肢厥冷香薷葉厚朴各三兩白茯苓白扁豆炒去皮各二兩丁香甘草各半兩上銼散每服三錢半酒半水煎水中沉冷服不拘時候腳氣五聖散治腳氣腳氣之患皆因坐立濕地或因行腳熱脫鞋及著濕鞋其風濕之氣而入初在皮膚次傳經絡甚至骨髓遂成此疾發作必然行步艱難痛不可忍若不治之漸次傳在心胸甚在臟腑歲久則傷命深可哀嘆余因授到一方能療此疾極有妙功試之果驗沉香流氣飲人參敗毒散小續命湯除去附子三和散香蘇散上五件各一貼加檳榔三十個搜麵裹煨熟去面及川楝子十文京南芍藥二十文共三件並銼碎同前五貼藥共一處和勻作五服水一盞姜三片棗一枚木瓜三片同煎至一盞濾滓再煎二次與頭藥合和用瓦器盛貯將紗片蓋瓦器口安頓屋上露一夜次早取下暖熱調復元通氣散半貼空心服此藥不問男子婦人小兒加減服餌其效更不盡述此方系撫州肖世榮施方驅風丹專治遠年近日不問陰陽二證腳足腫痛不可忍川烏一兩生用不去皮尖大者破作四邊小者破兩邊判如骰子大用麻油煎令黃色勿焦去油焙草烏四兩擇雞心者生用不去皮尖每個破作二片擇白淨者用心黑者不用銼如骰子大二兩用油制如制川烏法二兩用鹽一兩拌和水微淹著浸三晝夜一日一度漉轉候日數足取出去水再用干鹽一兩同炒候乾去鹽勿令焦本法用滷汁浸三晝夜去滷汁炒乾用無滷汁鹽代地龍四兩置陰潤處少時用紗帕裹定輕槌篩去土取肉用不必更秤雞心檳榔一兩銼焙何首烏一兩銼焙乾木瓜一兩銼焙赤小豆一兩擇去綠豆黃豆上為細末用黃子醋一碗好頭面半兩煮糊為丸如梧桐子大每服三十丸空心麝香冷鹽酒吞下不用溫酒服訖不可便食熱物或服藥後覺遍身麻木不可便謂麻木棄而不服恐是丸數過多或食熱物太早仍忌香菜茵陳豆豉一切動風毒物乳香應痛丸大治腳氣風損神效川烏生用不去皮尖油制如前草烏生用不去皮尖鹽制如前紅花銼焙當歸酒洗銼焙天台烏藥銼焙乾葛銼焙白芍藥洗銼焙蘇木銼生乾地黃洗銼骨碎補燎去毛雞骨降真香銼金毛狗脊燎去毛乳香杵碎用香爐盛火簳篛葉一片虛架在香爐口上約去火二寸許次將乳香置篛葉上候灸溶滾用水潤濕小竹篦子炒撥覺滾定取出候冷研沒藥杵碎酒浸爛研候諸藥末成刮入同丸自然銅入銀鍋內炭蓋口及四圍煅紅入好黃子醋內淬二三次可研為度上各一兩為細末用好白酒濃腳一碗好頭面半兩煮糊丸如梧桐子大每服三十丸空心溫鹽酒下禁忌如前凡腳氣發作先服驅風丹大痛稍愈即間服此藥候痛痊愈專服此藥謂如常歲每歲則痛一月今年服此一料只痛半月二十日明年已發未發再服一料只痛十數日又明年再服一料則終身不復作矣但腳氣年深背駝腰曲手足攣拳者服前項二藥雖未能卒去病根然亦能免大腫痛此藥不特專治腳氣但是風損皆可服之以上二藥常用微火烘焙恐發潤故也如白虎歷節之類皆可服敗毒散一貼加大黃荊芥穗各半錢重拌和分作二服依本方煎服以大便流利為度過秋則以香蘇散間服亦如前項二藥虛弱人略加些小塗藥方陰陽二證塗之立效腳氣發先用塗藥次合丸子藥豬牙皂角不蛀者不蛀皂角南木香上三味等分為細末黃子醋濃調先於腫痛之上不痛處用藥周圍塗之闊二三寸若圈然截住毒氣勿使衝上次塗下面腫痛者只留腳趾尖不塗仍修事腳指甲以出毒氣時時用醋潤濕又方何首烏黃連赤小豆綠豆粉各等分上末用生地黃煎湯候冷調塗亦如前法干則用醋潤又方玉淨瓶紫芸根長葉成叢者是上生採等分細切入好茶末二三錢同擂爛每用一團如當三錢大用瓦碗盛水化開同煮數沸候冷如前法此藥專治赤腫熱痛者立效又方腳氣已止但腫不消不能行履無名異不以多少一半生用一半火煅如煅自然銅法上生熟拌和為細末醋調塗皆如前法以上七方得之本州益陽縣坡底歐陽文炳渠本得之異人秘藏三十年今始一傳謹用刊行與衛生君子共之幸毋見方輕藥昔巢君嘗以聖散子方授之東坡先生指江水為盟約不傳人東坡隘之乃以傳龐公安常著在方冊使巢君之名與此方同為不朽今傳文炳之方刊以散施亦使文炳之名與此方相為長久也此係寧鄉米步彭氏刊施本地龍丸治風腳痛不可忍川楝子肉一兩用巴豆炒不用巴豆全蠍二錢好面一兩破故紙三錢用斑蝥炒不用斑蝥茴香二錢半用黑牽牛一錢炒不用黑牽牛胡蘆巴二錢半用海金沙一錢炒不用金沙自然銅半兩煅醋淬水蛭兩條麝香炒敗龜半兩石薜荔半兩用鹽醋浸一時焙無名異四錢炒檳榔三錢不見火天竺黃半兩紅曲半兩瓦上焙穿山甲四錢炒地龍三錢去土炒古錢十二個用砂鍋子盛爐內煅成汁醋淬上為細末將乳香一錢沒藥三錢麝香一錢辰砂半兩為衣醋煮麵糊為丸梧桐子大溫酒吞下牛膝丸治腳氣何元壽方草烏荊芥續斷萆薢牛膝破故紙骨碎補黑牽牛香附子當歸川楝子何首烏赤小豆石楠葉防風芍藥烏藥地黃木瓜上等分為末酒煮麵為丸每服三十丸空心鹽酒鹽湯下地仙丹治男子婦人陽證腳痛錢子地龍炒去土五靈脂去石天台烏藥白膠香別研威靈仙去蘆洗木瓜去穰赤小豆炒黑豆生去皮天仙藤洗淮烏炮去皮五加皮洗木鱉子去殼油蒼朮米泔水浸一宿削去皮銼炒椒紅去目併合者炒出汗盞蓋地出汗取紅上等分為細末酒糊為丸如梧桐子大每服七十丸空心鹽湯鹽酒任下南康劉立之方獨勝散治乾溼腳氣不問新舊悉能療之平胃散一貼加紫蘇梗細銼同煎通口服如是濕腳氣則一服可愈紫蘇不用葉及不問新舊隆興府徐尉名州傳有效三香散治腳氣醴泉梁國佐方檀香一錢麝香二錢穿山甲三錢酒炙沒藥三錢白膠香五錢紅曲五錢川烏二錢全蠍一錢草烏炒去烏上為末每服二錢空心溫酒調下又方小續命湯石楠丸各一貼上入木瓜內蒸九次和杵膏為丸每服三十丸空心木瓜湯下梁國佐方七聖散治腳氣梁國佐方平胃散丁香平胃散棗肉平胃散木香勻氣散沉香降氣湯復元通氣散流氣飲每用一貼上用八角茴香麝香大蒜去皮心用火醋調面火煨候蒜香熟取出蒜臼杵拌和前藥如梧桐子大用茶芽與燈心同煎湯空心下連三服頃刻移步見效敷貼腳氣藥贛州羅監稅傳甚妙大戟茱萸大黃官桂上等分為細末酸醋調敷痛處牛膝湯治腳氣有驗牛膝一斤白茯苓人參各一兩當歸半兩上為細末酒調服又方敗毒散加木瓜煎專治腳氣赤小豆丸治風腳赤小豆半生半炒香附半生用半酒炒晚蠶沙半生半炒草烏半生半麻油炒上等分加陳倉米三分之一半生半炒為末酒糊為丸梧桐子大每服十丸空心茶酒任下草烏丸治腳氣丁仲信傳屢親見效草烏五兩水浸二日生去皮切片入鹽油炒至赤色為度全蠍五七杖上為細末煮清糊候冷入麝少許為丸如梧桐子大每服十丸空心溫酒下極妙張走馬家飛步丸此係第一方筋骨藥能去筋脈骨節手足腰背諸般疼痛攣縮不伸之患趙寺薄傳渠甚秘之木鱉子仁取肉別研去油川烏生去皮臍草烏生去皮臍白膠香白芍藥各二兩乳香一兩別研上為細末用赤小豆末煮糊為丸如梧桐子大每服五丸木瓜湯下病在上食後臨臥服病在下空心服用忌熱物片時及熱湯如神湯治一切風寒暑濕瘴諸般腳氣張走馬家本金毛狗脊去毛吳茱萸生用山茱萸生用連核木鱉子去殼用各一兩上㕮咀分作四次每用水五碗煎數沸乘熱熏後去滓淋洗木瓜丸治腳氣極效田穎伯方破故紙炒川萆薢乾木瓜杜仲炒茯神炒茴香炒川牛膝酒浸切焙上為細末糊為丸如梧桐子大湯酒任下香蠍丸治腳氣梁國佐見效方檀香一錢麝香川烏各二錢沒藥三錢穿山甲三錢酒炙全蠍一錢草烏炒去烏紅曲五錢白膠香五錢上為末糊為丸每服三十丸空心溫酒下虎骨丸治腳氣兩腿腫行步艱辛胡永之節推用之有效蒼朮防風萆薢鹽水浸炒乾木瓜上件為末酒煮麵糊為丸如梧桐子大每服四五十丸湯酒任下秘傳循經丸治男子婦人兒童室女諸經絡風邪寒濕氣血留滯流注作痛筋脈攣拳並皆治之常服亦可南星三兩炮去皮臍草烏一兩炮去皮臍豆餅二兩用黑豆不以多少去皮好酒煮爛候酒干擂碎捏作餅子曬乾乳香沒藥各一兩上件為末酒煮麵糊為丸如梧桐子大每服三十丸用溫酒吞下不拘時候服循絡丸治風濕流襲足膝筋骨內疼痛外祖母久苦此疾得此藥而愈五靈脂二兩北防風去蘆川萆薢炮去皮臍狗脊去毛大蒼朮米泔浸虎骨打碎酒蒸川烏生用各一兩川烏一兩炮去皮臍沒藥一兩研去砂乳香半兩研去砂上共為細末酒煮麵糊為丸如梧子大每服三十丸至五十丸溫酒食前下不飲者以木瓜湯下此藥可常服如痛大作則以小續命湯加檳榔羌活青皮煎湯痛止則勿服蓋老人恐氣虛體弱則易耗氣爾獨活散治行履費力因臥濕地而得之胡伯才感此疾得唐接骨傳此方一服而愈獨活五兩川椒三兩草烏半斤麻黃三兩防風二兩杉木節一兩荊芥一小把蔥一握上煎湯熏蒸通得手用蔥蘸湯洗以久為度更先服小續命湯神效丸治乾溼腳氣骨里疼痛或腫或不腫並皆治之川烏一枚略去皮草烏半兩略去皮地龍半兩去土全蠍四十二個去毒黑豆四十二粒去皮蜈蚣一條去頭足上六味焙乾為末入糯米糊為丸麝香為衣用冷酒下七丸至十丸少頃用荊芥穗些小先嚼爛用茶清灌漱之其效如神用之果驗地黃湯治穿心腳氣劉立之已效方熟地黃四兩川當歸二兩北芍藥川芎川牛膝山柰子各一兩杜仲薑製半兩上㕮咀每服三錢水一盞半煎至八分無時服加味火杴丸治陽證腳氣火杴草九斤枯松枝三兩石膏三兩煅石楠葉一斤萆薢半兩醋煮七次日乾上為末醋糊為丸每服三十丸空心服萆薢散治一切風證腰腳疼痛徹骨酸楚此藥除風去濕止痛活血補腎破故紙鹽炒川續斷川烏炮防風萆薢赤芍藥熟地黃獨活白芷沒藥杜仲薑製各一兩茴香炒白朮各二兩上細末煉蜜為丸如梧桐子大空心鹽酒任下三五大丸史衛王奉內祠日忽苦此疾足不能行發熱煩悶後得此藥三服頓安雞鳴散治腳第一支藥不問男女皆可服如人感風濕流注腳足痛不可忍用索懸吊叫聲不絕筋脈腫大檳榔七枚陳皮木瓜各一兩吳茱萸二錢桔梗半兩生薑和皮半兩紫蘇莖葉三錢上為粗末分作八服隔宿用水三大碗慢火煎留碗半去滓留水二碗煎滓取一小碗兩次以煎相和安頓床頭次日五更分二三服只是冷服冬月略溫亦得服了用餅餌壓下如服不盡留次日漸漸吃亦可服此藥至天明大便當下一碗許黑糞水即是元腎家感寒濕毒氣下來也至早飯前後痛住腫消但只是放遲吃物候藥力過此藥不是宣藥並無所忌淮頭老兵方三皮散治風毒濕氣流注腳膝四肢攣拳筋脈不伸腳足疼痛步履艱難用此藥酒斷根不問三二十年者皆有效海桐皮去皮五加皮自採者桑白皮川獨活川牛膝制杜仲各一兩黑附子炮去皮斟酌用多少薏苡仁生用二兩生乾地黃升半上為粗末用綿裹作一包以無灰好酒一斗許春浸七日秋冬二七日夏三五日濾起藥空心溫服一盞一日三五次服如服藥酒時卻飲它酒常令酒氣相接勿令大醉重者不過兩劑服此藥後旬日兩腿必發大疹漸漸破出紫黑血候乾續磨風膏貼瘡上自然好也日逐腳上如數百條蛇自足而出此其效驗如患足疾之人腳後有一條筋直湊腎囊疼痛拘攣用妙香散一貼分作三二服空心食前溫酒鹽湯下自然伸也二方得之淮頭老兵烏靈丸治男子腳氣不能伸屈及癱瘓手足不隨潘德夫用之效草烏銼碎烏豆各二兩用好醋浸三宿日乾然後和後藥又用草烏生用威靈仙各二兩上四件併為末醋煮麵糊為丸如梧桐子大病上食後溫酒吞下病下空心服十丸至二十丸橘子仁湯治風濕腰腳疼痛服諸藥不效者此藥親見功效橘子仁當歸萆薢獨活肉桂木豬苓防風附子草烏杏仁赤芍藥甘草厚朴麻黃沒藥羌活地黃川烏川芎茴香上等分為細末每服三錢用木瓜酒調下空心服烏藥丸治腳氣徹骨痛不能行履者不過三服見效白芍藥木鱉子去殼紙捶出油草烏不去皮威靈仙北細辛沒藥上等分為末薄糊為丸梧桐子大每服七丸至十丸食後臨臥木瓜湯下酒下亦可以身上覺麻痹即是效或未效可添十五丸量虛實不可妄增丸數及不可於食前服之有草烏在其間最忌食後以熱食物衝動烏毒則昏不知人矣丁叔謙傳方木瓜敗毒散治一切腳氣宣瓜一杖無則尋常木瓜亦可去穰入㕮咀自合敗毒散實其中入酒調藥蒸熟將瓜切片曝乾同敗毒散入水煎空心服醴泉劉行之路分傳渠得之淮頭有效去杖湯治腳弱無力行步艱辛友人戴明運用之有驗赤芍藥六兩甘草一兩上㕮咀每服三錢水一盞半煎至一盞空心食前平胃散治腳氣平胃散一貼入大蒜研爛盦之有效蒼芎千里飲治久近腳氣蒼朮薄切米泔水浸乾木瓜白芍藥川芎人參枳殼去穰白茯苓甘草炙大黃陳皮去白半夏泡七次桔梗炒前胡乾葛紫蘇木香各等分上㕮咀每服五錢重水一碗半生薑七片煎至一碗去滓溫服食前如服此藥先用大蒜三頭剝去皮洗淨擂細捻作餅子貼所患腳心外用絹帛傅之覺口心微有蒜氣便溫前藥頓服象守紀智立傳親見劉監稅用之取效木香散治腳氣鷺鷥藤木香赤芍藥各一錢上用香蘇散一貼同煎去滓服胡都承傳方四制丸治腳氣製蒼朮二兩乾木瓜一兩好酒一升煮乾蒼朮二兩乾木瓜一兩水一升入鹽二兩煮乾製蒼朮二兩乾木瓜一兩好醋一升煮乾蒼朮二兩乾木瓜一兩水一升川椒一兩煮乾上用瓦器煮焙乾為末酒糊丸如梧桐子大空心溫酒下三五十丸婦人醋湯下
