body:
  text: 卷之八虛損門附勞瘵虛損評評曰虛損一證證候多端或大病未復便合陰陽或筋力疲倦飢飽失時用心計算高呼大叫或極目觀書精思文字是致氣血耗散百病頓生或吐衄交作或白濁遺精下部虛冷洞泄下利盜汗自汗潮熱發熱或手足厥冷或便數溺溲咳嗽吐痰種種不一或嘔吐不食日就羸黃或飲食雖多不生肌肉日久月將積微成損氣血愈微微則衰矣婦人産後營衛虛耗其為虛也尤甚大抵潮熱者不可過用寒涼之劑祕結者不可倍使疏泄之藥咳嗽者不可妄施發散咯血者不可誤以為熱是必調和衛氣滋養營血古人所謂補腎不如補脾所謂精氣血氣未有不自穀氣以為本也治之之法要當察其脈理隨其證候施之治療萬無失焉治方既濟固真丹治水火不既濟精神恍惚頭目昏暗陽道痿弱陰濕多汗遺瀝失精脾胃虛怯心腎不寧凡腎水欲升而沃心心火欲降而滋腎則坎離既濟陰陽協和火不炎上則神自清水不滲下而精自固常服壯陽固氣溫脾益血北五味子白茯苓附子沉香龍骨蓯蓉酒浸一宿無以鹿茸代酥炙各一兩益智仁柏子仁去殼炒補骨脂炒酸棗仁去殼炒金鈴子去核炒紅椒去目當歸酒浸川巴戟去心各半兩菟絲子酒浸合研一兩半上為細末酒糊為丸辰砂三錢為衣如梧桐子大每服五七十丸空心鹽酒任下侍左王郎中熔傳為上司謝大卿暨服之果是奇絶聚寶養氣丹治諸虛不足氣血怯弱頭目昏暈肢節倦怠心志昏憒夜夢失精小便滑數脾胃氣虛又治諸風癱瘓半身不遂語言謇澀肢體重痛寒濕氣痹或久寒宿冷泄瀉發瘧寒熱下痢赤白及腸風痔瘻下血不止婦人子臟久冷崩漏帶下五色月候不調腹脅刺痛血瘕血閉羸瘦乏力並皆治之代赭石紫石英赤石脂禹糧石上四味各二兩醋淬水飛過搜作錠子候十分乾入砂合內養火三日罐子埋地中出火毒一宿陽起石煅肉豆蔻麵裹煨鹿茸酒炙破故紙酒炒鍾乳粉五靈脂酒研茴香酒炒柏子仁當歸酒浸炙遠志酒炒去心沒藥別研白茯苓附子炮天雄炮胡椒沉香丁香木香乳香黃耆蜜炙山藥蓯蓉焙肉桂巴戟各半兩血竭琥珀硃砂麝香各三錢上為細末糯米煮糊為丸如梧桐子大留硃砂麝香少許為衣每服三十丸空心人參煎湯或棗湯下婦人醋湯下九江雷醫方十補丸治諸虛不足補元陽益真氣茴香炒二兩葫蘆巴炒破故紙炒蒼朮米泔水浸一宿菟絲子酒浸一宿炒各一兩以上五味用煮酒浸三宿大川烏一個一兩者好醋浸三宿青鹽半兩丁香二錢木通半兩用鹽二錢好酒一碗煮乾麝香半錢上為細末用前浸藥酒煮麵糊為丸如梧桐子大每服四五十丸空心溫酒送下益中丹益真氣補虛憊治下焦傷竭臍腹絞痛兩脅脹滿飲食減少肢節煩疼手足麻痹腰腿沉重行步艱難目視茫茫夜夢鬼交遣泄失精神氣不爽陽事不舉小便滑數氣虛腸鳴大便自痢虛煩盜汗津液內燥並宜服之鹿茸蜜炙丁香木香茴香炒山藥黃耆蜜炙木通油炒官桂去皮乾薑炮青鹽石斛天雄炮附子炮鵝管石火煅酒淬陽起石火煅酒淬肉豆蔻川牛膝酒浸焙破故紙炒胡蘆巴炒菟絲子酒浸焙金鈴子去核覆盆子熟地黃酒浸焙蓽澄茄馬蘭花醋炒肉蓯蓉酒浸焙韭子酒浸焙各二錢半沉香人參各一錢一字麝香三字上為細末酒煮麵糊為丸如梧桐子大每服三十丸加至五十丸空心溫酒服宋孝宗賜新安郡王吳珍傳吳武穆挺傳逆羲有提轄兼修合藥局官周禮被罪放罷押付興元府中軍入隊使喚吳彥是時任中軍統制年三十七患虛憊冷病為飲酒過多食牛凍所傷服此藥三十五年間服養氣丹令髭鬢不白皆此藥之力茸附煎丸生精補血益諸虛百損吳尚書方鹿茸火燎去毛酒浸三宿蒸熟焙乾蓯蓉牛膝洗熟地黃當歸洗巴戟去心川續斷各四兩以上六味拌勻酒浸二宿日乾一處拌菟絲子八兩洗去沙土酒浸五日焙乾大附子炮破故紙炒茯神去木茴香炒川楝子去核各四兩五味子沉香官桂去皮各二兩臺椒紅炒木香各一兩杜仲去皮細銼生薑汁拌和干炒蒼朮八兩米泔水浸一宿洗去沙土銼片用蔥白八兩切片罨五宿日乾炒黃色上為細末酒糊為丸梧桐子大每服五六十丸鹽湯溫酒吞下日三二服常服甚妙膃肭臍丸補真助陽益壯根本南康嚴子禮方膃肭臍一對酒煮爛用大附子炮去皮臍五味子川烏炮菟絲子酒浸焙乾各二兩鹿茸蜜炙麋茸鹿角膠各一兩半沉香青鹽別研陽起石火煅葫蘆巴炒鍾乳粉各一兩麝香一錢上細末用溫膃肭杵爛和藥將所煮膃肭臍酒煮山藥末為糊丸如梧桐子大每服七十丸空心酒服膃肭臍丸治證同前趙龍學方膃肭臍一對鹿角膠鹿角霜麋茸各二兩熟地黃胡蘆巴菟絲子巴戟去心鍾乳粉乳香沒藥當歸牛膝蓯蓉茴香天雄附子各一兩沉香硃砂二錢麝香一錢上先將膃肭臍酒浸一宿煮爛杵成膏將浸藥酒化麋鹿膠同為膏子次下乳香麝香沒藥硃砂乳粉研為末將余藥修事了研為細末再於干鉢內同研千百下別用羊白腰子三對羊白脊髓五條酒煮熟爛研為膏用膃肭臍鹿角膠搜拌藥末成劑得所若稍干打酒糊些小同搜成劑入臼杵三五千杵丸如梧桐子大窨一宿慢火上焙乾用無油罐子盛紙密封上每服三五十丸空心溫酒下膃肭臍丸治證同前膃肭臍一對麋茸去毛酒浸一宿炙鹿茸去毛酒浸一宿炙蓯蓉酒浸一宿各五兩當歸茯神去灰心硃砂蜜煮牛膝酒浸一宿五味子巴戟去心各三兩青鹽炒一兩陽起石酒煮一日沉香各二兩附子三兩炮去皮菟絲子五兩淨酒浸一宿上為細末用膃肭臍並鹿角膠為膏子丸如梧桐子大每服七十丸至一百丸鹽酒湯下食前茸附丸治下元補傷憊駐顏悅色壯筋力去百病黃狗脊一條去兩頭截作五七段帶些肉用硇砂一兩研以漿水二升調勻方下脊骨在汁中浸三日炭火炙乾以汁盡令黃色搗細後入諸藥肉桂去皮附子炮菟絲子酒浸二日蒸焙乾杜仲薑製乾薑炮鹿角膠炒肉蓯蓉酒浸焙各一兩蛇床子炒胡蘆巴陽起石酒煮一日研各半兩鹿茸蜜炙一兩半黃狗內外腎一付酒煮焙乾上細末用棗肉五兩酥一兩相和杵千餘下丸如緑豆大日乾每日鹽湯下二十丸朱佐方梅茸丸補肝腎斂肝氣鹿茸三兩爁去毛酒浸一宿炙烏梅肉一兩用肥者沉香三錢當歸二兩鍾乳粉半兩上為末次入鍾乳粉拌和用羊脊髓為丸如梧桐子大每服五十丸粟米飲下青蛾丸菟絲子半斤酒浸木瓜牛膝酒浸五味子各二兩青鹽天麻各一兩附子一兩用柳木火炮去皮臍埋三宿薑汁浸焙上件除青鹽附子諸藥俱用酒浸洗卻用浸藥酒煮糊為丸每服五七十丸如梧桐子大空心酒服仙茅丸固精暖水臟仙茅糯米疳浸一二日一日一換取盡赤汁日乾四兩磨為細末白茯苓去皮半夏湯泡七次各二兩茴香鹽炒去鹽一兩半上為細末酒糊為丸如梧桐子大任意服煮附丸附子八錢重者兩隻去皮臍切片子酒二升煮盡為度茴香木香各半兩胡蘆巴一兩炒上為細末酒糊為丸空心溫鹽湯下腹疼良薑湯下泄瀉米飲下四五十丸增益八味丸滋養肝腎益心血利足膝實肌膚悅顏色真男子衛生之良藥也此方專理肝心腎之血澤瀉則引諸藥以歸腎熟乾地黃酒灑九蒸日乾稱鹿茸去毛炙五味子各四兩山藥大塊者酒浸一宿山茱萸去核大附子一兩者炮牛膝酒浸一宿各二兩白茯苓牡丹皮去骨澤瀉酒浸一宿各一兩半上為細末用真鹿角膠半斤銼細入銀石器中法酒丸如梧桐子大每服五十丸空心溫酒鹽湯下朱佐方祕傳肉丹養心腎生精血補虛損壯筋骨固下元此乃肉藥潤補不僭不燥功效異常小山厲端明常服加仙茅膃肭臍尤妙伏火硃砂四兩研如粉代赭石四兩火煅水飛過鹿角膠七兩蛤粉炒鹿角霜二兩鹿茸七兩酒浸炙白龍骨三兩生用水飛虎脛骨四兩酥炙天雄二兩炮桑螵蛸四兩炒磁石四兩醋淬水飛牡蠣粉四兩韭菜葉和泥煅水飛附子一兩炮鍾乳粉二兩陽起石二兩煅水飛乳香一兩沒藥一兩沉香一兩上件糯米粉用酒和成餅煮熟丸如梧桐子大每服三十丸加至五十丸空心鹽湯下一方用靈砂不使硃砂既濟丹升降心腎磁石好者煅醋淬研碎水飛辰砂蜜者尤妙酸棗仁人參各二兩乳香半兩上為細末神麯和為丸如梧桐子大每服三五十丸燈心棗湯下不拘時候既濟玉關丸治憂思過多心腎不足水火不能交養神志不寧此藥壯真元益心氣使水火既濟不生諸疾真辰砂一兩滴乳香半兩法酒一升以上三味用銀器慢火煮令極干刮下為末卻入附子罐內大附子四隻生去皮臍作罐子留頂蓋將煮了辰砂等勻在附子罐內附子肉亦入在內有餘粉留木瓜內不妨以原頂益定線扎宣州花木瓜二隻大者中分作兩片去皮瓤卻將扎定附子四隻分入木瓜內以竹籤定用大麥坐木瓜蒸之候兩時辰木瓜香熟卻取出附子切作片焙乾其辰砂別研令細木瓜別研為膏補骨脂去毛炒熟地黃酒浸菟絲子杜仲姜炒各一兩半鹿茸川當歸遠志柏子仁沉香巴戟肉蓯蓉牛膝北五味子石斛綿黃耆各一兩上件修制了同附子為細末入辰砂乳香末令勻更用山藥白茯苓各一兩上為細末或只以末入木瓜亦得打糊同木瓜膏子上處搜和為丸每服五七十丸至百丸溫酒鹽湯吞下久服腰膝不痛小便如水功效甚驗不可具述秋石丸益精生血補養心腎秋石一兩白茯苓南參山藥川當歸酒浸各半兩血茸蜜炙二兩龍骨煅半兩大附子炮一隻沉香一錢半辰砂二錢半別研一半為衣一半入藥上為細末鹿角膠煮酒為丸如梧桐子大每服三四十丸鹽湯溫酒任下瓜砂丹治男子婦人諸虛不足心氣不寧夢寐不安手足疼痛腰膝拘攣步履艱難及治婦人腳氣衝心嘔吐藥食不能下咽者並皆治之蜀醫何殿機復方硃砂四兩以木瓜十數個每木瓜一個開蓋去瓤底下根鋪藥末少許中以絹片裹硃砂一兩蜜拌濕坐於其間仍蓋藥末令滿仍以木瓜蓋子蓋定篾簽簽定紗片裹木瓜全個不令散失如此者二三十個看其銀合大小坐於其中銀合上下仍鋪藥末封益定坐於銀鍋銀甑中勿用鐵器以桑柴燒文武火蒸七晝夜再換木瓜藥末一次又蒸七晝夜乃止取出硃砂一味攤乾研細以薏苡粉煮稀糊為丸如梧桐子大每服二三十丸茶酒任下煮藥在後黃耆炙當歸遠志去心柏子仁川烏炮木香茯神去木益智仁人參乳香龍齒五味子石斛川椒熟地黃麥門冬白芍藥仙靈脾各一兩鹿茸炙酸棗仁炒附子炮去皮鍾乳粉各二兩瓜砂二兩磁石丸治心腎諸虛不足湘中趙伯海妙方磁石醋煅黃耆蜜炙覆盆子赤茯苓去皮各半兩乾薑炮巴戟去心桂心鹿茸蜜炙各三錢肉蓯蓉酒浸焙乾牛膝酒浸焙乾川椒炒各四錢柏子仁別研防風地骨皮遠志去心各二錢半大附子一個炮去皮大川烏一個炮去皮紫梢花去木各一兩上為細末酒煮麵糊為丸如梧桐子大每服三十丸湯酒任下婦人白帶下及男子泄精加龍骨半兩海螵蛸一兩牡蠣半兩鹽泥固濟火煅六益丸專補脾腎乃劉通真家祕方丁香木香肉豆蔻麵裹煨白附子炮附子炮一兩者尤妙血茸酥炙上件各一兩為末酒糊為丸如梧桐子大每服三五十丸溫酒下強志丸益心血活腎水治白濁菟絲子熟地黃各二兩茯神山藥黃耆石蓮柏子仁附子遠志枸杞子杜仲破故紙鹿角霜各一兩上煉蜜為丸如梧桐子大每服四五十丸空心酒下赤濁用麥門冬煎湯下或用硃砂為衣藥名遠方梁時發傳巴戟丸治諸虛不足真陽衰憊服之有效川楝子去核胡蘆巴炒白姜炮川椒炒茴香川牛膝酒浸焙破故紙炒山藥木通肉桂去皮牡蠣煅附子炮去皮臍赤石脂上等分為末酒糊為丸如梧桐子大每服五十丸空心鹽湯溫酒任下隨證加味於後腎厥頭痛加川芎肺虛咳唾加五味子款冬花背膊勞倦加沉香脾胃不和加蓽澄茄虛瘧寒熱加蜀漆葉心神不寧加龍齒酸棗仁炒去皮殼石斛丸治腎經積寒丹田凝陰小腸時痛腰膝時冷小便白濁頭暈耳鳴或痰涎壅塞身或倦怠膈滿怔訟飲食化遲腸鳴氣走廬山劉立之方胡蘆巴蓽撥石斛附子巴戟去心蓽澄茄茯苓山藥沉香鹿茸蜜炙上件各一兩為細末豬腰五味煮爛同汁打米糊為丸如梧桐子大空心米飲下四五十丸酒亦可固元丸治元氣虛弱腎水不能滋肝木是以子母俱虛肝主筋腎主骨筋既弱則時復筋脈攣拳此藥主之八角茴香炒覆盆子酒浸茴香炒白茯苓去皮川牛膝酒浸磁石火燒酒淬七次龍齒煅補骨脂炒各一兩天雄一兩用青鹽一兩研入酒一盞內泡天雄取酒盡為度五味子酒蒸研菟絲子淨洗酒蒸研各二兩鹿茸去毛蓯蓉酒浸一宿各二兩半車前子半兩隔紙炒麝香半錢別研鍾乳粉川烏炮附子炮去皮臍肉桂去皮巴戟去心各一兩半上細末酒煮鹿角膠丸如梧桐子大每服五十丸至一百丸食前溫酒吞下寶慶張太醫宗玉已效祕方固心丹益心志壯心腎除恍惚驚悸通明硃砂三兩用生絹袋盛無灰酒二碗半浸七日用銀石器內慢火煮令九分干井水浸一宿研成膏乳香以人參湯研如粉入在硃砂內茯神人參各一兩半併入硃砂乳香膏內研上和令勻入豬羊心血和成丸如小雞頭大每服三兩丸煎人參炒酸棗仁湯服食後臨臥下養肝丸治養血氣壯筋骨梁國佐方白芍藥禹糧石煅肉蓯蓉黃耆蜜炙當歸茯神去木各一兩杜仲炒四兩鹿角膠炒一兩半川續斷柏子仁牛膝木瓜石菖蒲各半兩上為末醋糊丸如梧桐子大早空心鹽湯下補腎丸治腎氣不足眼目昏暗出嚴氏方菟絲子酒浸焙磁石火煅各二兩枸杞子楮實子車前子酒蒸五味子熟地黃覆盆子石斛去根肉蓯蓉各一兩沉香青鹽各半兩上為細末煉蜜為丸梧桐子大每服七十丸空心鹽湯送下香茸丸補虛壯陽出雞峰方鹿茸十兩麝香一兩上先將鹿茸為細末後入麝香同拌勻以山藥二兩酒煮為糊和丸如梧桐子大每服三十丸空心米飲下蒼朮丸烏髭鬚駐顏色壯筋骨明耳目除風氣潤肌膚久服令人輕健出雞峰方蒼朮不拘多少米泔水浸三日逐日換水候滿日取出刮去皮切片日乾慢火炒令黃色細搗末上每一斤末用蒸過茯苓半斤煉蜜丸如梧桐子大空心或臨臥溫熟水下十五丸別用蒼朮末六兩甘草末一兩拌和勻作湯點之下蒼朮丸妙忌桃李雀蛤及三白暖下丸補筋骨久服令人壯健悅澤破故紙五兩微炒為細末胡桃仁二兩研蜜四兩上以蜜胡桃相和熬如稀餳後入藥末和丸如梧桐子大空心溫酒下三十丸婦人服之亦佳仙茅丸大補益壯元陽久服延年益壽仙茅茯苓山藥菖蒲九節者各一兩上仙茅一件不犯鐵器並銼以法酒拌勻於飯上蒸以飯熟為度日乾為末以棗肉和丸如梧桐子大每服五十丸空心湯酒任下椒丹暖水臟降氣明目補骨髓保長壽命眉州青神縣王家纍世服食方辰砂一兩細研如塵椒揀大粒色紅者去枝梗併合口者不用稱一兩半以生絹袋盛用無灰醇濃酒浸椒袋令酒在上三二分以來一宿取出空少時入硃砂鉢內掍之令勻余者滴浸椒酒少許又掍之令硃砂盡為度日子不得用火焙不可犯生水上每服五十丸加至百丸空心酒下此藥用生砂不僭可久服之養心丹服之能寬神清思全志通神明不老硃砂乳香各二錢半酸棗仁茯苓各半兩上為細末棗肉為丸如梧桐子大空心清淨水吞下十丸出雞峰方用之果效平補鎮心丹天門冬熟地黃山藥遠志龍齒酸棗仁五味子桂心人參硃砂麥門冬車前子茯神茯苓各等分上為末煉蜜為丸如梧桐子大每服三十丸空心米飲吞下酒亦得衆妙丸蜀醫殿機何企顏方佳甚吳茱萸破故紙炒人參火砂蜜砂各一兩北五味子大附子炮鍾乳粉肉豆蔻麵裹焙各二兩白茯苓一兩二錢鹿茸炙二兩半菟絲子搗去糠不碎者真酒浸蒸搗稱二兩上細末大鉢內滾一二日令勻糯米糊為丸如梧桐子大焙乾瓷瓶收常存暖處可與八味丸輪服沉香固元散常服為妙沉香茴香丁香烏藥木香川芎巴戟酒煮去心各半兩陳皮三錢胡蘆巴四錢上為細末鹽湯調下此方得之蜀士用之果驗玉女砂治男子婦人諸虛百損暖下元固陽氣暖宮腎産後諸虛尤宜服之又專治虛病寒熱自汗盜汗尤神此方乃潼川許德修名醫遇至人得此方極驗好辰砂八兩或六兩或十兩用絹袋盛若塊大打令稍小惟紅者為上若添砂添藥金毛狗脊去毛吳茱萸菟絲子杜仲瓦松古屋瓦上青毛焙乾去土熟地黃五味子人參肉豆蔻麵裹煨桑寄生川萆薢芍藥巴戟去心黃耆牡丹皮去心肉蓯蓉當歸茯神去木茴香洗遠志去心山茱萸去核上各一兩杵在一斗瓶內著童子小便五七升將砂袋懸胎掛瓶中如煮酒法於鍋內著水亦懸藥瓶於鍋中桑柴或間松柴煮五日夜火不要急小便不住討添煮令乾日足取出將砂袋以溫水滌十餘次又換溫水浸半日棄藥不用辰砂又洗三兩次糯米糰子和丸空心棗湯下五粒至十粒八寶妝丸壯脾腎進飲食行步如飛八味丸安腎丸鹿角霜丸菟絲子丸固真丹黃耆丸茴香丸鹿茸丸上各買一帖令有一兩作一處瓷器盛以無灰酒浸一宿令稀稠得所竹木槌子於淨桌子上捶數千下卻加天雄一個大附子一個炮為末滾合在藥內再捶千餘下又以無灰酒再浸一宿次日再捶數千下丸如梧桐子大空心鹽湯酒下十五丸日加二十丸至三五十丸止以乾物壓之茴香丸補氣血治腰疼久服明眼有驗蒼朮水浸三日去皮銼焙杜仲制破故紙川椒各二兩茴香一兩一錢厚朴一兩上六件修制外以青鹽三之一入在瓶內酌量入水文武火煮水盡為度焙乾為末酒糊為丸空心酒下五十丸二氣散治腎經停冷氣滯力弱大附子一隻生用不去皮臍切作三份為片子令薄大茴香六兩淨洗過濾干分作三份每份二兩第一度用附子一份茴香二兩一份同炒令茴香黃色香熟用瓦瓶盛貯厚紙封蓋安在冷處一宿次日除附子以茴香為末空心鹽酒調下第二度如第一度分兩炒法存性皆如之但次早止除附子一半其一半附子同茴香為細末如前法服之第三度凡分兩炒法存性皆如前二度之法但次早全用附子同茴香為細末亦如前法服之外餘一分半附子又可合別藥用金櫻丸補血四川老何方金櫻子一名山石榴幹了以新草鞋篩內擦刺令淨捶破去子切焙縮砂一半上蜜丸空心酒或鹽湯下五十丸大養脾丸補氣血虛湘中老醫陳必勝方親見功效縮砂仁麥芽人參各半兩神麯木香肉豆蔻棗肉裹煨各三錢沉香扁豆青皮白豆蔻仁石蓮肉陳皮紅豆草果子丁香厚朴制各二錢上為末煉蜜為丸粟米湯嚼下空心一日三服大正氣散補虛快氣散腹脅疼痛香附子炒當歸陳皮各半兩木香二錢甘草四錢白姜白朮桂心縮砂仁各三錢大附子一枚炮上銼散每服三錢水一盞半姜五片棗一枚煎至八分去滓空心熱服湘中陳必勝方菟絲子丸治男女虛勞益顏色去萬病安五臟填骨髓和耳目輕身延年最妙菟絲子酒浸一宿焙澤瀉酒浸一宿略蒸焙大附子炮去皮肉桂各五兩蓯蓉酒浸一宿焙杜仲制熟地黃投水中沉者是酒浸一宿焙白茯苓去皮胡猻姜去毛炙山茱萸去核茴香炒石斛焙川續斷焙牛膝酒浸一宿焙蓽澄茄各三兩半金鈴子去核乾薑炮各四兩川巴戟去心酒浸一宿焙桑螵蛸蜜炙覆盆子五味子川芎各二兩半天台烏藥八兩上為細末不犯銅鐵器酒糊為丸如梧桐子大每服二三十丸鹽湯溫酒任下如腳弱木瓜湯下加味大建中湯補諸虛白芍藥官桂黃耆蜜炙附子炮五味子乾薑炮人參鹿茸酒蒸白茯苓去皮川芎半夏當歸酒浸陳皮各一兩甘草半兩上粗末每服四錢水一盞半姜七片棗一枚煎六分去滓空心返精丸定心養血補腎此方得之異人破故紙二兩隔紙炒令香熟白茯苓一兩去皮上為細末用沒藥半兩捶破用無灰酒煮浸高浸藥一指許候如稠餳狀搜成前三味為丸如梧桐子大每服三十粒隨食湯下酒糊丸亦可食前服破故紙丸治腎氣虛寒小便無度破故紙十兩酒浸蒸酒炒茴香鹽炒上等分為末酒糊為丸每服五十丸空心鹽酒下升朝湯治脈澀精血少神氣昏倦背膊疼痛鹿茸當歸各二兩川烏白姜各一兩肉桂一兩甘草半兩上㕮咀每服半兩薑棗同煎空心服三山曾太丞方坎離丹既濟水火伏火靈砂陽起石酒煮磁石火煅醋淬鍾乳粉各一兩半龍齒一兩黑豆蒸上細末麵糊丸如緑豆大每服十五粒空心用棗湯下既濟丹治心腎不交此方得之帥司樂人靈砂陽起石煅鍾乳粉磁石煅鹿茸茯神各一兩沉香半兩硃砂一錢為衣上細末麵糊丸如緑豆大每服二十丸空心棗湯下黑錫丹治丈夫元臟虛冷真陽不固三焦不和上熱下冷耳內虛鳴腰背疼痛心氣虛乏飲食無味膀胱久冷夜多小便婦人月事愆期血海久冷惡露不止赤白帶下及陰毒傷寒四肢厥冷不省人事急用棗湯吞一二百粒即便回陽此藥大能調治榮衛升降陰陽補損益虛回陽返陰黑錫洗熔了去渣稱硫黃透明者結砂子附子各二兩破故紙酒浸炒肉豆蔻裹煨茴香炒金鈴子蒸熟去皮核各一兩半木香沉香各一兩上用新鐵銚內如常法結黑錫硫黃砂子地上出火毒自朝至暮研令極細余藥並杵羅為細末一處和停入研酒糊丸如梧桐子大陰乾入布袋內擦令光瑩每服五七十丸空心姜鹽湯或棗湯下婦人艾醋湯下如一切冷疾鹽酒鹽湯空心下三四十丸此方得之丹陽普照寺乃東京藥方本人服多效淳祐丁未胡都承守丹陽遂得真傳十全飲治諸虛百損榮衛不和婦人崩漏此藥有效人參肉桂白朮白茯苓黃耆川芎甘草熟地黃當歸白芍藥各等分上㕮咀每服四錢水盞半生薑三片棗一個煎七分服不拘時氣血虛憊加鹿茸肺虛咳嗽加五味子白豆蔻罌粟殼蜜炙各等分神仙修真丹益精補髓壯筋骨明眼目補暖臟氣去一切風鹿角霜十兩附子五兩炮上為細末以鹿角膠半升熬化為丸如梧桐子大每服三十丸空心溫酒或炒茴香湯下雙補丸治下部弱腎水冷平補不燥不熱劉子壽上舍方熟地黃半斤補血菟絲子半斤補精上細末酒糊為丸如梧桐子大心氣煩躁不得睡煎酸棗仁湯下心氣不足茯苓湯下氣不順沉香湯下腎氣動茴香湯下小便少車前子湯下小便多益智湯下常服人參湯下固真丹治腎與膀胱虛冷真氣不回小便滑數舶上茴香炒補骨脂炒益智仁炒鹿角霜各一兩韭子二兩白龍骨一兩火煅別研如粉上為末以青鹽鹿角膠各半兩同煮酒糊為丸如梧桐子大每服五十丸溫酒鹽湯下補骨脂丸唐鄭相云豫為南海節度七十有五越地卑濕傷於內外衆疾俱作陽氣衰絶乳石補益之藥百端不應元和七年有訶陵國舶主李摩訶獻此方經七八日而覺應驗自爾常服其功神驗十年二月罷郡歸京録方傳之其方用破故紙十兩揀洗為末胡桃肉去皮二十兩研如泥即入前藥末更以好蜜煉和均如飴盛瓷器中旦日以溫酒化藥一匙服之不飲酒熟水調下彌久則延年益氣悅心明目補添筋骨禁食蕓薹羊血番人呼為補骨脂丸本事方導引方殺蟲補虛勞令人強壯雞鳴時叩齒三十六通訖舐唇漱口舌聊上齒長咽之三過勞瘵青蒿飲治傳尸勞瘵不問遠年日近皆可治之此藥妙不可言阿魏一份小便先洗桃枝一大握檳榔一兩青蒿甘草三寸蔥白三寸上件六味以童子小便二升浸桃枝蒿蔥甘草四味煎取六合許然後入阿魏更煎二三沸作二服臨服時入檳榔末半兩同服如覺噁心必吐吐後令心安時再服一服其勞蟲定出送藥人不可與患人對立恐蟲傷人若男患以女人煎藥若女患以男人煎藥忌雞犬等物觸之患者冬則三服一年內五服其病自盡去其根辟邪丹治久患傳尸骨蒸勞發熱痰嗽汗出及闢一切惡夢天靈蓋四兩酥炎黃虎頭骨二兩酥炙黃白朮炒黃鬼箭各一兩硃砂雄黃各三錢麝香一錢半以上三味別研上末煉蜜為丸桐子大每服二十丸食前煎安息香湯下米飲亦得陽日合忌雞犬婦人見之神效
