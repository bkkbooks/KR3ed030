body:
  text: 卷之三諸氣門附諸疝腰痛諸氣評人之一身以氣為主正則營衛調和百脈流暢周流上下諸病普消苟不得其正盛則盈衰則虛順則平逆則病矣蓋人有七情病生七氣七氣者寒熱怒恚喜憂愁是也又曰喜怒憂思悲驚恐如憂膈恚膈氣膈寒膈熱膈亦氣也治方流氣飲子治諸般氣疾並泄瀉黃耆桂心苦梗白芍藥甘草當歸陳皮大腹皮桑白皮紫蘇葉紫蘇梗各一兩大黃木通各三錢上㕮咀每服三大錢水一盞生薑三片棗一枚煎至八分空心服須要溫熱則瀉人杭州仁濟大師方蘿蔔丸治諸冷積腹脹氣痛蘿蔔子三兩沉香一錢半草豆蔻一錢半白朮半兩青皮半兩上除蘿蔔子為末別研麵糊丸十丸米飲下梁氏方烏豆丸治氣刺痛黑豆二粒用黃柏一兩銼炒二次搗少時再炒白豆二粒用黃柏二兩同前法制母丁香三粒穿心巴戟一條去心白蒺藜二十一粒沙苑蒺藜一捻上為細末酒糊為丸硃砂麝香為衣如緑豆大作一服冷鹽酒以熝豆腐羹壓之枳芎散治左脅下痛枳實川芎各半兩甘草二錢上為末每服二錢蔥棗湯調下酒調亦得不以時三稜丸心下如盤久不已令人四肢不收發黃疸飲食不成肌膚始由肝病傳脾脾當傳腎腎乘王而不受邪氣留於脾謂之痞氣其脈緩澀兼治食癥酒癥血蠱血瘕氣塊時發刺痛婦人血分男子脾氣橫泄三稜莪朮各四兩芫花二兩上三味用米醋三升煮令醋盡獨炒芫花令乾將二味切片子焙乾同為末麵糊丸如豌豆大橘皮湯下五丸以知為度息賁湯治肺之積在右脅下大如覆杯久久不愈病灑灑寒熱氣逆喘嗽發為肺癰其脈浮而毛半夏洗茱萸桂心人參甘草桑白皮葶藶炒各等分上為銼散每服四錢水一盞半姜七片棗二枚煎至七分去滓食前服此病患者極多看脈氣有力咳而脅下痛者則以十棗湯下之卻用息賁湯調理其效尤速棗子酒治奔豚氣斑蝥一個去頭足翅上用好肥棗一個劈開去核安斑蝥在內用濕紙包文武火中煨熟去斑蝥不用將棗子細嚼熱酒送下空心金銀散治心腹氣痛脹急上築不可屈伸蚌粉炒一兩入薑黃末半錢水調拌蚌粉合濕銚內再炒令乾此藥每服二錢鹽少許薑汁少許熱湯調治積氣冷氣熱氣血氣出方便集氣痛多因冷或感風雨濕或冷食癥滯則腹有痛塊引引上心大蓋痛而嘔酸水者積也謂之積氣姜合丸主之大抵煨姜能正冷氣而巴豆去積有功也若下元虛冷冷氣逼上臍腹築痛上引至心脈沉而遲面青不渴曲臥不伸者謂之冷氣輕則三稜丸極則附術丸主之如面赤發渴心腹築痛或吐或瀉六脈洪大或沉而數或心脈數大為其心屬小腸肺通大腸此為熱氣三黃丸黃芩湯主之假如婦人亦有三證然必是帶血證亦有全是血氣者蓋有所因或感冷冒熱而血氣動行是致如刀之刺謂之血氣前交加散可以加減而用無不愈者姜合丸生薑一塊中破兩邊各剜去少許可容巴豆十五粒卻合姜紙裹浸濕煨熟用上先熱下熱白湯一盞取出藥丸先一口湯咽下再嚼煨姜白湯盡咽下如瀉亦好姜附丸治脾胃氣弱飲食少或心腹疼痛或飲食難於克化常服進美飲食脾胃壯實自然無疾香附子一斤大者去毛皮泔浸三宿春夏一宿漉出水淨洗入銀石器內用井水煮上有二寸分水方可入大蒜二十杖去皮鋪在上慢火煮候蒜爛以竹箸攪以蒜汁干為度漉出焙乾用神麯炒黃四兩乾薑生四兩蓽撥丁皮胡椒縮砂仁各二兩上為末泡蒸餅為丸梧桐子大每服五十丸任意湯便下不以時候主氣散快氣寬隔下痰進食陳皮二兩粉草沉香白豆蔻人參各半兩上細末每服一大錢早晨燒鹽少許百沸湯點服有效草豆蔻湯治腹脹滿短氣草豆蔻一兩去皮上細末每服一錢空心煎木瓜生薑湯下出本草橘子仁湯治氣攻腰痛橘子仁炒上每服一錢酒一盞煎至七分和滓空心服出本草祕傳枳殼丸治男子女人積氣痛不可忍者服之即安枳實十八片去瓤巴豆丁香各用二十六粒上枳實二片合作一個入巴豆丁香各三粒線縛定用黃子醋一碗煮令乾去巴豆留小盞醋煮麵糊為丸如緑豆大薑湯下三四十丸單桃方治脅痛胡桃一味不去皮不拘多少上少用水酒各半盞煎服何元弼神效方參附正氣散人之一身以氣為主若正則百病不生故怒則氣上恐則氣下喜則氣緩悲則氣消寒則氣聚熱則氣泄憂則氣亂勞則氣耗思則氣結陰陽不和臟腑虛弱頭目昏眩腹脅刺痛嘔逆噁心飲食不進氣虛盜汗咳嗽上喘四肢厥冷腰背痠疼脾虛泄瀉脾腎俱損精血傷竭氣短脈沉耳乾焦黑面黃體瘦怠惰多困小便頻數小腸氣痛霍亂吐瀉及卒中風氣昏亂不常大病尪羸倦弱妊娠失調理産後虛損並宜服之大能補虛正氣調理氣血固腎消痰人參木香白豆蔻各二錢半川芎乾薑甘草藿香茯苓黃耆當歸丁香桂陳皮白芷縮砂仁青皮各半兩白朮附子炮半夏曲各七錢上㕮咀每服半錢重生薑五片棗二枚煎服此方屢有奇效蓽澄茄散療噫氣咳逆蓽澄茄良薑各二兩上為末每服二錢水一盞煎六七分沸投醋半盞取出時時呷之甚妙湘中黃槐卿方良薑散寬中順氣理傷滯中脘不快高良薑草果縮砂仁厚朴陳皮各半兩半夏湯浸枳殼木香甘草各三錢上㕮咀每服三大錢水一盞半生薑三片煎至七分去滓空心熱服日中再服清湘張介叟方通閉飲子治膈氣厚朴制生薑焙草果香附子去毛炒蓽澄茄陳皮各三錢青皮二錢上細末空心沸湯鹽點服何性之方大正氣散治男子婦人補虛快氣散腹脅疼痛當歸香附子炒陳皮去白各半兩甘草炙木香各二錢白姜白朮縮砂仁桂心各三錢大附子一枚炮上㕮咀每服三錢水一盞半生薑五片棗一枚煎至八分去滓空心熱服陳必勝方諸疝延胡索散治小腸氣痛絶妙延胡索鹽炒乾蠍上等分細末溫酒下朱仁卿方一捻金散治奔豚小腸諸氣痛不可忍全蠍炒一兩附子半兩生用去皮臍延胡索川楝子舶上茴香炒各一兩上為細末每服二錢痛作時熱酒調下甚者不過再服神效本事方復元丸治釣腸病川楝子二十五個銼肉作五份一份茴香炒一錢一份陳皮炒二錢一份黑牽牛炒二錢一份神麯炒二錢一份巴豆五粒炒除去巴豆破故紙二錢代用上為細末煮少麵糊為丸取江水井水塘水田水圳水合煮湯吞下空心服木香飲治小腸氣痛黃槐卿方詩訣曰小腸氣痛腰先曲無淚叫啼空眼哭口乾腳冷上唇乾額上汗珠濕漉漉川楝子十個巴豆七粒炒令土黃色去巴豆入茴香半兩延胡索半兩南木香二錢使君子上為末米飲調下大人小兒皆用各半散治小腸氣撮痛室女發燒灰茴香上等分為末無灰酒調熱服不拘時候出海上方吳茱萸丸治膀胱氣痛吳茱萸不拘多少作四份一份酒浸一份童子小便浸一份醋浸一份水浸合蒸焙乾上為末水煮麵糊丸空心酒下祿江石信甫方甚驗金鈴子丸治膀胱小腸疝氣臍腹苦痛茴香川楝子半兩每個作四片用巴豆四十九粒炒焦為度不用巴豆破故紙胡蘆巴炒各二兩上細末酒糊丸每服三十丸細嚼胡桃仁三個熱蔥酒送下常服鹽酒吞下亦可金鈴子散治膀胱疝氣小腸偏墜小腹撮痛發則欲死諸所不治妙方趙府雷制屬凝沖方川楝子一兩淨斑蝥十四個去頭翅足巴豆十四個去殼並心劈開作二片上二味同川楝肉於銀石瓦器內慢火炒令川楝肉帶微黃焦色取去斑蝥巴豆二藥不用只將川楝子肉別安之一處外用茴香三錢重和前川楝子肉用鹽合炒令香並前川楝子碾為細末每服二錢匕空心溫酒調下若臟腑微痢痛即愈病久而甚病者不過三服病退即止不可過劑服後仍用安腎丸沉香蓽澄散吞服以補其虛則其疾永不作矣治膀胱氣痛方本事方歙縣尉宋荀甫膀胱氣作痛不可忍醫者以剛劑與之痛愈甚溲溺不通三日許學士診其脈曰投熱藥太過適有五苓散一兩分作三易其各用連須蔥一莖茴香及鹽少許水一盞半煎七分連服之中夜下黑小便如豆汁一二升臍下寬得睡明日脈已平續用硇砂丸數日愈此疾往來皆因腎虛聖惠云腎氣虛風冷所侵流入於腎不能宣散而然也卵脹腸㿗難治獨氣㿗水㿗治之易愈又有寒疝之氣注入㿗中名曰狐疝亦屬㿗病嚴氏云四㿗治法橘核丸主之漫録於後橘核丸治四種㿗病卵核腫脹偏有大小或腎硬如石或引臍腹絞痛甚則膚囊腫脹或成瘡毒輕則時出黃水甚則成癰潰爛橘核炒海藻洗昆布洗海帶洗川楝子取肉炒桃仁麵炒各一兩厚朴去皮薑汁製炒木通枳實麩炒延胡索炒去皮桂心不見火木香不見火各半兩上為末酒糊為丸梧子大每服七十丸空心鹽酒鹽湯任下虛寒甚者加炮川烏一兩堅脹久不消者加硇砂二錢醋煮旋入三白散治膀胱蘊熱風濕相乘陰㿗腫脹大小便不利白牽牛略炒二兩白朮半兩桑白皮陳皮木通各半兩上為末每服二錢薑湯調服空心服初進一服未覺再進此藥不損臟氣只導利留滯疝方大率多用熱藥此方唯壅熱證宜服之茴香酒治膀胱偏墜久不愈者燈籠草根渾酒卻將茴香炒碾用此酒調下茴香飲治膀胱偏墜疝氣八角茴香白牽牛炒上二味各等分為細末空心酒調下腰痛破故丸治陰冷傷腎腰痛並補腎元胡周卿傳破故紙上一味酒浸一宿炒熟酒煮為丸更用破故紙少許炒為末酒調下朮附湯治風濕之氣傷腎腰痛朮附湯加川楝子煎空心服桂附丸治五種腰痛破故紙二兩炒附子炮肉桂各一兩上酒糊為丸每服五十粒空心酒下川烏丸治男女腰腳滯重川烏當歸杜仲骨碎補五靈脂上等分酒糊為丸空心酒下神妙丸治腰為金瘡所傷見傷損類銀河丸治腰疼如神黑牽牛一兩硫黃半兩上二味同炒令牽牛熟留硫黃裹在牽牛上不用研碎每服五十粒用溫酒鹽湯空心吞下趁痛丸治腰臂痛方見諸風門牽牛散治腰痛神妙黑牽牛不拘多少燒熱瓦上勻鋪不可撥動益欲半生半熟上為末酒調加茴香尤好又方治風腰痛最妙新增小續命湯加桃仁七個炒去皮尖煎服
